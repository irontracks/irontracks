<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 1. Motor Visual (Tailwind CSS) -->

    <!-- 2. Motor de Tradução (Babel) -->

    <!-- 4. Configuração de Estilos -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',

                    keyframes: {

                        pulseFast: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.5' } }
                    }

    <!-- 5. Importação Firebase -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.294.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        html, body { height: 100%; overflow-x: hidden; background-color: #0a0a0a; color: white; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        #root { height: 100%; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, 
            signInWithPopup,
            signInWithRedirect, 
            GoogleAuthProvider, 
            signOut, 
            onAuthStateChanged,
            getRedirectResult,
            setPersistence,
            browserLocalPersistence
        } from 'firebase/auth';
        import { 
            getFirestore, collection, doc, setDoc, getDoc, addDoc, deleteDoc, 
            onSnapshot, serverTimestamp, query, orderBy, limit, where, getDocs 
        } from 'firebase/firestore';
        import { 
            Dumbbell, Timer, Share2, Plus, Trash2, Save, LogOut, Play, 
            CheckCircle2, RotateCcw, Users, Copy, Download, Activity, 
            Music, Clock, ChevronDown, ChevronUp, FileText, TrendingUp, 
            TrendingDown, Printer, X, MessageSquare, Send, ArrowLeft, Bell, Flame,
            History, Calendar, Crown, Database, UserCog, Megaphone, AlertCircle,
            UserPlus, Mail, Ruler, Scale, BarChart3, Info, Eye, EyeOff,
            Camera, Image, Zap, Target, Award, TrendingUp as TrendUp, Brain
        } from 'lucide-react';

        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBfy01I69nNCABxnYSqK95e8TwGP1bSv2w",
            authDomain: "irontracks-e6344.firebaseapp.com",
            projectId: "irontracks-e6344",
            storageBucket: "irontracks-e6344.firebasestorage.app",
            messagingSenderId: "212508580918",
            appId: "1:212508580918:web:dd55c3088fec86b8680c97"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'irontracks-production';
        const ADMIN_EMAIL = 'djmkapple@gmail.com';

        // --- UTILITÁRIOS ---
        const formatDuration = (s) => { const mins = Math.floor(s / 60); const secs = Math.floor(s % 60); return `${mins}:${secs < 10 ? '0' : ''}${secs}`; };
        const getCurrentDate = () => new Date().toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        const formatDate = (ts) => { if (!ts) return ''; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute:'2-digit' }); };
        const formatLastSeen = (ts) => { if (!ts) return 'Nunca'; const d = ts.toDate ? ts.toDate() : new Date(ts); const diff = (new Date() - d) / 60000; if(diff<1) return 'Agora'; if(diff<60) return `${Math.floor(diff)}m`; return `${Math.floor(diff/60)}h`; };

        // --- TELA DE LOGIN MANUAL (SEM AUTO-LOOP) ---
        const LoginScreen = () => {
            const [isLoading, setIsLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [showRedirectOption, setShowRedirectOption] = useState(false);

            // Limpa lixo de sessões anteriores que possam estar travando
            useEffect(() => {
                localStorage.removeItem('auth_pending');
                localStorage.removeItem('auth_in_progress');
                
                // Detecta Safari/iOS e força redirect
                const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                if (isSafari || isIOS) {
                    setShowRedirectOption(true);
                }
            }, []);

            const handlePopupLogin = async () => {
                setIsLoading(true);
                setErrorMsg('');
                const provider = new GoogleAuthProvider();
                
                // Safari/iOS tem problemas com popup, força redirect
                const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                
                if (isSafari || isIOS) {
                    handleRedirectLogin();
                    return;
                }
                
                try {
                    await setPersistence(auth, browserLocalPersistence);
                    await signInWithPopup(auth, provider);
                    // Sucesso: o onAuthStateChanged no App vai pegar
                } catch (error) {
                    console.error("Popup Error:", error);
                    setIsLoading(false);
                    // Se popup foi bloqueado ou fechado, sugerimos redirect
                    if (error.code === 'auth/popup-blocked' || error.code === 'auth/cancelled-popup-request' || error.code === 'auth/popup-closed-by-user') {
                        setErrorMsg("Pop-up bloqueado. Use a opção abaixo.");
                        setShowRedirectOption(true);
                    } else if (error.code === 'auth/unauthorized-domain') {
                        setErrorMsg("Domínio não autorizado no Firebase.");
                    } else {
                        setErrorMsg(error.message);
                    }
                }
            };

            const handleRedirectLogin = async () => {
                setIsLoading(true);
                setErrorMsg('Redirecionando...');
                const provider = new GoogleAuthProvider();
                try {
                    await setPersistence(auth, browserLocalPersistence);
                    await signInWithRedirect(auth, provider);
                } catch (error) {
                    setIsLoading(false);
                    setErrorMsg("Falha no redirect: " + error.message);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-[100dvh] bg-neutral-900 text-white p-6">
                    <div className="mb-8 p-6 bg-gradient-to-br from-yellow-500 to-yellow-600 rounded-3xl shadow-2xl animate-pulse">
                        <Dumbbell size={64} className="text-black" />
                    </div>
                    <h1 className="text-5xl font-black mb-2 tracking-tighter italic text-center">IRON<span className="text-yellow-500">TRACKS</span></h1>
                    <p className="text-neutral-400 mb-8 text-center max-w-xs font-medium">Sistema de Alta Performance • v2.2</p>
                    
                    {/* Botão Principal (Popup) */}
                    <button 
                        onClick={handlePopupLogin}
                        disabled={isLoading}
                        className="w-full max-w-xs flex items-center justify-center gap-3 bg-white text-neutral-900 px-6 py-4 rounded-xl font-bold text-lg hover:bg-neutral-100 transition-all active:scale-95 shadow-xl disabled:opacity-50 mb-4"
                    >
                        {isLoading ? <span className="animate-spin rounded-full h-5 w-5 border-b-2 border-neutral-900"></span> : <><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5"/> Entrar com Google</>}
                    </button>

                    {/* Botão Fallback (Redirect) - Só aparece se popup falhar ou usuário pedir */}
                    {showRedirectOption && (
                        <button 
                            onClick={handleRedirectLogin}
                            className="text-yellow-500 text-sm font-bold underline p-2 animate-fade-in"
                        >
                            Não funcionou? Clique para Login via Navegador
                        </button>
                    )}

                    {/* Link para forçar redirect caso o usuário saiba que precisa (ex: iPhone) */}
                    {!showRedirectOption && !isLoading && (
                        <button onClick={() => setShowRedirectOption(true)} className="text-neutral-600 text-xs mt-4">
                            Problemas para entrar?
                        </button>
                    )}

                    {errorMsg && (
                        <div className="mt-6 p-4 bg-red-900/20 border border-red-500/50 rounded-lg max-w-xs text-center">
                            <p className="text-red-400 text-xs font-mono break-words">{errorMsg}</p>
                        </div>
                    )}
                </div>
            );
        };

        const LoadingScreen = () => (
            <div className="flex flex-col items-center justify-center min-h-[100dvh] bg-neutral-900 text-white p-6">
                <Dumbbell size={48} className="text-yellow-500 animate-bounce mb-4" />
                <p className="text-sm font-bold tracking-widest animate-pulse">SINCRONIZANDO...</p>
            </div>
        );

        // ... (Componentes internos: NotificationToast, ChatScreen, etc mantidos intactos) ...
        const NotificationToast = ({ notification, onClose }) => { if (!notification) return null; return <div onClick={onClose} className="fixed top-4 left-4 right-4 z-[60] bg-neutral-800 border-l-4 border-yellow-500 rounded-r-lg shadow-2xl p-4 flex items-center gap-3 animate-slide-down cursor-pointer">{notification.photoURL ? <img src={notification.photoURL} className="w-10 h-10 rounded-full border border-neutral-600" /> : <div className="w-10 h-10 rounded-full bg-neutral-700 flex items-center justify-center font-bold">{notification.displayName?.[0]}</div>}<div className="flex-1 overflow-hidden"><p className="text-xs font-bold text-yellow-500">Nova Mensagem</p><p className="text-sm truncate text-white">{notification.text}</p></div><button className="text-neutral-400"><X size={16}/></button></div>; };
        const ChatScreen = ({ user, onClose }) => { const [activeChat, setActiveChat] = useState(null); const [usersList, setUsersList] = useState([]); const [messages, setMessages] = useState([]); const [newMessage, setNewMessage] = useState(''); const dummy = useRef(); useEffect(() => { const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'), orderBy('lastSeen', 'desc'), limit(20)); const unsubscribe = onSnapshot(q, (snapshot) => { setUsersList(snapshot.docs.map(doc => doc.data()).filter(u => u.uid !== user.uid)); }); return () => unsubscribe(); }, [activeChat]); useEffect(() => { if (!activeChat) return; let collectionPath; if (activeChat.id === 'global') { collectionPath = collection(db, 'artifacts', appId, 'public', 'data', 'messages'); } else { const userIds = [user.uid, activeChat.uid].sort(); const chatId = `chat_${userIds[0]}_${userIds[1]}`; collectionPath = collection(db, 'artifacts', appId, 'public', 'data', 'chats', chatId, 'messages'); } const q = query(collectionPath, orderBy('createdAt', 'desc'), limit(50)); const unsubscribe = onSnapshot(q, (snapshot) => { setMessages(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).reverse()); }); return () => unsubscribe(); }, [activeChat]); useEffect(() => { dummy.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]); const sendMessage = async (e) => { e.preventDefault(); if (!newMessage.trim()) return; const text = newMessage; setNewMessage(''); let collectionPath; if (activeChat && activeChat.id === 'global') collectionPath = collection(db, 'artifacts', appId, 'public', 'data', 'messages'); else if (activeChat) { const userIds = [user.uid, activeChat.uid].sort(); const chatId = `chat_${userIds[0]}_${userIds[1]}`; collectionPath = collection(db, 'artifacts', appId, 'public', 'data', 'chats', chatId, 'messages'); } else return; await addDoc(collectionPath, { text: text, createdAt: serverTimestamp(), uid: user.uid, displayName: user.displayName || 'Anônimo', photoURL: user.photoURL }); }; return <div className="fixed inset-0 z-50 bg-neutral-900 flex flex-col animate-slide-up"><div className="p-4 bg-neutral-800 border-b border-neutral-700 flex justify-between items-center shadow-lg pt-safe"><div className="flex items-center gap-3">{activeChat ? <button onClick={() => setActiveChat(null)} className="p-1 rounded-full hover:bg-neutral-600 mr-1"><ArrowLeft size={20} /></button> : <div className="bg-yellow-500 p-2 rounded-full text-black"><MessageSquare size={20} /></div>}<div><h3 className="font-bold text-lg">{activeChat ? (activeChat.displayName || activeChat.title) : 'Mensagens'}</h3><p className="text-xs text-neutral-400 flex items-center gap-1">{activeChat ? 'Online' : 'Selecione uma conversa'}</p></div></div><button onClick={onClose} className="p-2 bg-neutral-700 rounded-full hover:bg-neutral-600"><X size={20} /></button></div>{!activeChat && <div className="flex-1 overflow-y-auto p-4 space-y-2"><button onClick={() => setActiveChat({ id: 'global', title: 'Iron Lounge', displayName: 'Iron Lounge' })} className="w-full bg-neutral-800 p-4 rounded-xl flex items-center gap-4 hover:bg-neutral-700 transition-colors border border-neutral-700 h-20"><div className="w-12 h-12 rounded-full bg-yellow-500 flex items-center justify-center text-black font-bold shrink-0"><Users size={24} /></div><div className="text-left"><p className="font-bold text-white text-lg">Iron Lounge</p><p className="text-xs text-neutral-400">Chat Global</p></div></button><p className="text-xs font-bold text-neutral-500 uppercase tracking-widest mt-6 mb-2">Atletas</p>{usersList.map((u, idx) => ( <button key={idx} onClick={() => setActiveChat(u)} className="w-full bg-neutral-800/50 p-4 rounded-xl flex items-center gap-3 hover:bg-neutral-800 transition-colors border border-neutral-800">{u.photoURL ? <img src={u.photoURL} className="w-12 h-12 rounded-full border border-neutral-600 shrink-0" /> : <div className="w-12 h-12 rounded-full bg-neutral-700 flex items-center justify-center font-bold text-white shrink-0">{u.displayName?.[0]}</div>}<div className="text-left overflow-hidden"><p className="font-bold text-white text-base truncate">{u.displayName}</p><p className="text-[10px] text-green-500 flex items-center gap-1"><span className="w-1.5 h-1.5 bg-green-500 rounded-full"></span> Online</p></div></button> ))}</div>}{activeChat && <><div className="flex-1 overflow-y-auto p-4 space-y-4 bg-black/50">{messages.map(msg => { const isMe = msg.uid === user.uid; return <div key={msg.id} className={`flex gap-3 ${isMe ? 'flex-row-reverse' : ''}`}>{msg.photoURL ? <img src={msg.photoURL} className="w-8 h-8 rounded-full border border-neutral-700" /> : <div className="w-8 h-8 rounded-full bg-neutral-700 flex items-center justify-center text-xs font-bold">{msg.displayName?.[0]}</div>}<div className={`max-w-[80%] rounded-2xl p-3 text-sm ${isMe ? 'bg-yellow-500 text-black rounded-tr-none' : 'bg-neutral-800 text-white rounded-tl-none border border-neutral-700'}`}>{!isMe && <p className="text-[10px] font-bold text-neutral-400 mb-1">{msg.displayName}</p>}<p>{msg.text}</p></div></div>; })}<div ref={dummy}></div></div><form onSubmit={sendMessage} className="p-4 bg-neutral-800 border-t border-neutral-700 flex gap-2 pb-safe"><input value={newMessage} onChange={(e) => setNewMessage(e.target.value)} className="flex-1 bg-neutral-900 border border-neutral-600 rounded-full px-4 py-3 text-white outline-none focus:border-yellow-500 transition-colors" placeholder="Mensagem..." /><button type="submit" disabled={!newMessage.trim()} className="bg-yellow-500 text-black p-3 rounded-full hover:bg-yellow-400 disabled:opacity-50"><Send size={20} /></button></form></>}</div>; };
        const AdminPanel = ({ user, onClose }) => { const [tab, setTab] = useState('students'); const [usersList, setUsersList] = useState([]); const [templates, setTemplates] = useState([]); const [selectedStudent, setSelectedStudent] = useState(null); const [studentWorkouts, setStudentWorkouts] = useState([]); const [editingTemplate, setEditingTemplate] = useState(null); useEffect(() => { const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'), orderBy('lastSeen', 'desc')); const unsub = onSnapshot(q, snap => setUsersList(snap.docs.map(d => d.data()))); return () => unsub(); }, []); useEffect(() => { const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'templates'), orderBy('createdAt', 'desc')); const unsub = onSnapshot(q, snap => setTemplates(snap.docs.map(d => ({id: d.id, ...d.data()})))); return () => unsub(); }, []); useEffect(() => { if (!selectedStudent) return; const q = query(collection(db, 'artifacts', appId, 'users', selectedStudent.uid, 'workouts'), orderBy('createdAt', 'desc')); const unsub = onSnapshot(q, snap => setStudentWorkouts(snap.docs.map(d => ({id: d.id, ...d.data()})))); return () => unsub(); }, [selectedStudent]); const handleCloneTemplate = async (template) => { if (!selectedStudent) return; if (!confirm(`Clonar para ${selectedStudent.displayName}?`)) return; const newWorkout = { ...template, title: template.title, importedFrom: 'Coach MK', createdAt: serverTimestamp(), exercises: template.exercises.map(ex => ({...ex, notes: ex.notes || ''})) }; delete newWorkout.id; await addDoc(collection(db, 'artifacts', appId, 'users', selectedStudent.uid, 'workouts'), newWorkout); alert("Enviado!"); }; const handleDeleteStudentWorkout = async (wId) => { if (!confirm("Deletar?")) return; await deleteDoc(doc(db, 'artifacts', appId, 'users', selectedStudent.uid, 'workouts', wId)); }; if (tab === 'cadastrar') return <CadastrarAluno coach={user} onBack={() => setTab('students')} />; if (tab === 'avaliacao') return <AvaliacaoFisica coach={user} onBack={() => setTab('students')} />; return <div className="fixed inset-0 z-50 bg-neutral-900 overflow-y-auto animate-slide-up"><div className="sticky top-0 bg-yellow-500 text-black p-4 flex justify-between items-center z-10 shadow-lg"><h2 className="font-black text-xl flex items-center gap-2"><Crown size={24}/> COMMAND</h2><button onClick={onClose} className="bg-black/20 p-2 rounded-lg"><X size={24}/></button></div>{!selectedStudent && !editingTemplate && ( <div className="flex p-2 gap-1 bg-neutral-800 overflow-x-auto"><button onClick={() => setTab('students')} className={`flex-1 py-3 px-4 rounded-lg font-bold text-sm whitespace-nowrap ${tab==='students' ? 'bg-neutral-700 text-white' : 'text-neutral-500'}`}>Alunos</button><button onClick={() => setTab('templates')} className={`flex-1 py-3 px-4 rounded-lg font-bold text-sm whitespace-nowrap ${tab==='templates' ? 'bg-neutral-700 text-white' : 'text-neutral-500'}`}>Templates</button><button onClick={() => setTab('cadastrar')} className={`flex-1 py-3 px-4 rounded-lg font-bold text-sm whitespace-nowrap ${tab==='cadastrar' ? 'bg-neutral-700 text-white' : 'text-neutral-500'}`}>Cadastrar</button><button onClick={() => setTab('avaliacao')} className={`flex-1 py-3 px-4 rounded-lg font-bold text-sm whitespace-nowrap ${tab==='avaliacao' ? 'bg-neutral-700 text-white' : 'text-neutral-500'}`}>Avaliação</button></div> )}<div className="p-4 pb-20">{tab === 'students' && !selectedStudent && !editingTemplate && ( <div className="space-y-3">{usersList.map(u => <div key={u.uid} onClick={() => setSelectedStudent(u)} className="bg-neutral-800 p-4 rounded-xl flex items-center gap-4 border border-neutral-700 hover:border-yellow-500 cursor-pointer">{u.photoURL ? <img src={u.photoURL} className="w-12 h-12 rounded-full"/> : <div className="w-12 h-12 bg-neutral-600 rounded-full flex items-center justify-center font-bold">{u.displayName?.[0]}</div>}<div className="flex-1"><h3 className="font-bold text-lg">{u.displayName}</h3><p className="text-xs text-neutral-400">Visto: {formatLastSeen(u.lastSeen)}</p></div><ArrowLeft className="rotate-180 text-neutral-500"/></div>)}</div> )}{tab === 'templates' && !selectedStudent && !editingTemplate && ( <div className="space-y-3"><button onClick={() => setEditingTemplate({ title: '', exercises: [] })} className="w-full py-4 border-2 border-dashed border-neutral-700 text-neutral-400 rounded-xl font-bold">+ Novo Template</button>{templates.map(t => <div key={t.id} className="bg-neutral-800 p-4 rounded-xl border border-neutral-700 flex justify-between items-center"><div><h3 className="font-bold text-white">{t.title}</h3><p className="text-xs text-neutral-500">{t.exercises?.length || 0} exercícios</p></div><div className="flex gap-2"><button onClick={() => setEditingTemplate(t)} className="p-2 bg-neutral-700 rounded-lg"><UserCog size={16}/></button><button onClick={async () => { if(confirm('Apagar?')) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'templates', t.id)) }} className="p-2 bg-red-900/30 text-red-500 rounded-lg"><Trash2 size={16}/></button></div></div>)}</div> )}{selectedStudent && !editingTemplate && ( <div><div className="flex items-center gap-3 mb-6"><button onClick={() => setSelectedStudent(null)} className="p-2 bg-neutral-800 rounded-lg"><ArrowLeft/></button><div><h2 className="text-xl font-bold">{selectedStudent.displayName}</h2><p className="text-xs text-neutral-400">{selectedStudent.email}</p></div></div><div className="grid grid-cols-2 gap-2 mb-6"><button onClick={() => setEditingTemplate({ title: '', exercises: [], targetStudentId: selectedStudent.uid })} className="bg-yellow-500 text-black p-3 rounded-xl font-bold text-sm">+ Personalizado</button><button onClick={() => alert("Selecione um template abaixo")} className="bg-neutral-800 text-white border border-neutral-700 p-3 rounded-xl font-bold text-sm">Clonar Template</button></div><h3 className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb             const [fotos, setFotos] = useState([]);
            const [loading, setLoading] = useState(true);
            const [capturando, setCapturando] = useState(false);
            const [fotoAtual, setFotoAtual] = useState(null);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            useEffect(() => {
                loadFotos();
            }, []);

            const loadFotos = async () => {
                try {
                    const fotosRef = collection(db, 'artifacts', appId, 'users', user.uid, 'fotos');
                    const q = query(fotosRef, orderBy('data', 'desc'));
                    const snapshot = await getDocs(q);
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setFotos(data);
                } catch (error) {
                    console.error('Erro ao carregar fotos:', error);
                } finally {
                    setLoading(false);
                }
            };

            const iniciarCamera = async () => {
                setCapturando(true);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'user', width: 1280, height: 720 } 
                    });
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                    }
                } catch (error) {
                    alert('❌ Erro ao acessar câmera: ' + error.message);
                    setCapturando(false);
                }
            };

            const tirarFoto = () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                
                if (video && canvas) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    setFotoAtual(dataUrl);
                    
                    // Parar câmera
                    const stream = video.srcObject;
                    if (stream) {
                        stream.getTracks().forEach(track => track.stop());
                    }
                }
            };

            const salvarFoto = async () => {
                if (!fotoAtual) return;

                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'fotos'), {
                        dataUrl: fotoAtual,
                        data: serverTimestamp(),
                        tipo: 'progresso'
                    });

                    alert('✅ Foto salva com sucesso!');
                    setFotoAtual(null);
                    setCapturando(false);
                    loadFotos();
                } catch (error) {
                    alert('❌ Erro ao salvar: ' + error.message);
                }
            };

            const cancelar = () => {
                setFotoAtual(null);
                setCapturando(false);
                if (videoRef.current && videoRef.current.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                }
            };

            const deletarFoto = async (id) => {
                if (!confirm('Deletar esta foto?')) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'fotos', id));
                    loadFotos();
                } catch (error) {
                    alert('❌ Erro ao deletar');
                }
            };

            if (capturando && !fotoAtual) {
                return (
                    <div className="fixed inset-0 z-50 bg-black flex flex-col">
                        <div className="p-4 bg-neutral-900 flex justify-between items-center">
                            <h2 className="font-bold text-white">Tirar Foto</h2>
                            <button onClick={cancelar} className="text-white"><X size={24}/></button>
                        </div>
                        
                        <div className="flex-1 relative flex items-center justify-center">
                            <video ref={videoRef} autoPlay playsInline className="max-w-full max-h-full"></video>
                            <canvas ref={canvasRef} className="hidden"></canvas>
                        </div>

                        <div className="p-6 bg-neutral-900">
                            <button 
                                onClick={tirarFoto}
                                className="w-full bg-yellow-500 text-black py-4 rounded-xl font-bold text-lg"
                            >
                                <Camera size={24} className="inline mr-2"/> Capturar
                            </button>
                        </div>
                    </div>
                );
            }

                        <div className="p-4 bg-neutral-900 flex justify-between items-center">

                        </div>
                        
                        <div className="flex-1 flex items-center justify-center p-4">
                            <img src={fotoAtual} alt="Preview" className="max-w-full max-h-full rounded-xl"/>
                        </div>

                        <div className="p-6 bg-neutral-900 grid grid-cols-2 gap-3">
                            <button onClick={cancelar} className="bg-neutral-700 text-white py-4 rounded-xl font-bold">
                                Refazer
                            </button>
                            <button onClick={salvarFoto} className="bg-green-500 text-black py-4 rounded-xl font-bold">
                                Salvar
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-neutral-900 text-white p-4 pb-20">
                    <div className="flex items-center gap-3 mb-6 pt-safe">
                        <button onClick={onBack} className="p-2 bg-neutral-800 rounded-lg">

                        </button>

                    </div>

                    <button 
                        onClick={iniciarCamera}
                        className="w-full bg-yellow-500 text-black py-4 rounded-xl font-bold text-lg mb-6 flex items-center justify-center gap-2"
                    >
                        <Camera size={24}/> Tirar Nova Foto
                    </button>

                    {!loading && fotos.length === 0 && (
                        <div className="text-center py-20 opacity-50">
                            <Image size={64} className="mx-auto mb-4 text-neutral-600"/>
                            <p>Nenhuma foto ainda</p>
                            <p className="text-sm text-neutral-500 mt-2">Tire sua primeira foto de progresso!</p>
                        </div>
                    )}

                    <div className="grid grid-cols-2 gap-4">
                        {fotos.map(foto => (
                            <div key={foto.id} className="relative group">
                                <img 
                                    src={foto.dataUrl} 
                                    alt="Progresso" 
                                    className="w-full aspect-square object-cover rounded-xl border-2 border-neutral-700"
                                />
                                <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity rounded-xl flex items-center justify-center">
                                    <button 
                                        onClick={() => deletarFoto(foto.id)}
                                        className="bg-red-500 p-3 rounded-full"
                                    >
                                        <Trash2 size={20}/>
                                    </button>
                                </div>
                                <p className="text-xs text-neutral-400 mt-1">
                                    {foto.data?.toDate ? foto.data.toDate().toLocaleDateString('pt-BR') : 'Sem data'}
                                </p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- DASHBOARD ANALYTICS ---
        const DashboardAnalytics = ({ user, onBack }) => {
            const [stats, setStats] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                calcularStats();
            }, []);

            const calcularStats = async () => {
                try {
                    // Buscar todos os alunos
                    const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                    const usersSnap = await getDocs(usersRef);
                    const totalAlunos = usersSnap.size;

                    seteDiasAtras.setDate(seteDiasAtras.getDate() - 7);
                    const alunosAtivos = usersSnap.docs.filter(doc => {
                        const lastSeen = doc.data().lastSeen?.toDate();
                        return lastSeen && lastSeen > seteDiasAtras;
                    }).length;

                    // Buscar treinos criados
                    const templatesRef = collection(db, 'artifacts', appId, 'public', 'data', 'templates');
                    const templatesSnap = await getDocs(templatesRef);
                    const totalTemplates = templatesSnap.size;

                    // Buscar avaliações
                    const avaliacoesRef = collection(db, 'artifacts', appId, 'avaliacoes');
                    const avaliacoesSnap = await getDocs(avaliacoesRef);
                    const totalAvaliacoes = avaliacoesSnap.size;

                    // Buscar alunos cadastrados
                    const alunosRef = collection(db, 'artifacts', appId, 'alunos');
                    const alunosSnap = await getDocs(alunosRef);
                    const alunosCadastrados = alunosSnap.size;

                    setStats({
                        totalAlunos,
                        alunosAtivos,
                        alunosInativos: totalAlunos - alunosAtivos,
                        taxaAtivacao: totalAlunos > 0 ? ((alunosAtivos / totalAlunos) * 100).toFixed(1) : 0,
                        totalTemplates,
                        totalAvaliacoes,

                                <Users size={20}/>
                                <p className="text-sm font-bold opacity-80">Total Alunos</p>
                            </div>
                            <p className="text-4xl font-black">{stats.totalAlunos}</p>
                        </div>

                        <div className="bg-gradient-to-br from-green-500 to-green-600 p-6 rounded-xl">
                            <div className="flex items-center gap-2 mb-2">
                                <Zap size={20}/>
                                <p className="text-sm font-bold opacity-80">Ativos</p>
                            </div>
                            <p className="text-4xl font-black">{stats.alunosAtivos}</p>
                            <p className="text-xs opacity-80 mt-1">Últimos 7 dias</p>
                        </div>

                        <div className="bg-gradient-to-br from-yellow-500 to-yellow-600 p-6 rounded-xl text-black">
                            <div className="flex items-center gap-2 mb-2">
                                <Target size={20}/>
                                <p className="text-sm font-bold opacity-80">Taxa Ativação</p>
                            </div>

                                <Dumbbell size={20}/>
                                <p className="text-sm font-bold opacity-80">Templates</p>
                            </div>
                            <p className="text-4xl font-black">{stats.totalTemplates}</p>
                        </div>
                    </div>

                    {/* Estatísticas Detalhadas */}
                    <div className="bg-neutral-800 p-6 rounded-xl mb-4">
                        <h3 className="font-bold text-lg mb-4">📊 Estatísticas</h3>
                        <div className="space-y-3">
                            <div className="flex justify-between items-center p-3 bg-neutral-900 rounded-lg">
                                <span className="text-neutral-400">Alunos Cadastrados</span>
                                <span className="font-bold text-xl">{stats.alunosCadastrados}</span>

                            </div>

                    {/* Insights da IA */}
                    <div className="bg-gradient-to-r from-purple-900/30 to-blue-900/30 border border-purple-500/30 p-6 rounded-xl">

        const ActiveWorkout = ({ workout, user, onFinish, onBack }) => {

            const [startTime] = useState(Date.now());

            const totalExercises = workout.exercises.length;

            const updateLog = (exIdx, setIdx, field, value) => {
                const key = `${exIdx}-${setIdx}`;
                setLogs(prev => ({
                    ...prev,
                    [key]: { ...prev[key], [field]: value }
                }));
            };

            const toggleSetDone = (exIdx, setIdx) => {
                const key = `${exIdx}-${setIdx}`;
                const currentLog = logs[key] || {};
                const newDone = !currentLog.done;
                
                updateLog(exIdx, setIdx, 'done', newDone);
                
                // Se marcou como feito e tem restTime, inicia o timer
                if (newDone && currentExercise.restTime > 0) {
                    setRestTimer({ active: true, duration: currentExercise.restTime });
                }
            };

            const handleFinishWorkout = async () => {
                if (!confirm('Finalizar treino?')) return;

                const totalTime = Math.floor((Date.now() - startTime) / 1000);
                const session = {
                    workoutTitle: workout.title,
                    exercises: workout.exercises,
                    logs: logs,
                    date: serverTimestamp(),
                    totalTime: totalTime
                };

                try {
                    // Salvar no histórico
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), session);
                    
                    // Buscar sessão anterior do mesmo treino
                    const historyRef = collection(db, 'artifacts', appId, 'users', user.uid, 'history');
                    const q = query(
                        historyRef,
                        where('workoutTitle', '==', workout.title),
                        orderBy('date', 'desc'),
                        limit(2)
                    );
                    const snapshot = await getDocs(q);
                    const previousSession = snapshot.docs.length > 1 ? snapshot.docs[1].data() : null;

                    onFinish(session, previousSession);
                } catch (error) {
                    console.error('Erro ao salvar:', error);
                    alert('Erro ao salvar treino. Tente novamente.');
                }

                        duration={restTimer.duration}

        // --- APP PRINCIPAL ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [view, setView] = useState('dashboard');
            const [workouts, setWorkouts] = useState([]);
            const [currentWorkout, setCurrentWorkout] = useState(null); 
            const [importCode, setImportCode] = useState('');
            const [shareCode, setShareCode] = useState(null);
            const [reportData, setReportData] = useState({ current: null, previous: null });
            const [notification, setNotification] = useState(null);

            // LOGICA DE AUTH: Simples e Direta
            useEffect(() => {
                // Limpa flags velhas ao iniciar (pra evitar travamento herdado)
                localStorage.removeItem('auth_pending');

                // Listener Único de Verdade
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    // Assim que o Firebase responde (user ou null), paramos o loading
                    setAuthLoading(false);
                });
                return unsubscribe;
            }, []);

            // ... (Resto do código mantido igual) ...
            useEffect(() => { if (!user) return; const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), orderBy('createdAt', 'desc'), limit(1)); const unsub = onSnapshot(q, s => { if(!s.empty) { const m = s.docs[0].data(); if(m.createdAt?.toMillis() > Date.now()-10000 && m.uid !== user.uid) { setNotification({id: s.docs[0].id, ...m}); setTimeout(()=>setNotification(null), 4000); }}}); return () => unsub(); }, [user]);
            useEffect(() => { if(user) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { uid: user.uid, displayName: user.displayName || 'Anônimo', email: user.email, photoURL: user.photoURL, lastSeen: serverTimestamp() }, { merge: true }); }, [user]);
            useEffect(() => { if (!user) return; const q = query(collection(db, 'artifacts', appId, 'users', user.uid, 'workouts'), orderBy('createdAt', 'desc')); const unsub = onSnapshot(q, s => setWorkouts(s.docs.map(d => ({ id: d.id, ...d.data() })))); return () => unsub(); }, [user]);

            // Handlers (mantidos)
            const handleCreateWorkout = () => { setCurrentWorkout({ title: '', exercises: [] }); setView('edit'); };
            const handleSaveWorkout = async () => { if (!user || !currentWorkout.title) return; const wd = { ...currentWorkout, createdAt: serverTimestamp(), authorName: user.displayName, authorId: user.uid }; try { if (currentWorkout.id) await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'workouts', currentWorkout.id), wd); else await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'workouts'), wd); setView('dashboard'); } catch (e) { alert("Erro: " + e.message); } };
            const handleDeleteWorkout = async (id) => { if (!confirm("Apagar?")) return; await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'workouts', id)); };
            const handleShareWorkout = async (w) => { try { const sd = { ...w, originalAuthor: user.displayName, sharedAt: serverTimestamp() }; const r = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'shared_workouts'), sd); setShareCode(r.id); } catch (e) { alert("Erro."); } };
            const handleImportWorkout = async () => { if (!importCode) return; try { const d = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shared_workouts', importCode.trim())); if (d.exists()) { await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'workouts'), { title: d.data().title + " (Importado)", exercises: d.data().exercises, importedFrom: d.data().originalAuthor, createdAt: serverTimestamp() }); setView('dashboard'); setImportCode(''); alert("Sucesso!"); } else alert("Inválido."); } catch (e) { alert("Erro."); } };
            const copyToClipboard = (t) => { const el = document.createElement('textarea'); el.value = t; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("Copiado!"); };

            if (authLoading) return <LoadingScreen />;
            if (!user) return <LoginScreen />;

            return (
                <div className="min-h-[100dvh] bg-neutral-950 text-white font-sans selection:bg-yellow-500 selection:text-black">
                    <NotificationToast notification={notification} onClose={() => setNotification(null)} />
                    {view === 'admin' && <AdminPanel user={user} onClose={() => setView('dashboard')} />}
                    {view === 'chat' && <ChatScreen user={user} onClose={() => setView('dashboard')} />}
                    {view === 'history' && <HistoryList user={user} onViewReport={(s) => { setReportData({ current: s, previous: null }); setView('report'); }} onBack={() => setView('dashboard')} />}
                    {view === 'report' && reportData.current && <WorkoutReport session={reportData.current} previousSession={reportData.previous} onClose={() => setView('dashboard')} />}
                    {view === 'active' && currentWorkout && <ActiveWorkout workout={currentWorkout} user={user} onFinish={(c, p) => { setReportData({ current: c, previous: p }); setView('report'); }} onBack={() => setView('dashboard')} />}
                    {view === 'photos' && <FotosProgresso user={user} onBack={() => setView('dashboard')} />}
                    {view === 'analytics' && <DashboardAnalytics user={user} onBack={() => setView('dashboard')} />}
                    {view === 'ai' && <IACoachAssistant user={user} onBack={() => setView('dashboard')} />}
                    {view === 'edit' && (
                        <div className="min-h-[100dvh] bg-neutral-900 text-white p-4 pb-20"><div className="flex justify-between items-center mb-6 pt-safe"><button onClick={() => setView('dashboard')} className="p-2 bg-neutral-800 rounded-lg"><RotateCcw size={20} /></button><h2 className="font-bold text-lg">{currentWorkout.id ? 'Editar' : 'Novo'}</h2><button onClick={handleSaveWorkout} className="p-2 bg-yellow-500 text-black rounded-lg"><Save size={20} /></button></div><div className="mb-6"><label className="text-xs text-neutral-500 uppercase font-bold">Nome</label><input type="text" value={currentWorkout.title} onChange={(e) => setCurrentWorkout({...currentWorkout, title: e.target.value})} className="w-full bg-neutral-800 border-b-2 border-neutral-700 p-3 text-xl font-bold focus:border-yellow-500 outline-none" placeholder="Ex: Treino A"/></div><div className="space-y-4">{currentWorkout.exercises.map((ex, idx) => ( <ExerciseEditor key={idx} index={idx} exercise={ex} updateExercise={(idx, field, val) => { const newExs = [...currentWorkout.exercises]; newExs[idx] = { ...newExs[idx], [field]: val }; setCurrentWorkout({ ...currentWorkout, exercises: newExs }); }} removeExercise={(idx) => { const newExs = currentWorkout.exercises.filter((_, i) => i !== idx); setCurrentWorkout({ ...currentWorkout, exercises: newExs }); }} /> ))}</div><button onClick={() => setCurrentWorkout({...currentWorkout, exercises: [...currentWorkout.exercises, { name: '', sets: 4, reps: '10', cadence: '3010', restTime: 60, notes: '' }]})} className="w-full mt-6 py-4 border-2 border-dashed border-neutral-700 rounded-xl text-neutral-400 font-bold hover:bg-neutral-800">+ Exercício</button></div>
                    )}
                    {view === 'dashboard' && (
                        <>
                            <div className="p-6 bg-gradient-to-b from-neutral-900 to-neutral-950 border-b border-neutral-800 sticky top-0 z-30 pt-safe">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-3 flex-1 min-w-0 overflow-hidden">
                                        {user.photoURL ? <img src={user.photoURL} className="w-10 h-10 rounded-full border-2 border-yellow-500 shrink-0" /> : <div className="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-black font-bold text-lg shrink-0">{user.displayName?.[0]}</div>}
                                        <div className="flex-1 min-w-0 overflow-hidden">
                                            <p className="text-[9px] text-yellow-500 uppercase font-bold tracking-widest mb-0.5">Bem-vindo</p>
                                            <h1 className="font-black text-lg sm:text-xl leading-none tracking-tight truncate w-full">{user.displayName || 'Atleta'}</h1>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 shrink-0 ml-2">
                                        {user.email === ADMIN_EMAIL && <button onClick={() => setView('admin')} className="bg-yellow-500 text-black p-2 rounded-full hover:bg-yellow-400 font-black border-2 border-white animate-pulse text-[10px] h-9 w-9 flex items-center justify-center">CMD</button>}
                                        <button onClick={() => setView('history')} className="bg-neutral-800 p-2 rounded-full text-neutral-400 hover:text-white h-9 w-9 flex items-center justify-center"><History size={16} /></button>
                                        <button onClick={() => setView('chat')} className="bg-neutral-800 p-2 rounded-full text-neutral-400 hover:text-white h-9 w-9 flex items-center justify-center"><MessageSquare size={16} /></button>
                                        <button onClick={() => signOut(auth)} className="text-neutral-600 hover:text-red-500 p-2 h-9 w-9 flex items-center justify-center"><LogOut size={16} /></button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setView('import')} className="bg-neutral-800/50 backdrop-blur-sm p-4 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold border border-neutral-800 hover:border-blue-500/50"><Download size={18} className="text-blue-500" /> Importar</button>
                                    <button onClick={handleCreateWorkout} className="bg-yellow-500 text-black p-4 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold hover:bg-yellow-400 shadow-lg"><Plus size={18} /> Novo Treino</button>
                                </div>
                                <div className="grid grid-cols-3 gap-2 mt-3">
                                    <button onClick={() => setView('photos')} className="bg-gradient-to-br from-purple-500/20 to-pink-500/20 backdrop-blur-sm p-3 rounded-xl flex flex-col items-center justify-center gap-1 text-xs font-bold border border-purple-500/30 hover:border-purple-500/50"><Camera size={16} className="text-purple-400" /><span>Fotos</span></button>
                                    <button onClick={() => setView('analytics')} className="bg-gradient-to-br from-blue-500/20 to-cyan-500/20 backdrop-blur-sm p-3 rounded-xl flex flex-col items-center justify-center gap-1 text-xs font-bold border border-blue-500/30 hover:border-blue-500/50"><BarChart3 size={16} className="text-blue-400" /><span>Analytics</span></button>
                                    <button onClick={() => setView('ai')} className="bg-gradient-to-br from-green-500/20 to-emerald-500/20 backdrop-blur-sm p-3 rounded-xl flex flex-col items-center justify-center gap-1 text-xs font-bold border border-green-500/30 hover:border-green-500/50"><Brain size={16} className="text-green-400" /><span>IA Coach</span></button>
                                </div>
                            </div>
                            {view === 'import' && (
                                <div className="m-4 p-6 bg-neutral-900 rounded-3xl border border-blue-500/30"><h3 className="font-bold mb-2 flex items-center gap-2 text-blue-400 text-lg">Importar Treino</h3><div className="flex gap-2"><input value={importCode} onChange={(e) => setImportCode(e.target.value)} placeholder="Código ID..." className="flex-1 bg-black border border-neutral-700 rounded-xl px-4 text-white outline-none focus:border-blue-500 font-mono"/><button onClick={handleImportWorkout} className="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold shadow-lg">OK</button></div><button onClick={() => setView('dashboard')} className="mt-4 text-xs text-neutral-500 hover:text-white underline">Cancelar</button></div>
                            )}
                            {shareCode && (
                                <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-50 backdrop-blur-md"><div className="bg-neutral-900 p-8 rounded-3xl w-full max-w-sm border border-neutral-800 shadow-2xl relative"><h3 className="text-2xl font-black text-center mb-2 mt-4 text-white">Treino Gerado!</h3><div className="bg-black p-6 rounded-2xl border border-neutral-800 mb-8 flex justify-between items-center group cursor-pointer" onClick={() => copyToClipboard(shareCode)}><span className="font-mono text-xl font-bold select-all text-green-500">{shareCode}</span><Copy size={20} className="text-neutral-600 group-hover:text-white" /></div><button onClick={() => setShareCode(null)} className="w-full bg-white hover:bg-neutral-200 text-black font-bold py-4 rounded-xl">Fechar</button></div></div>
                            )}
                            <div className="p-4 space-y-4 pb-20">
                                <h2 className="text-neutral-500 text-[10px] font-bold uppercase tracking-widest mb-4 pl-2">Meus Treinos</h2>
                                {workouts.length === 0 && <div className="text-center py-20 opacity-30"><Dumbbell size={64} className="mb-4 text-neutral-500 mx-auto" /><p className="text-neutral-400 font-medium">Nenhum treino criado.</p></div>}
                                {workouts.map(workout => (
                                    <div key={workout.id} className="bg-neutral-900 border border-neutral-800 rounded-3xl p-5 shadow-lg hover:border-neutral-700 transition-all group relative overflow-hidden"><div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none group-hover:opacity-10 transition-opacity"><Dumbbell size={120} /></div><div className="relative z-10"><div className="flex justify-between items-start mb-6"><div><h3 className="text-2xl font-black text-white group-hover:text-yellow-500 transition-colors tracking-tight">{workout.title}</h3><div className="flex items-center gap-2 mt-2"><span className="bg-neutral-800 text-neutral-400 text-xs px-2 py-1 rounded-md font-bold">{workout.exercises.length} EXERCÍCIOS</span>{workout.importedFrom && <span className="text-blue-500 text-xs font-bold px-2 py-1 bg-blue-500/10 rounded-md border border-blue-500/20">COACH</span>}</div></div><div className="flex gap-1"><button onClick={() => handleShareWorkout(workout)} className="p-3 text-neutral-500 hover:text-white hover:bg-neutral-800 rounded-xl"><Share2 size={18} /></button><button onClick={() => { setCurrentWorkout(workout); setView('edit'); }} className="p-3 text-neutral-500 hover:text-white hover:bg-neutral-800 rounded-xl"><FileText size={18} /></button><button onClick={() => handleDeleteWorkout(workout.id)} className="p-3 text-neutral-500 hover:text-red-500 hover:bg-red-500/10 rounded-xl"><Trash2 size={18} /></button></div></div><button onClick={() => { setCurrentWorkout(workout); setView('active'); }} className="w-full bg-neutral-800 group-hover:bg-yellow-500 group-hover:text-black text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-lg"><Play size={20} className="fill-current" /> INICIAR TREINO</button></div></div>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
