<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>IronTracks - Alta Performance</title>
    
    <!-- 1. Motor Visual (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Motor de Tradução (Babel) para o navegador entender React -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 3. Motor de PDF Profissional -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- 4. Configuração de Estilos Customizados (Animações) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'slide-down': 'slideDown 0.3s ease-out',
                        'pulse-fast': 'pulseFast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(100%)' },
                            '100%': { transform: 'translateY(0)' },
                        },
                        slideDown: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(0)' },
                        },
                        pulseFast: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.5' },
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- 5. Mapa de Importação -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.294.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>

    <style>
        /* Ajustes para Scrollbar invisível mas funcional */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        html, body {
            height: 100%;
            overflow-x: hidden;
            background-color: #0a0a0a; /* neutral-950 */
            color: white;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, 
            signInWithPopup,
            signInWithRedirect, 
            GoogleAuthProvider, 
            signOut, 
            onAuthStateChanged,
            getRedirectResult
        } from 'firebase/auth';
        import { 
            getFirestore, 
            collection, 
            doc, 
            setDoc, 
            getDoc, 
            addDoc, 
            deleteDoc, 
            onSnapshot, 
            serverTimestamp, 
            query, 
            orderBy, 
            limit, 
            where, 
            getDocs 
        } from 'firebase/firestore';
        import { 
            Dumbbell, Timer, Share2, Plus, Trash2, Save, LogOut, Play, 
            CheckCircle2, RotateCcw, Users, Copy, Download, Activity, 
            Music, Clock, ChevronDown, ChevronUp, FileText, TrendingUp, 
            TrendingDown, Printer, X, MessageSquare, Send, ArrowLeft, Bell, Flame,
            History, Calendar, Crown, Database, UserCog, Megaphone
        } from 'lucide-react';

        // --- CONFIGURAÇÃO FIREBASE DO MK ---
        const firebaseConfig = {
            apiKey: "AIzaSyBfy01I69nNCABxnYSqK95e8TwGP1bSv2w",
            authDomain: "irontracks-e6344.firebaseapp.com",
            projectId: "irontracks-e6344",
            storageBucket: "irontracks-e6344.firebasestorage.app",
            messagingSenderId: "212508580918",
            appId: "1:212508580918:web:dd55c3088fec86b8680c97"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'irontracks-production';

        const ADMIN_EMAIL = 'djmkapple@gmail.com';

        // --- UTILITÁRIOS ---
        const formatDuration = (s) => {
            const mins = Math.floor(s / 60);
            const secs = Math.floor(s % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        };

        const getCurrentDate = () => {
            return new Date().toLocaleDateString('pt-BR', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });
        };

        const formatDate = (timestamp) => {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute:'2-digit' });
        };

        const formatLastSeen = (timestamp) => {
            if (!timestamp) return 'Nunca';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffMins < 1) return 'Agora';
            if (diffMins < 60) return `${diffMins}m atrás`;
            if (diffHours < 24) return `${diffHours}h atrás`;
            return `${diffDays}d atrás`;
        };

        // --- COMPONENTES ---

        const LoadingScreen = () => (
            <div className="flex flex-col items-center justify-center min-h-[100dvh] bg-neutral-900 text-white p-6">
                <div className="mb-8 p-6 bg-gradient-to-br from-yellow-500 to-yellow-600 rounded-3xl shadow-2xl animate-pulse">
                    <Dumbbell size={64} className="text-black" />
                </div>
                <h1 className="text-2xl font-black mb-2 tracking-tighter italic text-center text-white animate-pulse">CARREGANDO...</h1>
                <p className="text-xs text-neutral-500">Sincronizando frequências</p>
            </div>
        );

        const LoginScreen = ({ onLogin }) => {
            const [isLoading, setIsLoading] = useState(false);
            const [statusMsg, setStatusMsg] = useState('');

            // A lógica de redirect agora é tratada principalmente no Loading Global do App
            // Mas mantemos aqui para garantir
            
            const handleGoogleLogin = async () => {
                if (isLoading) return;
                setIsLoading(true);
                setStatusMsg("Iniciando acesso...");
                
                // Timeout de segurança
                const safetyTimeout = setTimeout(() => {
                    setIsLoading(false);
                    setStatusMsg("Tempo excedido. Tente novamente.");
                }, 10000);

                const provider = new GoogleAuthProvider();
                
                try {
                    // Detecção simples de Mobile para forçar Redirect (evita popup bloqueado)
                    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                    
                    if (isMobile) {
                        setStatusMsg("Redirecionando...");
                        await signInWithRedirect(auth, provider);
                        // A página vai recarregar, o loading global assume
                    } else {
                        await signInWithPopup(auth, provider);
                        clearTimeout(safetyTimeout);
                    }
                } catch (error) {
                    clearTimeout(safetyTimeout);
                    console.error("Login Error:", error);
                    
                    if (error.code === 'auth/popup-blocked' || error.code === 'auth/cancelled-popup-request') {
                        try {
                            setStatusMsg("Popup bloqueado. Usando modo seguro...");
                            await signInWithRedirect(auth, provider);
                        } catch (redirectError) {
                            setStatusMsg("Erro: " + redirectError.message);
                            setIsLoading(false);
                        }
                    } else {
                        setStatusMsg("Erro: " + error.message);
                        setIsLoading(false);
                    }
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-[100dvh] bg-neutral-900 text-white p-6 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0 opacity-10 pointer-events-none">
                        <div className="absolute -top-24 -left-24 w-96 h-96 bg-yellow-600 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-0 right-0 w-80 h-80 bg-blue-900 rounded-full blur-3xl"></div>
                    </div>

                    <div className="relative z-10 flex flex-col items-center w-full max-w-sm">
                        <div className="mb-8 p-6 bg-gradient-to-br from-yellow-500 to-yellow-600 rounded-3xl shadow-2xl animate-pulse">
                            <Dumbbell size={64} className="text-black" />
                        </div>
                        <h1 className="text-5xl font-black mb-2 tracking-tighter italic text-center">IRON<span className="text-yellow-500">TRACKS</span></h1>
                        <p className="text-neutral-400 mb-8 text-center max-w-xs font-medium">Sistema de Alta Performance • v1.6</p>
                        
                        <button 
                            onClick={handleGoogleLogin}
                            disabled={isLoading}
                            className="group w-full flex items-center justify-center gap-4 bg-white text-neutral-900 px-8 py-5 rounded-2xl font-bold text-xl hover:bg-neutral-100 transition-all active:scale-95 shadow-xl disabled:opacity-70 disabled:cursor-not-allowed cursor-pointer"
                        >
                            {isLoading ? (
                                <div className="flex items-center gap-3">
                                    <span className="animate-spin rounded-full h-6 w-6 border-b-2 border-neutral-900"></span>
                                    <span className="text-sm font-normal">Processando...</span>
                                </div>
                            ) : (
                                <>
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6 group-hover:scale-110 transition-transform" alt="G" />
                                Entrar com Google
                                </>
                            )}
                        </button>
                        
                        {statusMsg && (
                            <p className="mt-4 text-xs text-yellow-500 text-center font-mono animate-fade-in">
                                {statusMsg}
                            </p>
                        )}
                        
                        <p className="mt-8 text-[10px] text-neutral-600 text-center uppercase tracking-widest">
                            Otimizado para iOS & Android
                        </p>
                    </div>
                </div>
            );
        };

        const NotificationToast = ({ notification, onClose }) => {
            if (!notification) return null;
            return (
                <div onClick={onClose} className="fixed top-4 left-4 right-4 z-[60] bg-neutral-800 border-l-4 border-yellow-500 rounded-r-lg shadow-2xl p-4 flex items-center gap-3 animate-slide-down cursor-pointer">
                    {notification.photoURL ? <img src={notification.photoURL} className="w-10 h-10 rounded-full border border-neutral-600" /> : <div className="w-10 h-10 rounded-full bg-neutral-700 flex items-center justify-center font-bold">{notification.displayName?.[0]}</div>}
                    <div className="flex-1 overflow-hidden">
                        <p className="text-xs font-bold text-yellow-500">Nova Mensagem de {notification.displayName}</p>
                        <p className="text-sm truncate text-white">{notification.text}</p>
                    </div>
                    <button className="text-neutral-400"><X size={16}/></button>
                </div>
            );
        };

        // --- PAINEL ADMIN (IRON COMMAND) ---
        const AdminPanel = ({ user, onClose }) => {
            const [tab, setTab] = useState('students'); // students | templates
            const [usersList, setUsersList] = useState([]);
            const [templates, setTemplates] = useState([]);
            const [selectedStudent, setSelectedStudent] = useState(null); // Para ver detalhes
            const [studentWorkouts, setStudentWorkouts] = useState([]);
            const [editingTemplate, setEditingTemplate] = useState(null); // null = list, {} = new/edit

            // Carrega Alunos
            useEffect(() => {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'), orderBy('lastSeen', 'desc'));
                const unsub = onSnapshot(q, snap => setUsersList(snap.docs.map(d => d.data())));
                return () => unsub();
            }, []);

            // Carrega Templates
            useEffect(() => {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'templates'), orderBy('createdAt', 'desc'));
                const unsub = onSnapshot(q, snap => setTemplates(snap.docs.map(d => ({id: d.id, ...d.data()}))));
                return () => unsub();
            }, []);

            // Carrega Treinos do Aluno Selecionado
            useEffect(() => {
                if (!selectedStudent) return;
                const q = query(collection(db, 'artifacts', appId, 'users', selectedStudent.uid, 'workouts'), orderBy('createdAt', 'desc'));
                const unsub = onSnapshot(q, snap => setStudentWorkouts(snap.docs.map(d => ({id: d.id, ...d.data()}))));
                return () => unsub();
            }, [selectedStudent]);

            const handleCloneTemplate = async (template) => {
                if (!selectedStudent) return;
                if (!confirm(`Clonar "${template.title}" para ${selectedStudent.displayName}?`)) return;
                
                const newWorkout = {
                    ...template,
                    title: template.title, // Pode editar nome se quiser
                    importedFrom: 'Coach MK',
                    createdAt: serverTimestamp(),
                    exercises: template.exercises.map(ex => ({...ex, notes: ex.notes || ''})) // Limpa dados
                };
                delete newWorkout.id; // Remove ID original

                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', selectedStudent.uid, 'workouts'), newWorkout);
                    alert("Treino enviado com sucesso!");
                } catch(e) {
                    alert("Erro ao enviar: " + e.message);
                }
            };

            const handleDeleteStudentWorkout = async (wId) => {
                if (!confirm("Deletar treino do aluno?")) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'users', selectedStudent.uid, 'workouts', wId));
            };

            // EDITOR DE TEMPLATE (Misto de criação de treino e edição)
            // Se selectedStudent existe -> Cria treino pro aluno (Personalizado)
            // Se não existe -> Cria Template Mestre
            return (
                <div className="fixed inset-0 z-50 bg-neutral-900 overflow-y-auto animate-slide-up">
                    <div className="sticky top-0 bg-yellow-500 text-black p-4 flex justify-between items-center z-10 shadow-lg">
                        <h2 className="font-black text-xl flex items-center gap-2"><Crown size={24}/> IRON COMMAND</h2>
                        <button onClick={onClose} className="bg-black/20 p-2 rounded-lg hover:bg-black/30"><X size={24}/></button>
                    </div>

                    {/* SUB-HEADER TABS */}
                    {!selectedStudent && !editingTemplate && (
                        <div className="flex p-2 gap-2 bg-neutral-800">
                            <button onClick={() => setTab('students')} className={`flex-1 py-3 rounded-lg font-bold ${tab==='students' ? 'bg-neutral-700 text-white' : 'text-neutral-500'}`}>Alunos</button>
                            <button onClick={() => setTab('templates')} className={`flex-1 py-3 rounded-lg font-bold ${tab==='templates' ? 'bg-neutral-700 text-white' : 'text-neutral-500'}`}>Templates</button>
                        </div>
                    )}

                    <div className="p-4 pb-20">
                        {/* LISTA DE ALUNOS */}
                        {tab === 'students' && !selectedStudent && !editingTemplate && (
                            <div className="space-y-3">
                                {usersList.map(u => (
                                    <div key={u.uid} onClick={() => setSelectedStudent(u)} className="bg-neutral-800 p-4 rounded-xl flex items-center gap-4 border border-neutral-700 hover:border-yellow-500 cursor-pointer">
                                        {u.photoURL ? <img src={u.photoURL} className="w-12 h-12 rounded-full"/> : <div className="w-12 h-12 bg-neutral-600 rounded-full flex items-center justify-center font-bold">{u.displayName?.[0]}</div>}
                                        <div className="flex-1">
                                            <h3 className="font-bold text-lg">{u.displayName}</h3>
                                            <p className="text-xs text-neutral-400">Visto: {formatLastSeen(u.lastSeen)}</p>
                                        </div>
                                        <ArrowLeft className="rotate-180 text-neutral-500"/>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* LISTA DE TEMPLATES */}
                        {tab === 'templates' && !selectedStudent && !editingTemplate && (
                            <div className="space-y-3">
                                <button onClick={() => setEditingTemplate({ title: '', exercises: [] })} className="w-full py-4 border-2 border-dashed border-neutral-700 text-neutral-400 rounded-xl font-bold hover:bg-neutral-800">+ Criar Novo Template</button>
                                {templates.map(t => (
                                    <div key={t.id} className="bg-neutral-800 p-4 rounded-xl border border-neutral-700 flex justify-between items-center">
                                        <div>
                                            <h3 className="font-bold text-white">{t.title}</h3>
                                            <p className="text-xs text-neutral-500">{t.exercises?.length || 0} exercícios</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setEditingTemplate(t)} className="p-2 bg-neutral-700 rounded-lg"><UserCog size={16}/></button>
                                            <button onClick={async () => { if(confirm('Apagar template?')) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'templates', t.id)) }} className="p-2 bg-red-900/30 text-red-500 rounded-lg"><Trash2 size={16}/></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* DETALHE DO ALUNO */}
                        {selectedStudent && !editingTemplate && (
                            <div>
                                <div className="flex items-center gap-3 mb-6">
                                    <button onClick={() => setSelectedStudent(null)} className="p-2 bg-neutral-800 rounded-lg"><ArrowLeft/></button>
                                    <div>
                                        <h2 className="text-xl font-bold">{selectedStudent.displayName}</h2>
                                        <p className="text-xs text-neutral-400">{selectedStudent.email}</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-2 mb-6">
                                    <button onClick={() => setEditingTemplate({ title: '', exercises: [], targetStudentId: selectedStudent.uid })} className="bg-yellow-500 text-black p-3 rounded-xl font-bold text-sm shadow-lg">+ Personalizado</button>
                                    <button onClick={() => alert("Selecione um template abaixo para clonar")} className="bg-neutral-800 text-white border border-neutral-700 p-3 rounded-xl font-bold text-sm">Clonar Template</button>
                                </div>

                                <h3 className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-2">Treinos Atuais</h3>
                                <div className="space-y-3 mb-8">
                                    {studentWorkouts.map(w => (
                                        <div key={w.id} className="bg-neutral-800 p-4 rounded-xl border border-neutral-700 flex justify-between items-center">
                                            <div>
                                                <h4 className="font-bold text-white">{w.title}</h4>
                                                <p className="text-xs text-neutral-500">{w.exercises.length} ex • {w.importedFrom ? 'Enviado por Coach' : 'Próprio'}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => setEditingTemplate({...w, targetStudentId: selectedStudent.uid})} className="p-2 bg-blue-900/30 text-blue-400 rounded-lg"><UserCog size={16}/></button>
                                                <button onClick={() => handleDeleteStudentWorkout(w.id)} className="p-2 bg-red-900/30 text-red-500 rounded-lg"><Trash2 size={16}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <h3 className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-2">Clonar Template Mestre</h3>
                                <div className="space-y-2">
                                    {templates.map(t => (
                                        <button key={t.id} onClick={() => handleCloneTemplate(t)} className="w-full bg-neutral-800/50 p-3 rounded-lg border border-neutral-800 flex justify-between items-center hover:bg-neutral-800">
                                            <span className="font-bold text-sm">{t.title}</span>
                                            <Copy size={14} className="text-yellow-500"/>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* EDITOR GENÉRICO (SERVE PRA TEMPLATE E TREINO DE ALUNO) */}
                        {editingTemplate && (
                            <AdminWorkoutEditor 
                                initialData={editingTemplate} 
                                onCancel={() => setEditingTemplate(null)}
                                onSave={async (data) => {
                                    // Se tem targetStudentId, salva no aluno. Se não, salva nos templates.
                                    const targetColl = data.targetStudentId 
                                        ? collection(db, 'artifacts', appId, 'users', data.targetStudentId, 'workouts')
                                        : collection(db, 'artifacts', appId, 'public', 'data', 'templates');
                                    
                                    const payload = {
                                        title: data.title,
                                        exercises: data.exercises,
                                        createdAt: serverTimestamp(),
                                        lastEditedBy: 'Coach MK'
                                    };
                                    if(data.targetStudentId) payload.importedFrom = 'Coach MK';

                                    if (data.id) {
                                        // Update existing
                                        const docRef = data.targetStudentId 
                                            ? doc(db, 'artifacts', appId, 'users', data.targetStudentId, 'workouts', data.id)
                                            : doc(db, 'artifacts', appId, 'public', 'data', 'templates', data.id);
                                        await setDoc(docRef, payload, { merge: true });
                                    } else {
                                        // New
                                        await addDoc(targetColl, payload);
                                    }
                                    setEditingTemplate(null);
                                }}
                            />
                        )}
                    </div>
                </div>
            );
        };

        // Componente Auxiliar para Editar Treinos no Admin
        const AdminWorkoutEditor = ({ initialData, onSave, onCancel }) => {
            const [workout, setWorkout] = useState(initialData);

            const updateExercise = (idx, field, val) => {
                const newExs = [...workout.exercises];
                newExs[idx] = { ...newExs[idx], [field]: val };
                setWorkout({ ...workout, exercises: newExs });
            };

            const addExercise = () => {
                setWorkout({
                    ...workout,
                    exercises: [...workout.exercises, { name: '', sets: 4, reps: '10', cadence: '3010', restTime: 60, notes: '', coachNotes: '' }]
                });
            };

            return (
                <div className="bg-neutral-900 min-h-full">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onCancel} className="text-neutral-400">Cancelar</button>
                        <h3 className="font-bold text-white">{workout.id ? 'Editar' : 'Novo'} {workout.targetStudentId ? 'Treino Aluno' : 'Template'}</h3>
                        <button onClick={() => onSave(workout)} className="text-yellow-500 font-bold">Salvar</button>
                    </div>
                    
                    <input 
                        value={workout.title} 
                        onChange={e => setWorkout({...workout, title: e.target.value})}
                        className="w-full bg-neutral-800 text-xl font-bold p-4 rounded-xl mb-4 border border-neutral-700 focus:border-yellow-500 outline-none"
                        placeholder="Nome do Treino (ex: Costas Pesado)"
                    />

                    <div className="space-y-4">
                        {workout.exercises.map((ex, idx) => (
                            <div key={idx} className="bg-neutral-800 p-4 rounded-xl border border-neutral-700 relative group">
                                <button onClick={() => {
                                    const n = [...workout.exercises]; n.splice(idx, 1); setWorkout({...workout, exercises: n});
                                }} className="absolute top-2 right-2 text-red-500 p-2"><Trash2 size={16}/></button>
                                
                                <div className="space-y-3 pr-8">
                                    <input value={ex.name} onChange={e => updateExercise(idx, 'name', e.target.value)} className="w-full bg-transparent font-bold text-white border-b border-neutral-600 pb-1" placeholder="Nome do Exercício" />
                                    <div className="grid grid-cols-4 gap-2 text-center">
                                        <div><label className="text-[10px] text-neutral-500">Séries</label><input type="number" value={ex.sets} onChange={e=>updateExercise(idx,'sets',e.target.value)} className="w-full bg-neutral-900 rounded p-1 text-center"/></div>
                                        <div><label className="text-[10px] text-neutral-500">Reps</label><input value={ex.reps} onChange={e=>updateExercise(idx,'reps',e.target.value)} className="w-full bg-neutral-900 rounded p-1 text-center"/></div>

                    </div>

                    {!activeChat && (
                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            <button 
                                onClick={() => setActiveChat({ id: 'global', title: 'Iron Lounge (Global)', displayName: 'Iron Lounge' })}
                                className="w-full bg-neutral-800 p-4 rounded-xl flex items-center gap-4 hover:bg-neutral-700 transition-colors border border-neutral-700 h-20"
                            >
                                <div className="w-12 h-12 rounded-full bg-yellow-500 flex items-center justify-center text-black font-bold shrink-0"><Users size={24} /></div>
                                <div className="text-left">

                    {activeChat && (

        const RestTimerOverlay = ({ duration, onFinish, isActive, onClose }) => {
            const [timeLeft, setTimeLeft] = useState(duration);
            const [endTime, setEndTime] = useState(null);
            const [isFinished, setIsFinished] = useState(false);

            useEffect(() => {
                if (!isActive) {
                    setEndTime(null);
                    setIsFinished(false);
                    return;
                }
                const targetTime = Date.now() + (duration * 1000);
                setEndTime(targetTime);
                setIsFinished(false);
                const interval = setInterval(() => {
                    const now = Date.now();
                    const remaining = Math.ceil((targetTime - now) / 1000);
                    if (remaining <= 0) {
                        clearInterval(interval);
                        setTimeLeft(0);
                        setIsFinished(true);
                    } else {
                        setTimeLeft(remaining);
                    }
                }, 100);
                return () => clearInterval(interval);
            }, [isActive, duration]);

            if (!isActive) return null;

            if (isFinished) {
                return (
                    <div className="fixed inset-0 z-[100] bg-green-500 flex flex-col items-center justify-center animate-pulse-fast cursor-pointer" onClick={onFinish}>

                        <p className="text-black font-bold mt-4 text-xl">TOQUE PARA VOLTAR AO TREINO</p>
                    </div>
                );
            }

            return (
                <div className="fixed bottom-0 left-0 right-0 bg-neutral-900/95 backdrop-blur-xl border-t border-yellow-500/30 p-6 shadow-2xl z-50 animate-slide-up pb-safe">
                    <div className="flex items-center justify-between max-w-md mx-auto">

                            </div>
                            <div>
                                <p className="text-[10px] text-yellow-500 uppercase font-bold tracking-widest">Recuperação</p>
                                <p className="text-4xl font-mono font-black text-white tabular-nums leading-none">{formatDuration(timeLeft)}</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => { if (endTime) setEndTime(prev => prev + 10000); }} className="h-12 w-16 bg-neutral-800 rounded-xl text-white font-bold border border-neutral-700 active:bg-neutral-700">+10s</button>
                            <button onClick={onClose} className="h-12 px-6 bg-yellow-500 text-black rounded-xl font-bold hover:bg-yellow-400 active:scale-95 transition-transform">BORA</button>
                        </div>
                    </div>
                </div>
            );
        };

        const WorkoutReport = ({ session, previousSession, onClose }) => {
            const reportRef = useRef();
            const calculateTotalVolume = (logs) => {
                let volume = 0;
                Object.values(logs).forEach(log => { if (log.done && log.weight && log.reps) volume += (parseFloat(log.weight) * parseFloat(log.reps)); });
                return volume;
            };
            const currentVolume = calculateTotalVolume(session.logs);
            const prevVolume = previousSession ? calculateTotalVolume(previousSession.logs) : 0;
            const volumeDelta = prevVolume > 0 ? ((currentVolume - prevVolume) / prevVolume) * 100 : 0;
            const durationInMinutes = session.totalTime / 60;
            const calories = Math.round((currentVolume * 0.02) + (durationInMinutes * 4));
            const prevLogsMap = {};
            if (previousSession) {
                previousSession.exercises.forEach((ex, exIdx) => {
                    const exLogs = [];
                    Object.keys(previousSession.logs).forEach(key => { const [eIdx, sIdx] = key.split('-'); if (parseInt(eIdx) === exIdx) exLogs.push(previousSession.logs[key]); });
                    prevLogsMap[ex.name] = exLogs;
                });
            }
            const handleDownloadPDF = () => {
                const element = reportRef.current;
                const opt = { margin: 0, filename: `IronTracks_${session.workoutTitle.replace(/\s+/g, '_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
                html2pdf().set(opt).from(element).save();
            };

            return (
                <div className="fixed inset-0 z-50 overflow-y-auto bg-neutral-900 text-black">
                    <div className="fixed top-4 right-4 flex gap-2 no-print z-50">
                        <button onClick={handleDownloadPDF} className="bg-yellow-500 hover:bg-yellow-400 text-black px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg"><Download size={20} /> Baixar PDF</button>
                        <button onClick={onClose} className="bg-white text-black p-3 rounded-xl font-bold shadow-lg hover:bg-gray-200"><X size={20} /></button>
                    </div>
                    <div ref={reportRef} className="min-h-screen bg-white p-8 max-w-4xl mx-auto">
                        <div className="border-b-4 border-black pb-6 mb-8 flex justify-between items-end">
                            <div><h1 className="text-4xl font-black italic tracking-tighter mb-1">IRON<span className="text-neutral-500">TRACKS</span></h1><p className="text-sm font-bold uppercase tracking-widest text-neutral-500">Relatório de Performance</p></div>
                            <div className="text-right"><p className="text-2xl font-bold">{session.workoutTitle}</p><p className="text-neutral-600">{formatDate(session.date)}</p></div>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                            <div className="bg-neutral-100 p-4 rounded-lg border border-neutral-200"><p className="text-xs font-bold uppercase text-neutral-500 mb-1">Tempo Total</p><p className="text-3xl font-mono font-bold">{formatDuration(session.totalTime)}</p></div>
                            <div className="bg-neutral-100 p-4 rounded-lg border border-neutral-200"><p className="text-xs font-bold uppercase text-neutral-500 mb-1">Volume (Kg)</p><div className="flex items-baseline gap-2"><p className="text-3xl font-mono font-bold">{currentVolume.toLocaleString()}kg</p>{previousSession && <span className={`text-xs font-bold flex items-center ${volumeDelta >= 0 ? 'text-green-600' : 'text-red-600'}`}>{volumeDelta >= 0 ? <TrendingUp size={12}/> : <TrendingDown size={12}/>}{volumeDelta > 0 ? '+' : ''}{volumeDelta.toFixed(1)}%</span>}</div></div>
                            <div className="bg-orange-50 p-4 rounded-lg border border-orange-200"><p className="text-xs font-bold uppercase text-orange-500 mb-1 flex items-center gap-1"><Flame size={12}/> Calorias (Est.)</p><p className="text-3xl font-mono font-bold text-orange-600">~{calories}</p></div>
                            <div className="bg-black text-white p-4 rounded-lg"><p className="text-xs font-bold uppercase text-neutral-400 mb-1">Status</p><p className="text-xl font-bold uppercase italic">CONCLUÍDO</p></div>
                        </div>
                        <div className="space-y-8">
                            {session.exercises.map((ex, exIdx) => {
                                const prevLogs = prevLogsMap[ex.name] || [];
                                return (
                                    <div key={exIdx} className="break-inside-avoid">
                                        <div className="flex justify-between items-end mb-2 border-b-2 border-neutral-200 pb-2">
                                            <h3 className="text-xl font-bold uppercase flex items-center gap-2"><span className="bg-black text-white w-6 h-6 flex items-center justify-center rounded text-xs">{exIdx + 1}</span>{ex.name}</h3>
                                            <div className="text-xs font-mono text-neutral-500">Cadência: <span className="font-bold text-black">{ex.cadence || '-'}</span> | Descanso: <span className="font-bold text-black">{ex.restTime}s</span></div>
                                        </div>
                                        {ex.notes && <div className="mb-3 text-sm text-neutral-600 italic bg-neutral-50 p-2 border-l-2 border-neutral-300">Obs: {ex.notes}</div>}
                                        <table className="w-full text-sm">
                                            <thead><tr className="text-neutral-500 border-b border-neutral-100"><th className="py-2 text-left w-16">Série</th><th className="py-2 text-center w-24">Carga (Kg)</th><th className="py-2 text-center w-24">Reps</th><th className="py-2 text-center w-32">Evolução</th><th className="py-2 text-right">Densidade</th></tr></thead>
                                            <tbody>
                                                {Array.from({ length: parseInt(ex.sets) }).map((_, sIdx) => {
                                                    const key = `${exIdx}-${sIdx}`; const log = session.logs[key]; const prevLog = prevLogs[sIdx];
                                                    if (!log || !log.done) return null;
                                                    let deltaLoad = 0; let progressionText = "-"; let rowClass = ""; let icon = null;
                                                    if (prevLog && prevLog.weight) {
                                                        deltaLoad = parseFloat(log.weight) - parseFloat(prevLog.weight);
                                                        if (deltaLoad > 0) { progressionText = `+${deltaLoad}kg`; rowClass = "bg-green-50 text-green-900 font-bold"; icon = <TrendingUp size={14} />; }
                                                        else if (deltaLoad < 0) { progressionText = `${deltaLoad}kg`; rowClass = "text-red-600 font-bold"; icon = <TrendingDown size={14} />; }
                                                        else { progressionText = "="; }
                                                    }
                                                    return (
                                                        <tr key={sIdx} className="border-b border-neutral-100">
                                                            <td className="py-3 font-mono text-neutral-500">#{sIdx + 1}</td><td className="py-3 text-center font-bold text-lg">{log.weight}</td><td className="py-3 text-center font-mono">{log.reps}</td>
                                                            <td className={`py-3 text-center text-xs uppercase ${rowClass}`}>{progressionText !== '-' && progressionText !== '=' ? <span className="flex items-center justify-center gap-1">{icon}{progressionText}</span> : <span className="text-neutral-300 font-bold">=</span>}</td>
                                                            <td className="py-3 text-right font-mono text-neutral-400 text-xs">{(parseFloat(log.weight) * parseFloat(log.reps)).toFixed(0)}kg</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="mt-12 pt-6 border-t border-neutral-200 text-center text-xs text-neutral-400 uppercase tracking-widest">IronTracks System • {getCurrentDate()}</div>
                    </div>
                </div>
            );
        };

        const HistoryList = ({ user, onViewReport, onBack }) => {
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                const loadHistory = async () => {
                    try {
                        const historyRef = collection(db, 'artifacts', appId, 'users', user.uid, 'history');
                        const q = query(historyRef, orderBy('date', 'desc'), limit(20));
                        const snapshot = await getDocs(q);
                        setHistory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    } catch(e) { console.error(e); } finally { setLoading(false); }
                };
                loadHistory();
            }, [user]);
            const handleDeleteHistory = async (e, sessionId) => {
                e.stopPropagation();
                if (!confirm("Apagar registro?")) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'history', sessionId));
                    setHistory(prev => prev.filter(h => h.id !== sessionId));
                } catch (error) { alert("Erro ao excluir."); }

                <div className="min-h-screen bg-neutral-900 text-white p-4">

                    {loading && <p className="text-center text-neutral-500 animate-pulse">Carregando...</p>}

                                <div className="flex justify-between items-start">
                                    <div><h3 className="font-bold text-lg text-white">{session.workoutTitle}</h3><p className="text-xs text-neutral-400 flex items-center gap-1 mt-1"><Calendar size={12}/> {formatDate(session.date)}</p></div>
                                    <div className="text-right"><p className="text-yellow-500 font-mono font-bold text-sm">{formatDuration(session.totalTime)}</p></div>
                                </div>
                                <button onClick={(e) => handleDeleteHistory(e, session.id)} className="mt-3 text-red-500 text-xs flex items-center gap-1 p-2 -ml-2 rounded-lg hover:bg-red-500/10"><Trash2 size={14} /> Excluir</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ExerciseEditor = ({ exercise, index, updateExercise, removeExercise }) => {
            const [expanded, setExpanded] = useState(true);
            return (
                <div className="bg-neutral-800 rounded-xl p-4 mb-3 border border-neutral-700 shadow-sm">
                    <div className="flex justify-between items-center mb-2" onClick={() => setExpanded(!expanded)}>
                        <h3 className="font-bold text-lg text-white flex items-center gap-2"><span className="bg-neutral-700 text-xs w-6 h-6 flex items-center justify-center rounded-full text-neutral-300">{index + 1}</span>{exercise.name || "Novo Exercício"}</h3>
                        <div className="flex gap-2">{expanded ? <ChevronUp size={18} className="text-neutral-500"/> : <ChevronDown size={18} className="text-neutral-500"/>}</div>
                    </div>
                    {expanded && (
                        <div className="space-y-3 mt-3 animate-fade-in">
                            <div><label className="text-xs text-neutral-500 uppercase font-bold">Nome</label><input type="text" value={exercise.name} onChange={(e) => updateExercise(index, 'name', e.target.value)} className="w-full bg-neutral-900 border border-neutral-700 text-white rounded-lg p-3 outline-none" placeholder="Ex: Supino Reto"/></div>
                            <div className="grid grid-cols-2 gap-3">
                                <div><label className="text-xs text-neutral-500 uppercase font-bold">Séries</label><input type="number" value={exercise.sets} onChange={(e) => updateExercise(index, 'sets', e.target.value)} className="w-full bg-neutral-900 border border-neutral-700 text-white rounded-lg p-2 text-center" placeholder="4"/></div>
                                <div><label className="text-xs text-neutral-500 uppercase font-bold">Reps</label><input type="text" value={exercise.reps} onChange={(e) => updateExercise(index, 'reps', e.target.value)} className="w-full bg-neutral-900 border border-neutral-700 text-white rounded-lg p-2 text-center" placeholder="8-12"/></div>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div><label className="text-xs text-neutral-500 uppercase font-bold">Cadência</label><input type="text" value={exercise.cadence} onChange={(e) => updateExercise(index, 'cadence', e.target.value)} className="w-full bg-neutral-900 border border-neutral-700 text-white rounded-lg p-2 text-center" placeholder="3010"/></div>
                                <div><label className="text-xs text-neutral-500 uppercase font-bold">Descanso (s)</label><input type="number" value={exercise.restTime} onChange={(e) => updateExercise(index, 'restTime', e.target.value)} className="w-full bg-neutral-900 border border-neutral-700 text-white rounded-lg p-2 text-center" placeholder="90"/></div>

        };

        const ActiveWorkout = ({ workout, onFinish, onBack, user }) => {
            const [activeExerciseIndex, setActiveExerciseIndex] = useState(0);
            const [logs, setLogs] = useState({});
            const [restTimer, setRestTimer] = useState({ active: false, duration: 60 });
            const [startTime] = useState(Date.now());
            const [sessionDuration, setSessionDuration] = useState(0);
            const [totalRestTime, setTotalRestTime] = useState(0);

            useEffect(() => { const timer = setInterval(() => { setSessionDuration(Math.floor((Date.now() - startTime) / 1000)); }, 1000); return () => clearInterval(timer); }, [startTime]);
            useEffect(() => { let interval; if (restTimer.active) { interval = setInterval(() => { setTotalRestTime(prev => prev + 1); }, 1000); } return () => clearInterval(interval); }, [restTimer.active]);

            const toggleSet = (exIndex, setIndex, targetReps, defaultRest) => {
                const key = `${exIndex}-${setIndex}`;
                const currentLog = logs[key] || { weight: '', reps: targetReps, done: false };
                const newDone = !currentLog.done;
                setLogs({ ...logs, [key]: { ...currentLog, done: newDone } });
                if (newDone) setRestTimer({ active: true, duration: parseInt(defaultRest) || 60 });
            };

            const updateLogValue = (exIndex, setIndex, field, value) => {
                const key = `${exIndex}-${setIndex}`;
                const currentLog = logs[key] || { weight: '', reps: '', done: false };
                setLogs({ ...logs, [key]: { ...currentLog, [field]: value } });
            };

            const handleFinish = async () => {
                if (!confirm("Finalizar treino?")) return;
                const finalDuration = Math.floor((Date.now() - startTime) / 1000);
                const sessionData = { workoutId: workout.id, workoutTitle: workout.title, exercises: workout.exercises, logs: logs, totalTime: finalDuration, totalRestTime: totalRestTime, date: serverTimestamp(), userId: user.uid };
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), sessionData);
                    const historyRef = collection(db, 'artifacts', appId, 'users', user.uid, 'history');
                    const snapshot = await getDocs(historyRef);
                    const allHistory = snapshot.docs.map(d => d.data());
                    const workoutHistory = allHistory.filter(h => h.workoutId === workout.id).sort((a, b) => { const timeA = a.date?.seconds || 0; const timeB = b.date?.seconds || 0; return timeB - timeA; });
                    const previousSession = workoutHistory.length > 1 ? workoutHistory[1] : null;
                    onFinish(sessionData, previousSession);
                } catch (e) { alert("Erro: " + e.message); onFinish(sessionData, null); }
            };

            const currentExercise = workout.exercises[activeExerciseIndex];

            return (
                <div className="pb-24 bg-black min-h-[100dvh] text-white">
                    <div className="sticky top-0 bg-neutral-900/95 backdrop-blur-md border-b border-neutral-800 p-4 z-40 flex justify-between items-center pt-safe">
                        <div><h2 className="text-white font-bold truncate max-w-[200px]">{workout.title}</h2><div className="flex items-center gap-2 text-yellow-500 text-sm font-mono"><Activity size={14} />{formatDuration(sessionDuration)}</div></div>
                        <button onClick={handleFinish} className="bg-yellow-500 hover:bg-yellow-400 text-black px-4 py-2 rounded-lg font-bold text-sm shadow-lg">Finalizar</button>
                    </div>
                    <div className="flex overflow-x-auto p-4 gap-2 no-scrollbar bg-neutral-950">
                        {workout.exercises.map((ex, idx) => (
                            <button key={idx} onClick={() => setActiveExerciseIndex(idx)} className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all border ${idx === activeExerciseIndex ? 'bg-white text-black border-white' : 'bg-neutral-900 text-neutral-400 border-neutral-800'}`}>{idx + 1}. {ex.name}</button>
                        ))}
                    </div>
                    <div className="px-4">
                        <div className="bg-neutral-900 rounded-3xl p-6 mb-6 shadow-2xl border border-neutral-800">
                            <div className="flex justify-between items-start mb-6"><h3 className="text-2xl font-bold text-white leading-tight">{currentExercise.name}</h3></div>
                            <div className="grid grid-cols-3 gap-3 mb-6 text-center">
                                <div className="bg-neutral-800 p-3 rounded-xl border border-neutral-700"><span className="text-[10px] text-neutral-400 block uppercase font-bold tracking-wider">Cadência</span><span className="text-white font-mono text-lg">{currentExercise.cadence || "Livre"}</span></div>
                                <div className="bg-neutral-800 p-3 rounded-xl border border-neutral-700"><span className="text-[10px] text-neutral-400 block uppercase font-bold tracking-wider">Descanso</span><span className="text-white font-mono text-lg">{currentExercise.restTime || "60"}s</span></div>
                                <div className="bg-neutral-800 p-3 rounded-xl border border-neutral-700"><span className="text-[10px] text-neutral-400 block uppercase font-bold tracking-wider">Meta</span><span className="text-white font-mono text-lg">{currentExercise.reps}</span></div>
                            </div>
                            
                            {/* VOZ DO COACH DISPLAY */}
                            {currentExercise.coachNotes && (
                                <div className="mb-4 bg-yellow-500/20 p-4 rounded-xl border border-yellow-500 animate-pulse flex gap-3">
                                    <Megaphone size={20} className="text-yellow-500 shrink-0"/>
                                    <p className="text-yellow-300 font-bold italic text-sm">"{currentExercise.coachNotes}"</p>
                                </div>
                            )}

                            {currentExercise.notes && <div className="mb-8 bg-neutral-800 p-4 rounded-xl border border-neutral-700 flex gap-3"><Music size={16} className="text-neutral-500 shrink-0"/><p className="text-neutral-400 text-sm italic">"{currentExercise.notes}"</p></div>}

                            <div className="space-y-3">
                                <div className="grid grid-cols-10 gap-3 text-[10px] text-neutral-500 uppercase font-bold text-center mb-2 tracking-widest"><div className="col-span-1">Set</div><div className="col-span-3">Carga (kg)</div><div className="col-span-3">Reps</div><div className="col-span-3">Status</div></div>
                                {Array.from({ length: parseInt(currentExercise.sets) || 3 }).map((_, setIdx) => {
                                    const logKey = `${activeExerciseIndex}-${setIdx}`; const log = logs[logKey] || { done: false, weight: '', reps: '' };
                                    return (
                                        <div key={setIdx} className={`grid grid-cols-10 gap-3 items-center ${log.done ? 'opacity-40 grayscale transition-all duration-500' : 'opacity-100'}`}>
                                            <div className="col-span-1 text-center font-mono text-neutral-600 font-bold">{setIdx + 1}</div>
                                            <div className="col-span-3"><input type="number" placeholder="Kg" value={log.weight} onChange={(e) => updateLogValue(activeExerciseIndex, setIdx, 'weight', e.target.value)} className="w-full bg-black border border-neutral-700 rounded-xl p-3 text-white text-center font-bold text-lg"/></div>
                                            <div className="col-span-3"><input type="number" placeholder={currentExercise.reps} value={log.reps} onChange={(e) => updateLogValue(activeExerciseIndex, setIdx, 'reps', e.target.value)} className="w-full bg-black border border-neutral-700 rounded-xl p-3 text-white text-center font-bold text-lg"/></div>
                                            <button onClick={() => toggleSet(activeExerciseIndex, setIdx, currentExercise.reps, currentExercise.restTime)} className={`col-span-3 h-12 rounded-xl flex items-center justify-center transition-all shadow-lg active:scale-95 ${log.done ? 'bg-green-500 text-black' : 'bg-neutral-800 border border-neutral-700'}`}>{log.done ? <CheckCircle2 size={24} /> : <div className="w-6 h-6 rounded-full border-4 border-neutral-600" />}</button>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    <RestTimerOverlay duration={restTimer.duration} isActive={restTimer.active} onFinish={() => setRestTimer(prev => ({ ...prev, active: false }))} onClose={() => setRestTimer(prev => ({ ...prev, active: false }))}/>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true); // Global loading for Auth check
            const [view, setView] = useState('dashboard');
            const [workouts, setWorkouts] = useState([]);
            const [currentWorkout, setCurrentWorkout] = useState(null); 
            const [importCode, setImportCode] = useState('');
            const [shareCode, setShareCode] = useState(null);
            const [reportData, setReportData] = useState({ current: null, previous: null });
            const [notification, setNotification] = useState(null);

            // Verifica Auth state e Redirect result antes de liberar a UI
            useEffect(() => { 
                const unsubscribe = onAuthStateChanged(auth, async (u) => { 
                    // Se houver um redirect pendente, aguarda
                    try {
                        await getRedirectResult(auth);
                    } catch(e) {
                        console.error("Redirect check failed", e);
                    }
                    setUser(u); 
                    setAuthLoading(false);
                }); 
                return () => unsubscribe(); 
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), orderBy('createdAt', 'desc'), limit(1));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    if (!snapshot.empty) {
                        const msg = snapshot.docs[0].data();
                        const isRecent = msg.createdAt?.toMillis() > Date.now() - 10000;
                        if (isRecent && msg.uid !== user.uid) { setNotification({ id: snapshot.docs[0].id, ...msg }); setTimeout(() => setNotification(null), 4000); }
                    }
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if(user) {
                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                    setDoc(userRef, { uid: user.uid, displayName: user.displayName || 'Anônimo', email: user.email, photoURL: user.photoURL, lastSeen: serverTimestamp() }, { merge: true });
                }
            }, [user]);

            useEffect(() => {
                if (!user) return;
                const q = query(collection(db, 'artifacts', appId, 'users', user.uid, 'workouts'), orderBy('createdAt', 'desc'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    setWorkouts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (error) => console.error(error));
                return () => unsubscribe();
            }, [user]);

            const handleCreateWorkout = () => { setCurrentWorkout({ title: '', exercises: [] }); setView('edit'); };
            const handleSaveWorkout = async () => {
                if (!user || !currentWorkout.title) return;
                const workoutData = { ...currentWorkout, createdAt: serverTimestamp(), authorName: user.displayName || 'Anônimo', authorId: user.uid };
                try {
                    if (currentWorkout.id) { await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'workouts', currentWorkout.id), workoutData); } else { await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'workouts'), workoutData); }
                    setView('dashboard');
                } catch (e) { alert("Erro: " + e.message); }
            };
            const handleDeleteWorkout = async (id) => { if (!confirm("Apagar treino?")) return; await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'workouts', id)); };
            const handleShareWorkout = async (workout) => { try { const shareData = { ...workout, originalAuthor: user.displayName, sharedAt: serverTimestamp() }; const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'shared_workouts'), shareData); setShareCode(docRef.id); } catch (e) { alert("Erro ao compartilhar."); } };
            const handleImportWorkout = async () => {
                if (!importCode) return;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'shared_workouts', importCode.trim());
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'workouts'), { title: data.title + " (Importado)", exercises: data.exercises, importedFrom: data.originalAuthor, createdAt: serverTimestamp() });
                        setView('dashboard'); setImportCode(''); alert("Importado!");
                    } else { alert("Código inválido."); }
                } catch (e) { alert("Erro."); }
            };
            const copyToClipboard = (text) => { const textarea = document.createElement('textarea'); textarea.value = text; document.body.appendChild(textarea); textarea.select(); document.execCommand('copy'); document.body.removeChild(textarea); alert("Copiado!"); };

            if (authLoading) return <LoadingScreen />;
            if (!user) return <LoginScreen onLogin={() => {}} />;

            return (
                <div className="min-h-[100dvh] bg-neutral-950 text-white font-sans selection:bg-yellow-500 selection:text-black">
                    <NotificationToast notification={notification} onClose={() => setNotification(null)} />
                    
                    {view === 'admin' && <AdminPanel user={user} onClose={() => setView('dashboard')} />}
                    {view === 'chat' && <ChatScreen user={user} onClose={() => setView('dashboard')} />}
                    {view === 'history' && <HistoryList user={user} onViewReport={(session) => { setReportData({ current: session, previous: null }); setView('report'); }} onBack={() => setView('dashboard')} />}
                    {view === 'report' && reportData.current && <WorkoutReport session={reportData.current} previousSession={reportData.previous} onClose={() => setView('dashboard')} />}
                    {view === 'active' && currentWorkout && <ActiveWorkout workout={currentWorkout} user={user} onFinish={(current, previous) => { setReportData({ current, previous }); setView('report'); }} onBack={() => setView('dashboard')} />}
                    
                    {view === 'edit' && (
                        <div className="min-h-[100dvh] bg-neutral-900 text-white p-4 pb-20">
                            <div className="flex justify-between items-center mb-6 pt-safe">
                                <button onClick={() => setView('dashboard')} className="p-2 bg-neutral-800 rounded-lg"><RotateCcw size={20} /></button>
                                <h2 className="font-bold text-lg">{currentWorkout.id ? 'Editar' : 'Novo'}</h2>
                                <button onClick={handleSaveWorkout} className="p-2 bg-yellow-500 text-black rounded-lg"><Save size={20} /></button>
                            </div>
                            <div className="mb-6"><label className="text-xs text-neutral-500 uppercase font-bold">Nome</label><input type="text" value={currentWorkout.title} onChange={(e) => setCurrentWorkout({...currentWorkout, title: e.target.value})} className="w-full bg-neutral-800 border-b-2 border-neutral-700 p-3 text-xl font-bold focus:border-yellow-500 outline-none" placeholder="Ex: Treino A"/></div>
                            <div className="space-y-4">{currentWorkout.exercises.map((ex, idx) => ( <ExerciseEditor key={idx} index={idx} exercise={ex} updateExercise={(idx, field, val) => { const newExs = [...currentWorkout.exercises]; newExs[idx] = { ...newExs[idx], [field]: val }; setCurrentWorkout({ ...currentWorkout, exercises: newExs }); }} removeExercise={(idx) => { const newExs = currentWorkout.exercises.filter((_, i) => i !== idx); setCurrentWorkout({ ...currentWorkout, exercises: newExs }); }} /> ))}</div>
                            <button onClick={() => setCurrentWorkout({...currentWorkout, exercises: [...currentWorkout.exercises, { name: '', sets: 4, reps: '10', cadence: '3010', restTime: 60, notes: '' }]})} className="w-full mt-6 py-4 border-2 border-dashed border-neutral-700 rounded-xl text-neutral-400 font-bold hover:bg-neutral-800">+ Exercício</button>
                        </div>
                    )}

                    {view === 'dashboard' && (
                        <>
                            <div className="p-6 bg-gradient-to-b from-neutral-900 to-neutral-950 border-b border-neutral-800 sticky top-0 z-30 pt-safe">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-4 flex-1 min-w-0">
                                        {user.photoURL ? <img src={user.photoURL} className="w-12 h-12 rounded-full border-2 border-yellow-500 shrink-0" /> : <div className="w-12 h-12 rounded-full bg-yellow-500 flex items-center justify-center text-black font-bold text-lg shrink-0">{user.displayName?.[0]}</div>}
                                        <div className="flex-1 min-w-0">
                                            <p className="text-[10px] text-yellow-500 uppercase font-bold tracking-widest mb-1">Bem-vindo Atleta</p>
                                            <h1 className="font-black text-2xl leading-none tracking-tight truncate">{user.displayName || 'Usuário'}</h1>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 shrink-0">
                                        {user.email === ADMIN_EMAIL && (
                                            <button onClick={() => setView('admin')} className="bg-yellow-500 text-black p-2 rounded-full hover:bg-yellow-400 font-black border-2 border-white animate-pulse text-xs flex items-center justify-center h-10 w-10" title="Painel CMD">CMD</button>
                                        )}
                                        <button onClick={() => setView('history')} className="bg-neutral-800 p-2 rounded-full text-neutral-400 hover:text-white h-10 w-10 flex items-center justify-center"><History size={18} /></button>
                                        <button onClick={() => setView('chat')} className="bg-neutral-800 p-2 rounded-full text-neutral-400 hover:text-white h-10 w-10 flex items-center justify-center"><MessageSquare size={18} /></button>
                                        <button onClick={() => signOut(auth)} className="text-neutral-600 hover:text-red-500 p-2 h-10 w-10 flex items-center justify-center"><LogOut size={18} /></button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setView('import')} className="bg-neutral-800/50 backdrop-blur-sm p-4 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold border border-neutral-800 hover:border-blue-500/50"><Download size={18} className="text-blue-500" /> Importar</button>
                                    <button onClick={handleCreateWorkout} className="bg-yellow-500 text-black p-4 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold hover:bg-yellow-400 shadow-lg"><Plus size={18} /> Novo Treino</button>
                                </div>
                            </div>
                            {view === 'import' && (
                                <div className="m-4 p-6 bg-neutral-900 rounded-3xl border border-blue-500/30">
                                    <h3 className="font-bold mb-2 flex items-center gap-2 text-blue-400 text-lg">Importar Treino</h3>
                                    <p className="text-sm text-neutral-400 mb-4">Cole o código ID para sincronizar o treino do seu parceiro.</p>
                                    <div className="flex gap-2"><input value={importCode} onChange={(e) => setImportCode(e.target.value)} placeholder="Cole o ID aqui..." className="flex-1 bg-black border border-neutral-700 rounded-xl px-4 text-white outline-none focus:border-blue-500 font-mono"/><button onClick={handleImportWorkout} className="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold shadow-lg">OK</button></div>
                                    <button onClick={() => setView('dashboard')} className="mt-4 text-xs text-neutral-500 hover:text-white underline">Cancelar</button>
                                </div>
                            )}
                            {shareCode && (
                                <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-50 backdrop-blur-md">
                                    <div className="bg-neutral-900 p-8 rounded-3xl w-full max-w-sm border border-neutral-800 shadow-2xl relative">
                                        <h3 className="text-2xl font-black text-center mb-2 mt-4 text-white">Treino Gerado!</h3>
                                        <p className="text-center text-neutral-400 text-sm mb-8">Envie este código para sua equipe importar.</p>
                                        <div className="bg-black p-6 rounded-2xl border border-neutral-800 mb-8 flex justify-between items-center group cursor-pointer" onClick={() => copyToClipboard(shareCode)}><span className="font-mono text-xl font-bold select-all text-green-500">{shareCode}</span><Copy size={20} className="text-neutral-600 group-hover:text-white" /></div>
                                        <button onClick={() => setShareCode(null)} className="w-full bg-white hover:bg-neutral-200 text-black font-bold py-4 rounded-xl">Fechar</button>
                                    </div>
                                </div>
                            )}
                            <div className="p-4 space-y-4 pb-20">
                                <h2 className="text-neutral-500 text-[10px] font-bold uppercase tracking-widest mb-4 pl-2">Meus Treinos</h2>
                                {workouts.length === 0 && <div className="text-center py-20 opacity-30"><Dumbbell size={64} className="mb-4 text-neutral-500 mx-auto" /><p className="text-neutral-400 font-medium">Nenhum treino criado.</p></div>}
                                {workouts.map(workout => (
                                    <div key={workout.id} className="bg-neutral-900 border border-neutral-800 rounded-3xl p-5 shadow-lg hover:border-neutral-700 transition-all group relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none group-hover:opacity-10 transition-opacity"><Dumbbell size={120} /></div>
                                        <div className="relative z-10">
                                            <div className="flex justify-between items-start mb-6">
                                                <div><h3 className="text-2xl font-black text-white group-hover:text-yellow-500 transition-colors tracking-tight">{workout.title}</h3><div className="flex items-center gap-2 mt-2"><span className="bg-neutral-800 text-neutral-400 text-xs px-2 py-1 rounded-md font-bold">{workout.exercises.length} EXERCÍCIOS</span>{workout.importedFrom && <span className="text-blue-500 text-xs font-bold px-2 py-1 bg-blue-500/10 rounded-md border border-blue-500/20">DE: {workout.importedFrom.toUpperCase()}</span>}</div></div>
                                                <div className="flex gap-1">
                                                    <button onClick={() => handleShareWorkout(workout)} className="p-3 text-neutral-500 hover:text-white hover:bg-neutral-800 rounded-xl" title="Compartilhar"><Share2 size={18} /></button>
                                                    <button onClick={() => { setCurrentWorkout(workout); setView('edit'); }} className="p-3 text-neutral-500 hover:text-white hover:bg-neutral-800 rounded-xl" title="Editar"><FileText size={18} /></button>
                                                    <button onClick={() => handleDeleteWorkout(workout.id)} className="p-3 text-neutral-500 hover:text-red-500 hover:bg-red-500/10 rounded-xl" title="Excluir"><Trash2 size={18} /></button>
                                                </div>
                                            </div>
                                            <button onClick={() => { setCurrentWorkout(workout); setView('active'); }} className="w-full bg-neutral-800 group-hover:bg-yellow-500 group-hover:text-black text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-lg"><Play size={20} className="fill-current" /> INICIAR TREINO</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
