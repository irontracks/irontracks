                                                        className="w-20 bg-neutral-900 border border-neutral-700 rounded-lg px-3 py-2 text-center font-mono outline-none focus:border-yellow-500"
                                                    />
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Timer de Descanso */}
                    {restTimer.active && (
                        <RestTimerOverlay
                            duration={restTimer.duration}
                            isActive={restTimer.active}
                            onFinish={() => setRestTimer({ active: false, duration: 60 })}
                            onClose={() => setRestTimer({ active: false, duration: 60 })}
                        />
                    )}
                </div>
            );
        };

        // ============================================================================
        // TIMER DE DESCANSO
        // ============================================================================
        const RestTimerOverlay = ({ duration, onFinish, isActive, onClose }) => {
            const [timeLeft, setTimeLeft] = useState(duration);
            const [isFinished, setIsFinished] = useState(false);

            useEffect(() => {
                if (!isActive) {
                    setIsFinished(false);
                    return;
                }

                const targetTime = Date.now() + (duration * 1000);
                setIsFinished(false);

                const interval = setInterval(() => {
                    const now = Date.now();
                    const remaining = Math.ceil((targetTime - now) / 1000);
                    
                    if (remaining <= 0) {
                        clearInterval(interval);
                        setTimeLeft(0);
                        setIsFinished(true);
                    } else {
                        setTimeLeft(remaining);
                    }
                }, 100);

                return () => clearInterval(interval);
            }, [isActive, duration]);

            if (!isActive) return null;

            if (isFinished) {
                return (
                    <div 
                        className="fixed inset-0 z-[100] bg-green-500 flex flex-col items-center justify-center animate-pulse-fast cursor-pointer"
                        onClick={onFinish}
                    >
                        <Timer size={120} className="text-black mb-8 animate-bounce"/>
                        <h1 className="text-6xl font-black text-black uppercase tracking-tighter">BORA!</h1>
                        <p className="text-black font-bold mt-4 text-xl">TOQUE PARA VOLTAR</p>
                    </div>
                );
            }

            return (
                <div className="fixed bottom-0 left-0 right-0 bg-neutral-900/95 backdrop-blur-xl border-t-2 border-yellow-500 p-6 shadow-2xl z-50 animate-slide-up pb-safe">
                    <div className="flex items-center justify-between max-w-md mx-auto">
                        <div className="flex items-center gap-4">
                            <div className="relative">
                                <div className="absolute inset-0 bg-yellow-500 blur-lg opacity-20 animate-pulse"></div>
                                <Timer className="text-yellow-500 relative z-10" size={36}/>
                            </div>
                            <div>
                                <p className="text-[10px] text-yellow-500 uppercase font-bold tracking-widest">
                                    Recuperação
                                </p>
                                <p className="text-4xl font-mono font-black text-white tabular-nums leading-none">
                                    {formatDuration(timeLeft)}
                                </p>
                            </div>
                        </div>
                        
                        <div className="flex gap-2">
                            <button 
                                onClick={onClose}
                                className="h-12 px-6 bg-yellow-500 text-black rounded-xl font-bold hover:bg-yellow-400 active:scale-95 transition-transform"
                            >
                                PULAR
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // RELATÓRIO DE TREINO
        // ============================================================================
        const WorkoutReport = ({ session, previousSession, onClose }) => {
            const reportRef = useRef();

            const currentVolume = useMemo(() => calculateVolume(session.logs), [session.logs]);
            const prevVolume = useMemo(() => 
                previousSession ? calculateVolume(previousSession.logs) : 0
            , [previousSession]);
            
            const volumeDelta = prevVolume > 0 ? ((currentVolume - prevVolume) / prevVolume) * 100 : 0;
            const durationInMinutes = session.totalTime / 60;
            const calories = calculateCalories(currentVolume, durationInMinutes);

            const prevLogsMap = useMemo(() => {
                if (!previousSession) return {};
                
                const map = {};
                previousSession.exercises.forEach((ex, exIdx) => {
                    const exLogs = [];
                    Object.keys(previousSession.logs).forEach(key => {
                        const [eIdx] = key.split('-');
                        if (parseInt(eIdx) === exIdx) {
                            exLogs.push(previousSession.logs[key]);
                        }
                    });
                    map[ex.name] = exLogs;
                });
                return map;
            }, [previousSession]);

            const handleDownloadPDF = useCallback(() => {
                const element = reportRef.current;
                const opt = {
                    margin: 0,
                    filename: `IronTracks_${session.workoutTitle.replace(/\s+/g, '_')}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save();
            }, [session.workoutTitle]);

            return (
                <div className="fixed inset-0 z-50 overflow-y-auto bg-neutral-900">
                    <div className="fixed top-4 right-4 flex gap-2 no-print z-50">
                        <button 
                            onClick={handleDownloadPDF}
                            className="bg-yellow-500 hover:bg-yellow-400 text-black px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg"
                        >
                            <Download size={20} /> PDF
                        </button>
                        <button 
                            onClick={onClose}
                            className="bg-white text-black p-3 rounded-xl font-bold shadow-lg"
                        >
                            <X size={20} />
                        </button>
                    </div>

                    <div ref={reportRef} className="min-h-screen bg-white p-8 max-w-4xl mx-auto text-black">
                        {/* Header */}
                        <div className="border-b-4 border-black pb-6 mb-8 flex justify-between items-end">
                            <div>
                                <h1 className="text-4xl font-black italic tracking-tighter mb-1">
                                    IRON<span className="text-neutral-500">TRACKS</span>
                                </h1>
                                <p className="text-sm font-bold uppercase tracking-widest text-neutral-500">
                                    Relatório de Performance v{CONFIG.app.version}
                                </p>
                            </div>
                            <div className="text-right">
                                <p className="text-2xl font-bold">{session.workoutTitle}</p>
                                <p className="text-neutral-600">{formatDate(session.date)}</p>
                            </div>
                        </div>

                        {/* Métricas */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                            <div className="bg-neutral-100 p-4 rounded-lg border border-neutral-200">
                                <p className="text-xs font-bold uppercase text-neutral-500 mb-1">
                                    Tempo Total
                                </p>
                                <p className="text-3xl font-mono font-bold">
                                    {formatDuration(session.totalTime)}
                                </p>
                            </div>

                            <div className="bg-neutral-100 p-4 rounded-lg border border-neutral-200">
                                <p className="text-xs font-bold uppercase text-neutral-500 mb-1">
                                    Volume (Kg)
                                </p>
                                <div className="flex items-baseline gap-2">
                                    <p className="text-3xl font-mono font-bold">
                                        {currentVolume.toLocaleString()}
                                    </p>
                                    {previousSession && (
                                        <span className={`text-xs font-bold flex items-center ${
                                            volumeDelta >= 0 ? 'text-green-600' : 'text-red-600'
                                        }`}>
                                            {volumeDelta >= 0 ? <TrendingUp size={12}/> : <TrendingDown size={12}/>}
                                            {volumeDelta > 0 ? '+' : ''}{volumeDelta.toFixed(1)}%
                                        </span>
                                    )}
                                </div>
                            </div>

                            <div className="bg-orange-50 p-4 rounded-lg border border-orange-200">
                                <p className="text-xs font-bold uppercase text-orange-500 mb-1 flex items-center gap-1">
                                    <Flame size={12}/> Calorias (Est.)
                                </p>
                                <p className="text-3xl font-mono font-bold text-orange-600">
                                    ~{calories}
                                </p>
                            </div>

                            <div className="bg-black text-white p-4 rounded-lg">
                                <p className="text-xs font-bold uppercase text-neutral-400 mb-1">
                                    Status
                                </p>
                                <p className="text-xl font-bold uppercase italic">
                                    CONCLUÍDO
                                </p>
                            </div>
                        </div>

                        {/* Exercícios */}
                        <div className="space-y-8">
                            {session.exercises.map((ex, exIdx) => {
                                const prevLogs = prevLogsMap[ex.name] || [];
                                
                                return (
                                    <div key={exIdx} className="break-inside-avoid">
                                        <div className="flex justify-between items-end mb-2 border-b-2 border-neutral-200 pb-2">
                                            <h3 className="text-xl font-bold uppercase flex items-center gap-2">
                                                <span className="bg-black text-white w-6 h-6 flex items-center justify-center rounded text-xs">
                                                    {exIdx + 1}
                                                </span>
                                                {ex.name}
                                            </h3>
                                            <div className="text-xs font-mono text-neutral-500">
                                                Cadência: <span className="font-bold text-black">{ex.cadence || '-'}</span>
                                            </div>
                                        </div>

                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className="text-neutral-500 border-b border-neutral-100">
                                                    <th className="py-2 text-left w-16">Série</th>
                                                    <th className="py-2 text-center w-24">Carga</th>
                                                    <th className="py-2 text-center w-24">Reps</th>
                                                    <th className="py-2 text-center w-32">Evolução</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {Array.from({ length: parseInt(ex.sets) }).map((_, sIdx) => {
                                                    const key = `${exIdx}-${sIdx}`;
                                                    const log = session.logs[key];
                                                    const prevLog = prevLogs[sIdx];
                                                    
                                                    if (!log || !log.done) return null;

                                                    let progressionText = "-";
                                                    let rowClass = "";
                                                    
                                                    if (prevLog && prevLog.weight) {
                                                        const delta = parseFloat(log.weight) - parseFloat(prevLog.weight);
                                                        if (delta > 0) {
                                                            progressionText = `+${delta}kg`;
                                                            rowClass = "bg-green-50 text-green-900 font-bold";
                                                        } else if (delta < 0) {
                                                            progressionText = `${delta}kg`;
                                                            rowClass = "text-red-600 font-bold";
                                                        } else {
                                                            progressionText = "=";
                                                        }
                                                    }

                                                    return (
                                                        <tr key={sIdx} className="border-b border-neutral-100">
                                                            <td className="py-3 font-mono text-neutral-500">#{sIdx + 1}</td>
                                                            <td className="py-3 text-center font-bold text-lg">{log.weight}kg</td>
                                                            <td className="py-3 text-center font-mono">{log.reps}</td>
                                                            <td className={`py-3 text-center text-xs uppercase ${rowClass}`}>
                                                                {progressionText}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Footer */}
                        <div className="mt-12 pt-6 border-t border-neutral-200 text-center text-xs text-neutral-400 uppercase tracking-widest">
                            IronTracks System • {getCurrentDate()}
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // HISTÓRICO
        // ============================================================================
        const HistoryList = memo(({ user, onViewReport, onBack }) => {
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadHistory = async () => {
                    try {
                        const historyRef = collection(db, 'artifacts', CONFIG.app.id, 'users', user.uid, 'history');
                        const q = query(historyRef, orderBy('date', 'desc'), limit(CONFIG.limits.historyLimit));
                        const snapshot = await getDocs(q);
                        setHistory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    } catch(e) {
                        console.error("Erro ao carregar histórico:", e);
                    } finally {
                        setLoading(false);
                    }
                };
                loadHistory();
            }, [user]);

            const handleDelete = useCallback(async (e, sessionId) => {
                e.stopPropagation();
                if (!confirm("Apagar esse registro?")) return;
                
                try {
                    await deleteDoc(doc(db, 'artifacts', CONFIG.app.id, 'users', user.uid, 'history', sessionId));
                    setHistory(prev => prev.filter(h => h.id !== sessionId));
                } catch (error) {
                    alert("Erro ao excluir.");
                }
            }, [user]);

            return (
                <div className="min-h-screen bg-neutral-900 text-white p-4 pb-20">
                    <div className="flex items-center gap-3 mb-6 pt-safe">
                        <button onClick={onBack} className="p-2 bg-neutral-800 rounded-lg hover:bg-neutral-700">
                            <ArrowLeft/>
                        </button>
                        <h2 className="text-xl font-bold flex items-center gap-2">
                            <History className="text-yellow-500"/> Histórico
                        </h2>
                    </div>

                    {loading && (
                        <p className="text-center text-neutral-500 animate-pulse">
                            Carregando...
                        </p>
                    )}

                    {!loading && history.length === 0 && (
                        <div className="text-center py-10 opacity-50">
                            <p>Nenhum treino finalizado ainda.</p>
                        </div>
                    )}

                    <div className="space-y-3">
                        {history.map(session => (
                            <div 
                                key={session.id}
                                onClick={() => onViewReport(session)}
                                className="bg-neutral-800 p-4 rounded-xl border border-neutral-700 active:scale-95 transition-transform cursor-pointer hover:border-yellow-500/50"
                            >
                                <div className="flex justify-between items-start mb-2">
                                    <div>
                                        <h3 className="font-bold text-lg text-white">{session.workoutTitle}</h3>
                                        <p className="text-xs text-neutral-400 flex items-center gap-1 mt-1">
                                            <Calendar size={12}/> {formatDate(session.date)}
                                        </p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-yellow-500 font-mono font-bold text-sm">
                                            {formatDuration(session.totalTime)}
                                        </p>
                                        <p className="text-xs text-neutral-500">Duração</p>
                                    </div>
                                </div>
                                <button 
                                    onClick={(e) => handleDelete(e, session.id)}
                                    className="text-red-500 text-xs flex items-center gap-1 hover:text-red-400"
                                >
                                    <Trash2 size={14} /> Excluir
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        });

        // ============================================================================
        // CHAT (Simplificado)
        // ============================================================================
        const ChatScreen = memo(({ user, onClose }) => {
            const [activeChat, setActiveChat] = useState(null);
            const [usersList, setUsersList] = useState([]);
            const [messages, setMessages] = useState([]);
            const [newMessage, setNewMessage] = useState('');
            const dummy = useRef();

            useEffect(() => {
                const q = query(
                    collection(db, 'artifacts', CONFIG.app.id, 'public', 'data', 'users'),
                    orderBy('lastSeen', 'desc'),
                    limit(CONFIG.limits.userListLimit)
                );
                return onSnapshot(q, (snapshot) => {
                    setUsersList(snapshot.docs.map(doc => doc.data()).filter(u => u.uid !== user.uid));
                });
            }, [user.uid]);

            useEffect(() => {
                if (!activeChat) return;

                let collectionPath;
                if (activeChat.id === 'global') {
                    collectionPath = collection(db, 'artifacts', CONFIG.app.id, 'public', 'data', 'messages');
                } else {
                    const userIds = [user.uid, activeChat.uid].sort();
                    const chatId = `chat_${userIds[0]}_${userIds[1]}`;
                    collectionPath = collection(db, 'artifacts', CONFIG.app.id, 'public', 'data', 'chats', chatId, 'messages');
                }

                const q = query(collectionPath, orderBy('createdAt', 'desc'), limit(CONFIG.limits.messageLimit));
                return onSnapshot(q, (snapshot) => {
                    setMessages(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).reverse());
                });
            }, [activeChat, user.uid]);

            useEffect(() => {
                dummy.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const sendMessage = useCallback(async (e) => {
                e.preventDefault();
                if (!newMessage.trim() || !activeChat) return;

                const text = newMessage;
                setNewMessage('');

                let collectionPath;
                if (activeChat.id === 'global') {
                    collectionPath = collection(db, 'artifacts', CONFIG.app.id, 'public', 'data', 'messages');
                } else {
                    const userIds = [user.uid, activeChat.uid].sort();
                    const chatId = `chat_${userIds[0]}_${userIds[1]}`;
                    collectionPath = collection(db, 'artifacts', CONFIG.app.id, 'public', 'data', 'chats', chatId, 'messages');
                }

                await addDoc(collectionPath, {
                    text,
                    createdAt: serverTimestamp(),
                    uid: user.uid,
                    displayName: user.displayName || 'Anônimo',
                    photoURL: user.photoURL
                });
            }, [newMessage, activeChat, user]);

            return (
                <div className="fixed inset-0 z-50 bg-neutral-900 flex flex-col animate-slide-up">
                    <div className="p-4 bg-neutral-800 border-b border-neutral-700 flex justify-between items-center shadow-lg pt-safe">
                        <div className="flex items-center gap-3">
                            {activeChat ? (
                                <button onClick={() => setActiveChat(null)} className="p-1 rounded-full hover:bg-neutral-600">
                                    <ArrowLeft size={20} />
                                </button>
                            ) : (
                                <div className="bg-yellow-500 p-2 rounded-full text-black">
                                    <MessageSquare size={20} />
                                </div>
                            )}
                            <div>
                                <h3 className="font-bold text-lg">
                                    {activeChat ? (activeChat.displayName || activeChat.title) : 'Mensagens'}
                                </h3>
                            </div>
                        </div>
                        <button onClick={onClose} className="p-2 bg-neutral-700 rounded-full hover:bg-neutral-600">
                            <X size={20} />
                        </button>
                    </div>

                    {!activeChat && (
                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            <button 
                                onClick={() => setActiveChat({ id: 'global', title: 'Iron Lounge', displayName: 'Iron Lounge' })}
                                className="w-full bg-neutral-800 p-4 rounded-xl flex items-center gap-4 hover:bg-neutral-700"
                            >
                                <div className="w-12 h-12 rounded-full bg-yellow-500 flex items-center justify-center text-black">
                                    <Users size={24} />
                                </div>
                                <div className="text-left">
                                    <p className="font-bold text-white">Iron Lounge</p>
                                    <p className="text-xs text-neutral-400">Chat Global</p>
                                </div>
                            </button>

                            <p className="text-xs font-bold text-neutral-500 uppercase mt-6 mb-2">Atletas Online</p>
                            
                            {usersList.map((u, idx) => (
                                <button 
                                    key={idx}
                                    onClick={() => setActiveChat(u)}
                                    className="w-full bg-neutral-800/50 p-4 rounded-xl flex items-center gap-3 hover:bg-neutral-800"
                                >
                                    {u.photoURL ? (
                                        <img src={u.photoURL} className="w-12 h-12 rounded-full" alt="" />
                                    ) : (
                                        <div className="w-12 h-12 rounded-full bg-neutral-700 flex items-center justify-center font-bold">
                                            {u.displayName?.[0]}
                                        </div>
                                    )}
                                    <div className="text-left">
                                        <p className="font-bold text-white">{u.displayName}</p>
                                        <p className="text-xs text-green-500">● Online</p>
                                    </div>
                                </button>
                            ))}
                        </div>
                    )}

                    {activeChat && (
                        <>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-black/50">
                                {messages.map(msg => {
                                    const isMe = msg.uid === user.uid;
                                    return (
                                        <div key={msg.id} className={`flex gap-3 ${isMe ? 'flex-row-reverse' : ''}`}>
                                            {msg.photoURL ? (
                                                <img src={msg.photoURL} className="w-8 h-8 rounded-full" alt="" />
                                            ) : (
                                                <div className="w-8 h-8 rounded-full bg-neutral-700 flex items-center justify-center text-xs font-bold">
                                                    {msg.displayName?.[0]}
                                                </div>
                                            )}
                                            <div className={`max-w-[80%] rounded-2xl p-3 text-sm ${
                                                isMe 
                                                    ? 'bg-yellow-500 text-black rounded-tr-none' 
                                                    : 'bg-neutral-800 text-white rounded-tl-none'
                                            }`}>
                                                {!isMe && (
                                                    <p className="text-[10px] font-bold text-neutral-400 mb-1">
                                                        {msg.displayName}
                                                    </p>
                                                )}
                                                <p>{msg.text}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                                <div ref={dummy}></div>
                            </div>

                            <form onSubmit={sendMessage} className="p-4 bg-neutral-800 border-t border-neutral-700 flex gap-2 pb-safe">
                                <input 
                                    value={newMessage}
                                    onChange={(e) => setNewMessage(e.target.value)}
                                    className="flex-1 bg-neutral-900 border border-neutral-600 rounded-full px-4 py-3 text-white outline-none focus:border-yellow-500"
                                    placeholder="Mensagem..."
                                    maxLength={500}
                                />
                                <button 
                                    type="submit"
                                    disabled={!newMessage.trim()}
                                    className="bg-yellow-500 text-black p-3 rounded-full hover:bg-yellow-400 disabled:opacity-50"
                                >
                                    <Send size={20} />
                                </button>
                            </form>
                        </>
                    )}
                </div>
            );
        });

        // ============================================================================
        // PAINEL ADMIN (Simplificado - sem duplicar o AdminWorkoutEditor)
        // ============================================================================
        const AdminPanel = memo(({ user, onClose }) => {
            const [tab, setTab] = useState('students');
            const [usersList, setUsersList] = useState([]);
            const [templates, setTemplates] = useState([]);
            const [selectedStudent, setSelectedStudent] = useState(null);

            useEffect(() => {
                const q = query(
                    collection(db, 'artifacts', CONFIG.app.id, 'public', 'data', 'users'),
                    orderBy('lastSeen', 'desc')
                );
                return onSnapshot(q, snap => setUsersList(snap.docs.map(d => d.data())));
            }, []);

            useEffect(() => {
                const q = query(
                    collection(db, 'artifacts', CONFIG.app.id, 'public', 'data', 'templates'),
                    orderBy('createdAt', 'desc')
                );
                return onSnapshot(q, snap => setTemplates(snap.docs.map(d => ({id: d.id, ...d.data()}))));
            }, []);

            return (
                <div className="fixed inset-0 z-50 bg-neutral-900 overflow-y-auto animate-slide-up">
                    <div className="sticky top-0 bg-yellow-500 text-black p-4 flex justify-between items-center z-10">
                        <h2 className="font-black text-xl flex items-center gap-2">
                            <Crown size={24}/> COMMAND CENTER
                        </h2>
                        <button onClick={onClose} className="bg-black/20 p-2 rounded-lg">
                            <X size={24}/>
                        </button>
                    </div>

                    {!selectedStudent && (
                        <div className="flex p-2 gap-2 bg-neutral-800">
                            <button 
                                onClick={() => setTab('students')}
                                className={`flex-1 py-3 rounded-lg font-bold ${
                                    tab === 'students' ? 'bg-neutral-700 text-white' : 'text-neutral-500'
                                }`}
                            >
                                Alunos ({usersList.length})
                            </button>
                            <button 
                                onClick={() => setTab('templates')}
                                className={`flex-1 py-3 rounded-lg font-bold ${
                                    tab === 'templates' ? 'bg-neutral-700 text-white' : 'text-neutral-500'
                                }`}
                            >
                                Templates ({templates.length})
                            </button>
                        </div>
                    )}

                    <div className="p-4 pb-20">
                        {tab === 'students' && !selectedStudent && (
                            <div className="space-y-3">
                                {usersList.map(u => (
                                    <div 
                                        key={u.uid}
                                        onClick={() => setSelectedStudent(u)}
                                        className="bg-neutral-800 p-4 rounded-xl flex items-center gap-4 border border-neutral-700 hover:border-yellow-500 cursor-pointer"
                                    >
                                        {u.photoURL ? (
                                            <img src={u.photoURL} className="w-12 h-12 rounded-full" alt="" />
                                        ) : (
                                            <div className="w-12 h-12 bg-neutral-600 rounded-full flex items-center justify-center font-bold">
                                                {u.displayName?.[0]}
                                            </div>
                                        )}
                                        <div className="flex-1">
                                            <h3 className="font-bold text-lg">{u.displayName}</h3>
                                            <p className="text-xs text-neutral-400">
                                                Visto: {formatLastSeen(u.lastSeen)}
                                            </p>
                                        </div>
                                        <ArrowLeft className="rotate-180 text-neutral-500"/>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'templates' && (
                            <div className="space-y-3">
                                <p className="text-sm text-neutral-400 mb-4">
                                    Templates são modelos de treino que podem ser clonados para alunos específicos.
                                </p>
                                {templates.map(t => (
                                    <div key={t.id} className="bg-neutral-800 p-4 rounded-xl border border-neutral-700">
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <h3 className="font-bold text-white">{t.title}</h3>
                                                <p className="text-xs text-neutral-500">
                                                    {t.exercises?.length || 0} exercícios
                                                </p>
                                            </div>
                                            <button 
                                                onClick={async () => {
                                                    if(confirm('Apagar este template?')) {
                                                        await deleteDoc(doc(db, 'artifacts', CONFIG.app.id, 'public', 'data', 'templates', t.id));
                                                    }
                                                }}
                                                className="p-2 bg-red-900/30 text-red-500 rounded-lg"
                                            >
                                                <Trash2 size={16}/>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {selectedStudent && (
                            <div>
                                <button 
                                    onClick={() => setSelectedStudent(null)}
                                    className="flex items-center gap-2 mb-4 text-yellow-500"
                                >
                                    <ArrowLeft size={20}/> Voltar
                                </button>
                                <h2 className="text-2xl font-bold mb-2">{selectedStudent.displayName}</h2>
                                <p className="text-sm text-neutral-400 mb-6">{selectedStudent.email}</p>
                                
                                <div className="bg-neutral-800 p-6 rounded-xl border border-neutral-700 text-center">
                                    <p className="text-neutral-400 mb-4">
                                        Funcionalidades de gestão de alunos em desenvolvimento
                                    </p>
                                    <p className="text-xs text-neutral-600">
                                        Em breve: clonagem de templates, acompanhamento de progresso, etc.
                                    </p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        });

        // ============================================================================
        // APP PRINCIPAL
        // ============================================================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [view, setView] = useState('dashboard');
            const [workouts, setWorkouts] = useState([]);
            const [currentWorkout, setCurrentWorkout] = useState(null);
            const [importCode, setImportCode] = useState('');
            const [shareCode, setShareCode] = useState(null);
            const [reportData, setReportData] = useState({ current: null, previous: null });
            const [notification, setNotification] = useState(null);

            // Auth State Management
            useEffect(() => {
                localStorage.removeItem('auth_pending');
                
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoading(false);
                });
                
                return unsubscribe;
            }, []);

            // Update user presence
            useEffect(() => {
                if (!user) return;
                
                setDoc(
                    doc(db, 'artifacts', CONFIG.app.id, 'public', 'data', 'users', user.uid),
                    {
                        uid: user.uid,
                        displayName: user.displayName || 'Anônimo',
                        email: user.email,
                        photoURL: user.photoURL,
                        lastSeen: serverTimestamp()
                    },
                    { merge: true }
                );
            }, [user]);

            // Load workouts
            useEffect(() => {
                if (!user) return;
                
                const q = query(
                    collection(db, 'artifacts', CONFIG.app.id, 'users', user.uid, 'workouts'),
                    orderBy('createdAt', 'desc')
                );
                
                return onSnapshot(q, s => setWorkouts(s.docs.map(d => ({ id: d.id, ...d.data() }))));
            }, [user]);

            // Notification listener
            useEffect(() => {
                if (!user) return;
                
                const q = query(
                    collection(db, 'artifacts', CONFIG.app.id, 'public', 'data', 'messages'),
                    orderBy('createdAt', 'desc'),
                    limit(1)
                );
                
                return onSnapshot(q, s => {
                    if (!s.empty) {
                        const m = s.docs[0].data();
                        if (m.createdAt?.toMillis() > Date.now() - 10000 && m.uid !== user.uid) {
                            setNotification({id: s.docs[0].id, ...m});
                            setTimeout(() => setNotification(null), 4000);
                        }
                    }
                });
            }, [user]);

            // Handlers
            const handleCreateWorkout = useCallback(() => {
                setCurrentWorkout({ 
                    title: '', 
                    exercises: [] 
                });
                setView('edit');
            }, []);

            const handleSaveWorkout = useCallback(async () => {
                if (!user || !currentWorkout) return;
                
                try {
                    validateWorkout(currentWorkout);
                    
                    const workoutData = {
                        ...currentWorkout,
                        createdAt: serverTimestamp(),
                        authorName: user.displayName,
                        authorId: user.uid,
                        lastModified: serverTimestamp()
                    };

                    if (currentWorkout.id) {
                        await setDoc(
                            doc(db, 'artifacts', CONFIG.app.id, 'users', user.uid, 'workouts', currentWorkout.id),
                            workoutData
                        );
                    } else {
                        await addDoc(
                            collection(db, 'artifacts', CONFIG.app.id, 'users', user.uid, 'workouts'),
                            workoutData
                        );
                    }
                    
                    setView('dashboard');
                    setCurrentWorkout(null);
                } catch (error) {
                    alert(error.message);
                }
            }, [user, currentWorkout]);

            const handleDeleteWorkout = useCallback(async (id) => {
                if (!confirm("Apagar este treino?")) return;
                
                try {
                    await deleteDoc(doc(db, 'artifacts', CONFIG.app.id, 'users', user.uid, 'workouts', id));
                } catch (error) {
                    alert("Erro ao deletar: " + error.message);
                }
            }, [user]);

            const handleShareWorkout = useCallback(async (workout) => {
                try {
                    const shareData = {
                        ...workout,
                        originalAuthor: user.displayName,
                        sharedAt: serverTimestamp()
                    };
                    
                    const docRef = await addDoc(
                        collection(db, 'artifacts', CONFIG.app.id, 'public', 'data', 'shared_workouts'),
                        shareData
                    );
                    
                    setShareCode(docRef.id);
                } catch (error) {
                    alert("Erro ao compartilhar.");
                }
            }, [user]);

            const handleImportWorkout = useCallback(async () => {
                if (!importCode.trim()) return;
                
                try {
                    const docSnap = await getDoc(
                        doc(db, 'artifacts', CONFIG.app.id, 'public', 'data', 'shared_workouts', importCode.trim())
                    );
                    
                    if (docSnap.exists()) {
                        await addDoc(
                            collection(db, 'artifacts', CONFIG.app.id, 'users', user.uid, 'workouts'),
                            {
                                title: docSnap.data().title + " (Importado)",
                                exercises: docSnap.data().exercises,
                                importedFrom: docSnap.data().originalAuthor,
                                createdAt: serverTimestamp()
                            }
                        );
                        
                        setView('dashboard');
                        setImportCode('');
                        alert("Treino importado com sucesso!");
                    } else {
                        alert("Código inválido.");
                    }
                } catch (error) {
                    alert("Erro ao importar.");
                }
            }, [importCode, user]);

            const copyToClipboard = useCallback((text) => {
                navigator.clipboard.writeText(text).then(
                    () => alert("Código copiado!"),
                    () => {
                        // Fallback
                        const el = document.createElement('textarea');
                        el.value = text;
                        document.body.appendChild(el);
                        el.select();
                        document.execCommand('copy');
                        document.body.removeChild(el);
                        alert("Código copiado!");
                    }
                );
            }, []);

            const updateExercise = useCallback((idx, field, value) => {
                setCurrentWorkout(prev => {
                    const newExercises = [...prev.exercises];
                    newExercises[idx] = { ...newExercises[idx], [field]: value };
                    return { ...prev, exercises: newExercises };
                });
            }, []);

            const removeExercise = useCallback((idx) => {
                setCurrentWorkout(prev => ({
                    ...prev,
                    exercises: prev.exercises.filter((_, i) => i !== idx)
                }));
            }, []);

            const addExercise = useCallback(() => {
                setCurrentWorkout(prev => ({
                    ...prev,
                    exercises: [...prev.exercises, { ...CONFIG.defaults.exercise }]
                }));
            }, []);

            if (authLoading) return <LoadingScreen />;
            if (!user) return <LoginScreen />;

            const isAdmin = user.email === CONFIG.app.adminEmail;

            return (
                <ErrorBoundary>
                    <div className="min-h-[100dvh] bg-neutral-950 text-white font-sans selection:bg-yellow-500 selection:text-black">
                        <NotificationToast notification={notification} onClose={() => setNotification(null)} />
                        
                        {view === 'admin' && isAdmin && <AdminPanel user={user} onClose={() => setView('dashboard')} />}
                        {view === 'chat' && <ChatScreen user={user} onClose={() => setView('dashboard')} />}
                        {view === 'history' && (
                            <HistoryList 
                                user={user}
                                onViewReport={(s) => {
                                    setReportData({ current: s, previous: null });
                                    setView('report');
                                }}
                                onBack={() => setView('dashboard')}
                            />
                        )}
                        {view === 'report' && reportData.current && (
                            <WorkoutReport 
                                session={reportData.current}
                                previousSession={reportData.previous}
                                onClose={() => setView('dashboard')}
                            />
                        )}
                        {view === 'active' && currentWorkout && (
                            <ActiveWorkout 
                                workout={currentWorkout}
                                user={user}
                                onFinish={(current, previous) => {
                                    setReportData({ current, previous });
                                    setView('report');
                                }}
                                onBack={() => setView('dashboard')}
                            />
                        )}
                        
                        {view === 'edit' && currentWorkout && (
                            <div className="min-h-[100dvh] bg-neutral-900 text-white p-4 pb-20">
                                <div className="flex justify-between items-center mb-6 pt-safe">
                                    <button 
                                        onClick={() => setView('dashboard')}
                                        className="p-2 bg-neutral-800 rounded-lg hover:bg-neutral-700"
                                    >
                                        <RotateCcw size={20} />
                                    </button>
                                    <h2 className="font-bold text-lg">
                                        {currentWorkout.id ? 'Editar Treino' : 'Novo Treino'}
                                    </h2>
                                    <button 
                                        onClick={handleSaveWorkout}
                                        className="p-2 bg-yellow-500 text-black rounded-lg hover:bg-yellow-400"
                                    >
                                        <Save size={20} />
                                    </button>
                                </div>

                                <div className="mb-6">
                                    <label className="text-xs text-neutral-500 uppercase font-bold block mb-2">
                                        Nome do Treino
                                    </label>
                                    <input 
                                        type="text"
                                        value={currentWorkout.title || ''}
                                        onChange={(e) => setCurrentWorkout({...currentWorkout, title: e.target.value})}
                                        className="w-full bg-neutral-800 border-b-2 border-neutral-700 p-3 text-xl font-bold focus:border-yellow-500 outline-none transition-colors"
                                        placeholder="Ex: Treino A - Peito e Tríceps"
                                        maxLength={100}
                                    />
                                </div>

                                <div className="space-y-4">
                                    {currentWorkout.exercises.map((ex, idx) => (
                                        <ExerciseEditor 
                                            key={idx}
                                            index={idx}
                                            exercise={ex}
                                            updateExercise={updateExercise}
                                            removeExercise={removeExercise}
                                        />
                                    ))}
                                </div>

                                <button 
                                    onClick={addExercise}
                                    className="w-full mt-6 py-4 border-2 border-dashed border-neutral-700 rounded-xl text-neutral-400 font-bold hover:bg-neutral-800 hover:border-yellow-500 transition-all"
                                >
                                    <Plus size={20} className="inline mr-2" />
                                    Adicionar Exercício
                                </button>
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <>
                                <div className="p-6 bg-gradient-to-b from-neutral-900 to-neutral-950 border-b border-neutral-800 sticky top-0 z-30 pt-safe">
                                    <div className="flex justify-between items-center mb-6">
                                        <div className="flex items-center gap-3 flex-1 min-w-0">
                                            {user.photoURL ? (
                                                <img 
                                                    src={user.photoURL}
                                                    className="w-10 h-10 rounded-full border-2 border-yellow-500 shrink-0"
                                                    alt=""
                                                />
                                            ) : (
                                                <div className="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-black font-bold text-lg shrink-0">
                                                    {user.displayName?.[0]}
                                                </div>
                                            )}
                                            <div className="flex-1 min-w-0">
                                                <p className="text-[9px] text-yellow-500 uppercase font-bold tracking-widest">
                                                    Bem-vindo
                                                </p>
                                                <h1 className="font-black text-lg leading-none tracking-tight truncate">
                                                    {user.displayName || 'Atleta'}
                                                </h1>
                                            </div>
                                        </div>
                                        
                                        <div className="flex gap-2 shrink-0">
                                            {isAdmin && (
                                                <button 
                                                    onClick={() => setView('admin')}
                                                    className="bg-yellow-500 text-black p-2 rounded-full font-black text-[10px] h-9 w-9 flex items-center justify-center hover:bg-yellow-400"
                                                >
                                                    <Crown size={16} />
                                                </button>
                                            )}
                                            <button 
                                                onClick={() => setView('history')}
                                                className="bg-neutral-800 p-2 rounded-full text-neutral-400 hover:text-white h-9 w-9 flex items-center justify-center"
                                            >
                                                <History size={16} />
                                            </button>
                                            <button 
                                                onClick={() => setView('chat')}
                                                className="bg-neutral-800 p-2 rounded-full text-neutral-400 hover:text-white h-9 w-9 flex items-center justify-center"
                                            >
                                                <MessageSquare size={16} />
                                            </button>
                                            <button 
                                                onClick={() => signOut(auth)}
                                                className="text-neutral-600 hover:text-red-500 p-2 h-9 w-9 flex items-center justify-center"
                                            >
                                                <LogOut size={16} />
                                            </button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <button 
                                            onClick={() => setView('import')}
                                            className="bg-neutral-800/50 p-4 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold border border-neutral-800 hover:border-blue-500/50"
                                        >
                                            <Download size={18} className="text-blue-500" /> Importar
                                        </button>
                                        <button 
                                            onClick={handleCreateWorkout}
                                            className="bg-yellow-500 text-black p-4 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold hover:bg-yellow-400 shadow-lg"
                                        >
                                            <Plus size={18} /> Novo Treino
                                        </button>
                                    </div>
                                </div>

                                {view === 'import' && (
                                    <div className="m-4 p-6 bg-neutral-900 rounded-3xl border border-blue-500/30">
                                        <h3 className="font-bold mb-4 flex items-center gap-2 text-blue-400 text-lg">
                                            <Download size={20}/> Importar Treino
                                        </h3>
                                        <p className="text-sm text-neutral-400 mb-4">
                                            Cole o código de compartilhamento recebido:
                                        </p>
                                        <div className="flex gap-2">
                                            <input 
                                                value={importCode}
                                                onChange={(e) => setImportCode(e.target.value)}
                                                placeholder="Código do treino..."
                                                className="flex-1 bg-black border border-neutral-700 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500 font-mono"
                                            />
                                            <button 
                                                onClick={handleImportWorkout}
                                                className="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold"
                                            >
                                                Importar
                                            </button>
                                        </div>
                                        <button 
                                            onClick={() => setView('dashboard')}
                                            className="mt-4 text-xs text-neutral-500 hover:text-white underline"
                                        >
                                            Cancelar
                                        </button>
                                    </div>
                                )}

                                {shareCode && (
                                    <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-50 backdrop-blur-md">
                                        <div className="bg-neutral-900 p-8 rounded-3xl w-full max-w-sm border border-neutral-800 shadow-2xl">
                                            <h3 className="text-2xl font-black text-center mb-2 text-white">
                                                Código Gerado!
                                            </h3>
                                            <p className="text-sm text-neutral-400 text-center mb-6">
                                                Compartilhe este código com outros atletas:
                                            </p>
                                            <div 
                                                className="bg-black p-6 rounded-2xl border border-neutral-700 mb-6 cursor-pointer hover:border-yellow-500 transition-colors"
                                                onClick={() => copyToClipboard(shareCode)}
                                            >
                                                <p className="font-mono text-xl font-bold text-center text-green-500 select-all">
                                                    {shareCode}
                                                </p>
                                                <p className="text-xs text-neutral-500 text-center mt-2">
                                                    Toque para copiar
                                                </p>
                                            </div>
                                            <button 
                                                onClick={() => setShareCode(null)}
                                                className="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-4 rounded-xl"
                                            >
                                                Fechar
                                            </button>
                                        </div>
                                    </div>
                                )}

                                <div className="p-4 space-y-4 pb-20">
                                    <h2 className="text-neutral-500 text-[10px] font-bold uppercase tracking-widest mb-4 pl-2">
                                        Meus Treinos ({workouts.length})
                                    </h2>

                                    {workouts.length === 0 && (
                                        <div className="text-center py-20 opacity-30">
                                            <Dumbbell size={64} className="mb-4 text-neutral-500 mx-auto" />
                                            <p className="text-neutral-400 font-medium">
                                                Nenhum treino criado ainda.
                                            </p>
                                            <p className="text-neutral-600 text-sm mt-2">
                                                Clique em "Novo Treino" para começar!
                                            </p>
                                        </div>
                                    )}

                                    {workouts.map(workout => (
                                        <div 
                                            key={workout.id}
                                            className="bg-neutral-900 border border-neutral-800 rounded-3xl p-5 shadow-lg hover:border-neutral-700 transition-all group relative overflow-hidden"
                                        >
                                            <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none group-hover:opacity-10 transition-opacity">
                                                <Dumbbell size={120} />
                                            </div>
                                            
                                            <div className="relative z-10">
                                                <div className="flex justify-between items-start mb-6">
                                                    <div className="flex-1">
                                                        <h3 className="text-2xl font-black text-white group-hover:text-yellow-500 transition-colors tracking-tight">
                                                            {workout.title}
                                                        </h3>
                                                        <div className="flex items-center gap-2 mt-2">
                                                            <span className="bg-neutral-800 text-neutral-400 text-xs px-2 py-1 rounded-md font-bold">
                                                                {workout.exercises.length} EXERCÍCIOS
                                                            </span>
                                                            {workout.importedFrom && (
                                                                <span className="text-blue-500 text-xs font-bold px-2 py-1 bg-blue-500/10 rounded-md border border-blue-500/20">
                                                                    ← {workout.importedFrom}
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="flex gap-1">
                                                        <button 
                                                            onClick={() => handleShareWorkout(workout)}
                                                            className="p-3 text-neutral-500 hover:text-white hover:bg-neutral-800 rounded-xl transition-colors"
                                                            title="Compartilhar"
                                                        >
                                                            <Share2 size={18} />
                                                        </button>
                                                        <button 
                                                            onClick={() => {
                                                                setCurrentWorkout(workout);
                                                                setView('edit');
                                                            }}
                                                            className="p-3 text-neutral-500 hover:text-white hover:bg-neutral-800 rounded-xl transition-colors"
                                                            title="Editar"
                                                        >
                                                            <FileText size={18} />
                                                        </button>
                                                        <button 
                                                            onClick={() => handleDeleteWorkout(workout.id)}
                                                            className="p-3 text-neutral-500 hover:text-red-500 hover:bg-red-500/10 rounded-xl transition-colors"
                                                            title="Excluir"
                                                        >
                                                            <Trash2 size={18} />
                                                        </button>
                                                    </div>
                                                </div>

                                                <button 
                                                    onClick={() => {
                                                        setCurrentWorkout(workout);
                                                        setView('active');
                                                    }}
                                                    className="w-full bg-neutral-800 group-hover:bg-yellow-500 group-hover:text-black text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-lg"
                                                >
                                                    <Play size={20} className="fill-current" />
                                                    INICIAR TREINO
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}
                    </div>
                </ErrorBoundary>
            );
        };

        // ============================================================================
        // RENDER
        // ============================================================================
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
