<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>IronTracks v3.0 - Alta Performance</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'slide-down': 'slideDown 0.3s ease-out',
                        'pulse-fast': 'pulseFast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } },
                        slideDown: { '0%': { transform: 'translateY(-100%)' }, '100%': { transform: 'translateY(0)' } },
                        pulseFast: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.5' } }
                    }
                }
            }
        }
    </script>
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.294.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        html, body { 
            height: 100%; 
            overflow-x: hidden; 
            background-color: #0a0a0a; 
            color: white; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        #root { height: 100%; display: flex; flex-direction: column; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, useCallback, memo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, 
            signInWithPopup,
            signInWithRedirect, 
            GoogleAuthProvider, 
            signOut, 
            onAuthStateChanged,
            getRedirectResult,
            setPersistence,
            browserLocalPersistence
        } from 'firebase/auth';
        import { 
            getFirestore, collection, doc, setDoc, getDoc, addDoc, deleteDoc, 
            onSnapshot, serverTimestamp, query, orderBy, limit, where, getDocs 
        } from 'firebase/firestore';
        import { 
            Dumbbell, Timer, Share2, Plus, Trash2, Save, LogOut, Play, 
            CheckCircle2, RotateCcw, Users, Copy, Download, Activity, 
            Music, Clock, ChevronDown, ChevronUp, FileText, TrendingUp, 
            TrendingDown, Printer, X, MessageSquare, Send, ArrowLeft, Bell, Flame,
            History, Calendar, Crown, Database, UserCog, Megaphone, AlertCircle,
            Shield, Zap
        } from 'lucide-react';

        // ============================================================================
        // CONFIGURAÇÃO CENTRALIZADA
        // ============================================================================
        const CONFIG = {
            firebase: {
                apiKey: "AIzaSyBfy01I69nNCABxnYSqK95e8TwGP1bSv2w",
                authDomain: "irontracks-e6344.firebaseapp.com",
                projectId: "irontracks-e6344",
                storageBucket: "irontracks-e6344.firebasestorage.app",
                messagingSenderId: "212508580918",
                appId: "1:212508580918:web:dd55c3088fec86b8680c97"
            },
            app: {
                id: 'irontracks-production',
                version: '3.0.0',
                adminEmail: 'djmkapple@gmail.com'
            },
            limits: {
                maxWorkouts: 100,
                maxExercisesPerWorkout: 20,
                historyLimit: 50,
                messageLimit: 50,
                userListLimit: 20
            },
            defaults: {
                exercise: {
                    sets: 4,
                    reps: '10',
                    cadence: '3010',
                    restTime: 60,
                    notes: ''
                }
            }
        };

        // Inicialização Firebase
        const app = initializeApp(CONFIG.firebase);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============================================================================
        // UTILITÁRIOS & HELPERS
        // ============================================================================
        
        // Formatação de tempo
        const formatDuration = (seconds) => {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        };

        // Formatação de data
        const getCurrentDate = () => new Date().toLocaleDateString('pt-BR', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });

        const formatDate = (timestamp) => {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString('pt-BR', { 
                day: '2-digit', 
                month: '2-digit', 
                year: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        };

        const formatLastSeen = (timestamp) => {
            if (!timestamp) return 'Nunca';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const diffMinutes = (new Date() - date) / 60000;
            
            if (diffMinutes < 1) return 'Agora';
            if (diffMinutes < 60) return `${Math.floor(diffMinutes)}m`;
            if (diffMinutes < 1440) return `${Math.floor(diffMinutes / 60)}h`;
            return `${Math.floor(diffMinutes / 1440)}d`;
        };

        // Debounce helper
        const useDebounce = (value, delay) => {
            const [debouncedValue, setDebouncedValue] = useState(value);

            useEffect(() => {
                const handler = setTimeout(() => setDebouncedValue(value), delay);
                return () => clearTimeout(handler);
            }, [value, delay]);

            return debouncedValue;
        };

        // Validação de entrada
        const validateWorkout = (workout) => {
            if (!workout.title?.trim()) {
                throw new Error('Nome do treino é obrigatório');
            }
            if (workout.exercises.length === 0) {
                throw new Error('Adicione pelo menos um exercício');
            }
            if (workout.exercises.length > CONFIG.limits.maxExercisesPerWorkout) {
                throw new Error(`Máximo de ${CONFIG.limits.maxExercisesPerWorkout} exercícios por treino`);
            }
            
            workout.exercises.forEach((ex, idx) => {
                if (!ex.name?.trim()) {
                    throw new Error(`Exercício ${idx + 1} precisa de um nome`);
                }
            });
            
            return true;
        };

        // Cálculo de volume melhorado
        const calculateVolume = (logs) => {
            return Object.values(logs).reduce((total, log) => {
                if (log.done && log.weight && log.reps) {
                    const weight = parseFloat(log.weight) || 0;
                    const reps = parseFloat(log.reps) || 0;
                    return total + (weight * reps);
                }
                return total;
            }, 0);
        };

        // Cálculo de calorias mais realista (baseado em MET)
        const calculateCalories = (volume, durationMinutes, userWeight = 75) => {
            const volumeCalories = volume * 0.012; // Ajustado
            const durationCalories = durationMinutes * 6.5; // MET médio para treino de força
            return Math.round(volumeCalories + durationCalories);
        };

        // ============================================================================
        // ERROR BOUNDARY
        // ============================================================================
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error('Error Boundary:', error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-neutral-900 text-white flex flex-col items-center justify-center p-6">
                            <AlertCircle size={64} className="text-red-500 mb-4" />
                            <h1 className="text-2xl font-bold mb-2">Algo deu errado</h1>
                            <p className="text-neutral-400 text-center mb-6">
                                {this.state.error?.message || 'Erro desconhecido'}
                            </p>
                            <button 
                                onClick={() => window.location.reload()}
                                className="bg-yellow-500 text-black px-6 py-3 rounded-xl font-bold"
                            >
                                Recarregar App
                            </button>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        // ============================================================================
        // COMPONENTES DE UI
        // ============================================================================

        // Loading Screen
        const LoadingScreen = memo(() => (
            <div className="flex flex-col items-center justify-center min-h-[100dvh] bg-neutral-900 text-white p-6">
                <Dumbbell size={48} className="text-yellow-500 animate-bounce mb-4" />
                <p className="text-sm font-bold tracking-widest animate-pulse">SINCRONIZANDO...</p>
                <p className="text-xs text-neutral-500 mt-2">v{CONFIG.app.version}</p>
            </div>
        ));

        // Toast de Notificação
        const NotificationToast = memo(({ notification, onClose }) => {
            if (!notification) return null;

            return (
                <div 
                    onClick={onClose}
                    className="fixed top-4 left-4 right-4 z-[60] bg-neutral-800 border-l-4 border-yellow-500 rounded-r-lg shadow-2xl p-4 flex items-center gap-3 animate-slide-down cursor-pointer"
                >
                    {notification.photoURL ? (
                        <img 
                            src={notification.photoURL} 
                            className="w-10 h-10 rounded-full border border-neutral-600" 
                            alt=""
                        />
                    ) : (
                        <div className="w-10 h-10 rounded-full bg-neutral-700 flex items-center justify-center font-bold">
                            {notification.displayName?.[0]}
                        </div>
                    )}
                    <div className="flex-1 overflow-hidden">
                        <p className="text-xs font-bold text-yellow-500">Nova Mensagem</p>
                        <p className="text-sm truncate text-white">{notification.text}</p>
                    </div>
                    <button className="text-neutral-400 hover:text-white">
                        <X size={16}/>
                    </button>
                </div>
            );
        });

        // ============================================================================
        // TELA DE LOGIN
        // ============================================================================
        const LoginScreen = () => {
            const [isLoading, setIsLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [showRedirectOption, setShowRedirectOption] = useState(false);

            useEffect(() => {
                // Limpa estados anteriores
                localStorage.removeItem('auth_pending');
                localStorage.removeItem('auth_in_progress');
                
                // Verifica redirect result
                getRedirectResult(auth).catch(err => {
                    console.error('Redirect result error:', err);
                    setErrorMsg(err.message);
                });
            }, []);

            const handlePopupLogin = async () => {
                if (isLoading) return;
                
                setIsLoading(true);
                setErrorMsg('');
                const provider = new GoogleAuthProvider();
                
                try {
                    await setPersistence(auth, browserLocalPersistence);
                    await signInWithPopup(auth, provider);
                } catch (error) {
                    console.error("Login Error:", error);
                    setIsLoading(false);
                    
                    if (error.code === 'auth/popup-blocked' || 
                        error.code === 'auth/cancelled-popup-request' || 
                        error.code === 'auth/popup-closed-by-user') {
                        setErrorMsg("Pop-up bloqueado. Use o método alternativo abaixo.");
                        setShowRedirectOption(true);
                    } else if (error.code === 'auth/unauthorized-domain') {
                        setErrorMsg("Domínio não autorizado. Configure o Firebase Console.");
                    } else {
                        setErrorMsg(error.message);
                    }
                }
            };

            const handleRedirectLogin = async () => {
                setIsLoading(true);
                setErrorMsg('Redirecionando...');
                const provider = new GoogleAuthProvider();
                
                try {
                    await setPersistence(auth, browserLocalPersistence);
                    await signInWithRedirect(auth, provider);
                } catch (error) {
                    setIsLoading(false);
                    setErrorMsg("Erro no redirect: " + error.message);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-[100dvh] bg-neutral-900 text-white p-6">
                    <div className="mb-8 p-6 bg-gradient-to-br from-yellow-500 to-yellow-600 rounded-3xl shadow-2xl">
                        <Dumbbell size={64} className="text-black" />
                    </div>
                    
                    <h1 className="text-5xl font-black mb-2 tracking-tighter italic text-center">
                        IRON<span className="text-yellow-500">TRACKS</span>
                    </h1>
                    
                    <p className="text-neutral-400 mb-2 text-center max-w-xs font-medium">
                        Sistema de Alta Performance
                    </p>
                    
                    <div className="flex items-center gap-2 mb-8 text-xs text-neutral-600">
                        <Shield size={12} />
                        <span>v{CONFIG.app.version}</span>
                        <Zap size={12} className="text-yellow-500" />
                        <span>Otimizado</span>
                    </div>
                    
                    <button 
                        onClick={handlePopupLogin}
                        disabled={isLoading}
                        className="w-full max-w-xs flex items-center justify-center gap-3 bg-white text-neutral-900 px-6 py-4 rounded-xl font-bold text-lg hover:bg-neutral-100 transition-all active:scale-95 shadow-xl disabled:opacity-50 mb-4"
                    >
                        {isLoading ? (
                            <span className="animate-spin rounded-full h-5 w-5 border-b-2 border-neutral-900"></span>
                        ) : (
                            <>
                                <img 
                                    src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" 
                                    className="w-5 h-5"
                                    alt="Google"
                                />
                                Entrar com Google
                            </>
                        )}
                    </button>

                    {showRedirectOption && (
                        <button 
                            onClick={handleRedirectLogin}
                            className="text-yellow-500 text-sm font-bold underline p-2 animate-fade-in"
                        >
                            Login via Navegador (iPhone/Popup bloqueado)
                        </button>
                    )}

                    {!showRedirectOption && !isLoading && (
                        <button 
                            onClick={() => setShowRedirectOption(true)} 
                            className="text-neutral-600 text-xs mt-4 hover:text-neutral-400"
                        >
                            Problemas para entrar?
                        </button>
                    )}

                    {errorMsg && (
                        <div className="mt-6 p-4 bg-red-900/20 border border-red-500/50 rounded-lg max-w-xs">
                            <p className="text-red-400 text-xs break-words text-center">{errorMsg}</p>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================================
        // EDITOR DE EXERCÍCIO (Componente Otimizado)
        // ============================================================================
        const ExerciseEditor = memo(({ index, exercise, updateExercise, removeExercise }) => {
            const handleChange = useCallback((field, value) => {
                updateExercise(index, field, value);
            }, [index, updateExercise]);

            return (
                <div className="bg-neutral-800 p-4 rounded-xl border border-neutral-700 relative group">
                    <button 
                        onClick={() => removeExercise(index)}
                        className="absolute top-2 right-2 text-red-500 p-2 hover:bg-red-500/10 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity"
                        aria-label="Remover exercício"
                    >
                        <Trash2 size={16}/>
                    </button>
                    
                    <div className="space-y-3 pr-8">
                        <input 
                            value={exercise.name || ''} 
                            onChange={(e) => handleChange('name', e.target.value)}
                            className="w-full bg-transparent font-bold text-white border-b border-neutral-600 pb-2 outline-none focus:border-yellow-500 transition-colors" 
                            placeholder="Nome do exercício"
                        />
                        
                        <div className="grid grid-cols-4 gap-2">
                            <div>
                                <label className="text-[10px] text-neutral-500 uppercase font-bold block mb-1">
                                    Séries
                                </label>
                                <input 
                                    type="number" 
                                    value={exercise.sets || ''} 
                                    onChange={(e) => handleChange('sets', parseInt(e.target.value) || 0)}
                                    className="w-full bg-neutral-900 rounded p-2 text-center outline-none focus:ring-2 focus:ring-yellow-500"
                                    min="1"
                                    max="20"
                                />
                            </div>
                            
                            <div>
                                <label className="text-[10px] text-neutral-500 uppercase font-bold block mb-1">
                                    Reps
                                </label>
                                <input 
                                    value={exercise.reps || ''} 
                                    onChange={(e) => handleChange('reps', e.target.value)}
                                    className="w-full bg-neutral-900 rounded p-2 text-center outline-none focus:ring-2 focus:ring-yellow-500"
                                    placeholder="10"
                                />
                            </div>
                            
                            <div>
                                <label className="text-[10px] text-neutral-500 uppercase font-bold block mb-1">
                                    Cadência
                                </label>
                                <input 
                                    value={exercise.cadence || ''} 
                                    onChange={(e) => handleChange('cadence', e.target.value)}
                                    className="w-full bg-neutral-900 rounded p-2 text-center outline-none focus:ring-2 focus:ring-yellow-500"
                                    placeholder="3010"
                                />
                            </div>
                            
                            <div>
                                <label className="text-[10px] text-neutral-500 uppercase font-bold block mb-1">
                                    Descanso
                                </label>
                                <input 
                                    type="number" 
                                    value={exercise.restTime || ''} 
                                    onChange={(e) => handleChange('restTime', parseInt(e.target.value) || 0)}
                                    className="w-full bg-neutral-900 rounded p-2 text-center outline-none focus:ring-2 focus:ring-yellow-500"
                                    min="0"
                                    step="15"
                                />
                            </div>
                        </div>

                        {exercise.coachNotes && (
                            <div className="bg-yellow-500/10 border border-yellow-500/30 rounded p-3">
                                <p className="text-[10px] font-bold text-yellow-500 uppercase flex items-center gap-1 mb-1">
                                    <Megaphone size={10}/> Instrução do Coach
                                </p>
                                <p className="text-sm text-yellow-200">{exercise.coachNotes}</p>
                            </div>
                        )}

                        <details className="text-sm">
                            <summary className="text-neutral-500 cursor-pointer hover:text-white text-xs">
                                + Notas pessoais
                            </summary>
                            <textarea 
                                value={exercise.notes || ''} 
                                onChange={(e) => handleChange('notes', e.target.value)}
                                className="w-full bg-neutral-900 border border-neutral-700 rounded p-2 mt-2 text-sm outline-none focus:border-yellow-500 resize-none"
                                placeholder="Ajustes, técnica, sensações..."
                                rows="2"
                            />
                        </details>
                    </div>
                </div>
            );
        });

        // ============================================================================
        // TREINO ATIVO (Otimizado)
        // ============================================================================
        const ActiveWorkout = ({ workout, user, onFinish, onBack }) => {
            const [logs, setLogs] = useState({});
            const [restTimer, setRestTimer] = useState({ active: false, duration: 60 });
            const [startTime] = useState(Date.now());
            const [elapsedTime, setElapsedTime] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    setElapsedTime(Math.floor((Date.now() - startTime) / 1000));
                }, 1000);
                return () => clearInterval(interval);
            }, [startTime]);

            const updateLog = useCallback((exIdx, setIdx, field, value) => {
                const key = `${exIdx}-${setIdx}`;
                setLogs(prev => ({
                    ...prev,
                    [key]: { ...prev[key], [field]: value }
                }));
            }, []);

            const toggleSetDone = useCallback((exIdx, setIdx, exercise) => {
                const key = `${exIdx}-${setIdx}`;
                setLogs(prev => {
                    const current = prev[key] || {};
                    const newDone = !current.done;
                    
                    if (newDone && exercise.restTime > 0) {
                        setRestTimer({ active: true, duration: exercise.restTime });
                    }
                    
                    return {
                        ...prev,
                        [key]: { ...current, done: newDone }
                    };
                });
            }, []);

            const handleFinish = useCallback(async () => {
                if (!confirm('Finalizar treino?')) return;
                
                try {
                    const completedSets = Object.values(logs).filter(l => l.done).length;
                    if (completedSets === 0) {
                        alert('Complete pelo menos uma série antes de finalizar.');
                        return;
                    }

                    const sessionData = {
                        workoutTitle: workout.title,
                        exercises: workout.exercises,
                        logs: logs,
                        totalTime: elapsedTime,
                        date: serverTimestamp(),
                        userId: user.uid
                    };

                    // Busca treino anterior para comparação
                    const historyRef = collection(db, 'artifacts', CONFIG.app.id, 'users', user.uid, 'history');
                    const q = query(
                        historyRef,
                        where('workoutTitle', '==', workout.title),
                        orderBy('date', 'desc'),
                        limit(1)
                    );
                    
                    const snapshot = await getDocs(q);
                    const previousSession = snapshot.empty ? null : snapshot.docs[0].data();

                    // Salva no histórico
                    await addDoc(historyRef, sessionData);

                    onFinish(sessionData, previousSession);
                } catch (error) {
                    console.error('Erro ao finalizar:', error);
                    alert('Erro ao salvar treino. Tente novamente.');
                }
            }, [logs, elapsedTime, workout, user, onFinish]);

            const completedSets = useMemo(() => 
                Object.values(logs).filter(l => l.done).length
            , [logs]);

            const totalSets = useMemo(() => 
                workout.exercises.reduce((sum, ex) => sum + parseInt(ex.sets || 0), 0)
            , [workout.exercises]);

            const progress = totalSets > 0 ? (completedSets / totalSets) * 100 : 0;

            return (
                <div className="min-h-[100dvh] bg-black text-white">
                    {/* Header Fixo */}
                    <div className="sticky top-0 z-40 bg-neutral-900/95 backdrop-blur-xl border-b border-neutral-800 pt-safe">
                        <div className="p-4">
                            <div className="flex items-center justify-between mb-3">
                                <button 
                                    onClick={onBack}
                                    className="p-2 bg-neutral-800 rounded-lg hover:bg-neutral-700"
                                >
                                    <ArrowLeft size={20} />
                                </button>
                                
                                <div className="text-center flex-1 mx-4">
                                    <h2 className="font-black text-lg tracking-tight truncate">
                                        {workout.title}
                                    </h2>
                                    <p className="text-xs text-neutral-500 font-mono">
                                        {formatDuration(elapsedTime)}
                                    </p>
                                </div>
                                
                                <button 
                                    onClick={handleFinish}
                                    className="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg font-bold text-sm"
                                >
                                    Finalizar
                                </button>
                            </div>

                            {/* Barra de Progresso */}
                            <div className="relative h-2 bg-neutral-800 rounded-full overflow-hidden">
                                <div 
                                    className="absolute inset-y-0 left-0 bg-gradient-to-r from-yellow-500 to-green-500 transition-all duration-300"
                                    style={{ width: `${progress}%` }}
                                />
                            </div>
                            <p className="text-[10px] text-neutral-500 mt-1 text-center">
                                {completedSets}/{totalSets} séries • {progress.toFixed(0)}%
                            </p>
                        </div>
                    </div>

                    {/* Lista de Exercícios */}
                    <div className="p-4 space-y-6 pb-24">
                        {workout.exercises.map((exercise, exIdx) => (
                            <div key={exIdx} className="bg-neutral-900 rounded-2xl p-5 border border-neutral-800">
                                <div className="flex items-start justify-between mb-4">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-2 mb-1">
                                            <span className="bg-yellow-500 text-black font-bold text-xs px-2 py-0.5 rounded">
                                                #{exIdx + 1}
                                            </span>
                                            <h3 className="font-bold text-lg">{exercise.name}</h3>
                                        </div>
                                        <div className="flex gap-3 text-xs text-neutral-400">
                                            <span>{exercise.sets}x{exercise.reps}</span>
                                            <span>• {exercise.cadence}</span>
                                            <span>• {exercise.restTime}s</span>
                                        </div>
                                    </div>
                                </div>

                                {exercise.coachNotes && (
                                    <div className="bg-yellow-500/10 border border-yellow-500/30 rounded-lg p-3 mb-4">
                                        <p className="text-xs text-yellow-400 font-bold mb-1 flex items-center gap-1">
                                            <Megaphone size={12}/> Coach
                                        </p>
                                        <p className="text-sm text-yellow-200">{exercise.coachNotes}</p>
                                    </div>
                                )}

                                {/* Séries */}
                                <div className="space-y-2">
                                    {Array.from({ length: parseInt(exercise.sets) || 0 }).map((_, setIdx) => {
                                        const key = `${exIdx}-${setIdx}`;
                                        const log = logs[key] || {};
                                        
                                        return (
                                            <div 
                                                key={setIdx}
                                                className={`border-2 rounded-xl p-3 transition-all ${
                                                    log.done 
                                                        ? 'border-green-500 bg-green-500/10' 
                                                        : 'border-neutral-700 bg-neutral-800/50'

                                                <div className="flex items-center gap-3">

                                                        onClick={() => toggleSetDone(exIdx, setIdx, exercise)}

                                                                ? 'border-green-500 bg-green-500'
                                                                : 'border-neutral-600 hover:border-yellow-500'
                                                        }`}
                                                    >
                                                        {log.done && <CheckCircle2 size={16} className="text-black" />}
                                                    </button>
                                                    
                                                    <span className="text-sm font-bold text-neutral-400 w-12">
                                                        #{setIdx + 1}
                                                    </span>

                                                    <input
                                                        type="number"
                                                        placeholder="Kg"
                                                        value={log.weight || ''}
                                                        onChange={(e) => updateLog(exIdx, setIdx, 'weight', e.target.value)}
                                                        className="w-20 bg-neutral-900 border border-neutral-700 rounded-lg px-3 py-2 text-center font-mono outline-none focus:border-yellow-500"
                                                        step="0.5"
                                                    />

                                                    <span className="text-neutral-600">×</span>

                                                    <input
                                                        type="number"
                                                        placeholder="Reps"
                                                        value={log.reps || ''}
