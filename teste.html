<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>IronTracks - Alta Performance</title>
    
    <!-- 1. Motor Visual (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Motor de Tradução (Babel) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 3. Motor de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- 4. Configuração de Estilos -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'slide-down': 'slideDown 0.3s ease-out',
                        'pulse-fast': 'pulseFast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } },
                        slideDown: { '0%': { transform: 'translateY(-100%)' }, '100%': { transform: 'translateY(0)' } },
                        pulseFast: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.5' } }
                    }
                }
            }
        }
    </script>
    
    <!-- 5. Importação Firebase -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.294.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        html, body { height: 100%; overflow-x: hidden; background-color: #0a0a0a; color: white; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        #root { height: 100%; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, 
            signInWithPopup,
            signInWithRedirect, 
            GoogleAuthProvider, 
            signOut, 
            onAuthStateChanged,
            getRedirectResult,
            setPersistence,
            browserLocalPersistence
        } from 'firebase/auth';
        import { 
            getFirestore, collection, doc, setDoc, getDoc, addDoc, deleteDoc, 
            onSnapshot, serverTimestamp, query, orderBy, limit, where, getDocs 
        } from 'firebase/firestore';
        import { 
            Dumbbell, Timer, Share2, Plus, Trash2, Save, LogOut, Play, 
            CheckCircle2, RotateCcw, Users, Copy, Download, Activity, 
            Music, Clock, ChevronDown, ChevronUp, FileText, TrendingUp, 
            TrendingDown, Printer, X, MessageSquare, Send, ArrowLeft, Bell, Flame,
            History, Calendar, Crown, Database, UserCog, Megaphone, AlertCircle, Link, Layers
        } from 'lucide-react';

        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBfy01I69nNCABxnYSqK95e8TwGP1bSv2w",
            authDomain: "irontracks-e6344.firebaseapp.com",
            projectId: "irontracks-e6344",
            storageBucket: "irontracks-e6344.firebasestorage.app",
            messagingSenderId: "212508580918",
            appId: "1:212508580918:web:dd55c3088fec86b8680c97"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'irontracks-production';
        const ADMIN_EMAIL = 'djmkapple@gmail.com';

        // --- UTILITÁRIOS ---
        const formatDuration = (s) => { const mins = Math.floor(s / 60); const secs = Math.floor(s % 60); return `${mins}:${secs < 10 ? '0' : ''}${secs}`; };
        const getCurrentDate = () => new Date().toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        const formatDate = (ts) => { if (!ts) return ''; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute:'2-digit' }); };
        const formatLastSeen = (ts) => { if (!ts) return 'Nunca'; const d = ts.toDate ? ts.toDate() : new Date(ts); const diff = (new Date() - d) / 60000; if(diff<1) return 'Agora'; if(diff<60) return `${Math.floor(diff)}m`; return `${Math.floor(diff/60)}h`; };

        // --- COMPONENTES DE BASE ---
        const LoadingScreen = ({ onReset }) => {
            const [showReset, setShowReset] = useState(false);
            useEffect(() => { const timer = setTimeout(() => setShowReset(true), 5000); return () => clearTimeout(timer); }, []);
            return (
                <div className="flex flex-col items-center justify-center min-h-[100dvh] bg-neutral-900 text-white p-6">
                    <div className="mb-8 p-6 bg-gradient-to-br from-yellow-500 to-yellow-600 rounded-3xl shadow-2xl animate-pulse"><Dumbbell size={64} className="text-black" /></div>
                    <h1 className="text-2xl font-black mb-2 tracking-tighter italic text-center text-white animate-pulse">SINCRONIZANDO...</h1>
                    {showReset && <button onClick={onReset} className="flex items-center gap-2 px-4 py-2 bg-neutral-800 border border-neutral-700 rounded-lg text-xs text-red-400 hover:bg-neutral-700 transition-all animate-fade-in mt-8"><AlertCircle size={14} /> Reiniciar Login</button>}
                </div>
            );
        };

        const LoginScreen = () => {
            const [isLoading, setIsLoading] = useState(false);
            const [statusMsg, setStatusMsg] = useState('');
            const handleLogin = async () => {
                if (isLoading) return; setIsLoading(true); setStatusMsg("Direcionando para Google..."); localStorage.setItem('auth_pending', 'true');
                const provider = new GoogleAuthProvider();
                try { await setPersistence(auth, browserLocalPersistence); await signInWithRedirect(auth, provider); } 
                catch (error) { console.error(error); localStorage.removeItem('auth_pending'); setStatusMsg("Erro: " + error.message); setIsLoading(false); }
            };
            return (
                <div className="flex flex-col items-center justify-center min-h-[100dvh] bg-neutral-900 text-white p-6 relative">
                    <div className="relative z-10 flex flex-col items-center w-full max-w-sm">
                        <div className="mb-8 p-6 bg-gradient-to-br from-yellow-500 to-yellow-600 rounded-3xl shadow-2xl animate-pulse"><Dumbbell size={64} className="text-black" /></div>
                        <h1 className="text-5xl font-black mb-2 tracking-tighter italic text-center">IRON<span className="text-yellow-500">TRACKS</span></h1>
                        <p className="text-neutral-400 mb-8 text-center max-w-xs font-medium">Sistema de Alta Performance • v2.5.1</p>
                        <button onClick={handleLogin} disabled={isLoading} className="group w-full flex items-center justify-center gap-4 bg-white text-neutral-900 px-8 py-5 rounded-2xl font-bold text-xl hover:bg-neutral-100 transition-all active:scale-95 shadow-xl disabled:opacity-70">{isLoading ? <span className="animate-spin rounded-full h-6 w-6 border-b-2 border-neutral-900"></span> : <><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6" alt="G"/> Entrar com Google</>}</button>
                        {statusMsg && <p className="mt-4 text-xs text-yellow-500 text-center font-mono animate-fade-in">{statusMsg}</p>}
                    </div>
                </div>
            );
        };

        const NotificationToast = ({ notification, onClose }) => { if (!notification) return null; return <div onClick={onClose} className="fixed top-4 left-4 right-4 z-[60] bg-neutral-800 border-l-4 border-yellow-500 rounded-r-lg shadow-2xl p-4 flex items-center gap-3 animate-slide-down cursor-pointer">{notification.photoURL ? <img src={notification.photoURL} className="w-10 h-10 rounded-full border border-neutral-600" /> : <div className="w-10 h-10 rounded-full bg-neutral-700 flex items-center justify-center font-bold">{notification.displayName?.[0]}</div>}<div className="flex-1 overflow-hidden"><p className="text-xs font-bold text-yellow-500">Nova Mensagem</p><p className="text-sm truncate text-white">{notification.text}</p></div><button className="text-neutral-400"><X size={16}/></button></div>; };

        // --- PAINEL ADMIN COM CLONAGEM AVANÇADA ---
        const AdminPanel = ({ user, onClose }) => { 
            const [tab, setTab] = useState('students'); 
            const [usersList, setUsersList] = useState([]); 
            const [templates, setTemplates] = useState([]); 
            const [adminWorkouts, setAdminWorkouts] = useState([]); // Meus treinos pessoais
            const [selectedStudent, setSelectedStudent] = useState(null); 
            const [studentWorkouts, setStudentWorkouts] = useState([]); 
            const [editingTemplate, setEditingTemplate] = useState(null); 
            
            // Estado do Modal de Clonagem
            const [cloneModalOpen, setCloneModalOpen] = useState(false);
            const [cloneTab, setCloneTab] = useState('templates'); // 'templates' | 'personal'

            // 1. Carrega Dados Gerais
            useEffect(() => { const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'), orderBy('lastSeen', 'desc')); const unsub = onSnapshot(q, snap => setUsersList(snap.docs.map(d => d.data()))); return () => unsub(); }, []); 
            useEffect(() => { const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'templates'), orderBy('createdAt', 'desc')); const unsub = onSnapshot(q, snap => setTemplates(snap.docs.map(d => ({id: d.id, ...d.data()})))); return () => unsub(); }, []); 
            
            // 2. Carrega Treinos do ADM (Para clonagem pessoal)
            useEffect(() => {
                if (!user) return;
                const q = query(collection(db, 'artifacts', appId, 'users', user.uid, 'workouts'));
                const unsub = onSnapshot(q, snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    data.sort((a, b) => (a.title || '').localeCompare(b.title || '')); // Ordem A-Z
                    setAdminWorkouts(data);
                });
                return () => unsub();
            }, [user]);

            // 3. Carrega Treinos do Aluno Selecionado
            useEffect(() => { if (!selectedStudent) return; const q = query(collection(db, 'artifacts', appId, 'users', selectedStudent.uid, 'workouts'), orderBy('createdAt', 'desc')); const unsub = onSnapshot(q, snap => setStudentWorkouts(snap.docs.map(d => ({id: d.id, ...d.data()})))); return () => unsub(); }, [selectedStudent]); 

            // --- FUNÇÕES DE AÇÃO ---
            const handleClone = async (workoutData) => {
                if (!selectedStudent) return;
                if (!confirm(`Enviar "${workoutData.title}" para ${selectedStudent.displayName}?`)) return;
                
                const newWorkout = { 
                    ...workoutData, 
                    title: workoutData.title, 
                    importedFrom: 'Coach MK', 
                    createdAt: serverTimestamp(), 
                    exercises: workoutData.exercises.map(ex => ({...ex, notes: ex.notes || ''})) 
                }; 
                delete newWorkout.id; 
                
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', selectedStudent.uid, 'workouts'), newWorkout);
                    alert("Treino enviado!");
                } catch(e) {
                    alert("Erro: " + e.message);
                }
            };

            const handleCloneAllPersonal = async () => {
                if (!selectedStudent) return;
                if (!confirm(`Tem certeza? Isso enviará TODOS os seus ${adminWorkouts.length} treinos para ${selectedStudent.displayName}.`)) return;
                
                let count = 0;
                for (const workout of adminWorkouts) {
                    const newWorkout = { 
                        ...workout, 
                        title: workout.title, 
                        importedFrom: 'Coach MK (Pack)', 
                        createdAt: serverTimestamp(), 
                        exercises: workout.exercises.map(ex => ({...ex, notes: ex.notes || ''})) 
                    }; 
                    delete newWorkout.id;
                    await addDoc(collection(db, 'artifacts', appId, 'users', selectedStudent.uid, 'workouts'), newWorkout);
                    count++;
                }
                alert(`${count} treinos enviados com sucesso!`);
                setCloneModalOpen(false);
            };

            const handleDeleteStudentWorkout = async (wId) => { if (!confirm("Deletar?")) return; await deleteDoc(doc(db, 'artifacts', appId, 'users', selectedStudent.uid, 'workouts', wId)); }; 
            
            // Share Link (mantido)
            const handleShareTemplateLink = async (template) => {
                try {
                    const shareData = { ...template, originalAuthor: 'Coach MK', sharedAt: serverTimestamp() };
                    const docData = { ...shareData }; delete docData.id;
                    const r = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'shared_workouts'), docData);
                    const url = `${window.location.origin}${window.location.pathname}?import=${r.id}`;
                    const el = document.createElement('textarea'); el.value = `Treino do Coach: ${url}`; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); 
                    alert("Link copiado!");
                } catch (e) { alert("Erro."); }
            };

            return (
                <div className="fixed inset-0 z-50 bg-neutral-900 overflow-y-auto animate-slide-up">
                    <div className="sticky top-0 bg-yellow-500 text-black p-4 flex justify-between items-center z-10 shadow-lg">
                        <h2 className="font-black text-xl flex items-center gap-2"><Crown size={24}/> COMMAND</h2>
                        <button onClick={onClose} className="bg-black/20 p-2 rounded-lg"><X size={24}/></button>
                    </div>
                    {!selectedStudent && !editingTemplate && ( <div className="flex p-2 gap-2 bg-neutral-800"><button onClick={() => setTab('students')} className={`flex-1 py-3 rounded-lg font-bold ${tab==='students' ? 'bg-neutral-700 text-white' : 'text-neutral-500'}`}>Alunos</button><button onClick={() => setTab('templates')} className={`flex-1 py-3 rounded-lg font-bold ${tab==='templates' ? 'bg-neutral-700 text-white' : 'text-neutral-500'}`}>Templates</button></div> )}
                    
                    <div className="p-4 pb-20">
                        {tab === 'students' && !selectedStudent && !editingTemplate && ( <div className="space-y-3">{usersList.map(u => <div key={u.uid} onClick={() => setSelectedStudent(u)} className="bg-neutral-800 p-4 rounded-xl flex items-center gap-4 border border-neutral-700 hover:border-yellow-500 cursor-pointer">{u.photoURL ? <img src={u.photoURL} className="w-12 h-12 rounded-full"/> : <div className="w-12 h-12 bg-neutral-600 rounded-full flex items-center justify-center font-bold">{u.displayName?.[0]}</div>}<div className="flex-1"><h3 className="font-bold text-lg">{u.displayName}</h3><p className="text-xs text-neutral-400">Visto: {formatLastSeen(u.lastSeen)}</p></div><ArrowLeft className="rotate-180 text-neutral-500"/></div>)}</div> )}
                        {tab === 'templates' && !selectedStudent && !editingTemplate && ( <div className="space-y-3"><button onClick={() => setEditingTemplate({ title: '', exercises: [] })} className="w-full py-4 border-2 border-dashed border-neutral-700 text-neutral-400 rounded-xl font-bold">+ Novo Template</button>{templates.map(t => <div key={t.id} className="bg-neutral-800 p-4 rounded-xl border border-neutral-700 flex justify-between items-center"><div><h3 className="font-bold text-white">{t.title}</h3><p className="text-xs text-neutral-500">{t.exercises?.length || 0} exercícios</p></div><div className="flex gap-2"><button onClick={() => handleShareTemplateLink(t)} className="p-2 bg-blue-900/30 text-blue-400 rounded-lg" title="Gerar Link"><Link size={16}/></button><button onClick={() => setEditingTemplate(t)} className="p-2 bg-neutral-700 rounded-lg"><UserCog size={16}/></button><button onClick={async () => { if(confirm('Apagar?')) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'templates', t.id)) }} className="p-2 bg-red-900/30 text-red-500 rounded-lg"><Trash2 size={16}/></button></div></div>)}</div> )}
                        {selectedStudent && !editingTemplate && ( <div><div className="flex items-center gap-3 mb-6"><button onClick={() => setSelectedStudent(null)} className="p-2 bg-neutral-800 rounded-lg"><ArrowLeft/></button><div><h2 className="text-xl font-bold">{selectedStudent.displayName}</h2><p className="text-xs text-neutral-400">{selectedStudent.email}</p></div></div><div className="grid grid-cols-2 gap-2 mb-6"><button onClick={() => setEditingTemplate({ title: '', exercises: [], targetStudentId: selectedStudent.uid })} className="bg-yellow-500 text-black p-3 rounded-xl font-bold text-sm">+ Personalizado</button><button onClick={() => setCloneModalOpen(true)} className="bg-neutral-800 text-white border border-neutral-700 p-3 rounded-xl font-bold text-sm hover:bg-neutral-700">Clonar para Aluno</button></div><h3 className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-2">Treinos Atuais</h3><div className="space-y-3 mb-8">{studentWorkouts.map(w => <div key={w.id} className="bg-neutral-800 p-4 rounded-xl border border-neutral-700 flex justify-between items-center"><div><h4 className="font-bold text-white">{w.title}</h4><p className="text-xs text-neutral-500">{w.exercises.length} ex</p></div><div className="flex gap-2"><button onClick={() => setEditingTemplate({...w, targetStudentId: selectedStudent.uid})} className="p-2 bg-blue-900/30 text-blue-400 rounded-lg"><UserCog size={16}/></button><button onClick={() => handleDeleteStudentWorkout(w.id)} className="p-2 bg-red-900/30 text-red-500 rounded-lg"><Trash2 size={16}/></button></div></div>)}</div></div> )}
                        {editingTemplate && ( 
                            <AdminWorkoutEditor 
                                initialData={editingTemplate} 
                                onCancel={() => setEditingTemplate(null)} 
                                onSave={async (data) => { 
                                    const targetColl = data.targetStudentId ? collection(db, 'artifacts', appId, 'users', data.targetStudentId, 'workouts') : collection(db, 'artifacts', appId, 'public', 'data', 'templates'); 
                                    const payload = { title: data.title, exercises: data.exercises, createdAt: serverTimestamp(), lastEditedBy: 'Coach MK' }; 
                                    if(data.targetStudentId) payload.importedFrom = 'Coach MK'; 
                                    if (data.id) { 
                                        const docRef = data.targetStudentId ? doc(db, 'artifacts', appId, 'users', data.targetStudentId, 'workouts', data.id) : doc(db, 'artifacts', appId, 'public', 'data', 'templates', data.id); 
                                        await setDoc(docRef, payload, { merge: true }); 
                                    } else { await addDoc(targetColl, payload); } 
                                    setEditingTemplate(null); 
                                }}
                            /> 
                        )}
            
                        {/* MODAL DE CLONAGEM */}
                        {cloneModalOpen && (
                            <div className="fixed inset-0 z-[60] bg-black/90 flex items-end sm:items-center justify-center animate-fade-in">
                                <div className="bg-neutral-900 w-full max-w-md p-6 rounded-t-3xl sm:rounded-3xl border border-neutral-700 max-h-[85vh] flex flex-col">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-lg text-white">Enviar Treino</h3>
                                        <button onClick={() => setCloneModalOpen(false)} className="p-2 bg-neutral-800 rounded-full"><X size={20}/></button>
                                    </div>

                                    {/* Abas */}
                                    <div className="flex p-1 bg-neutral-800 rounded-lg mb-4 shrink-0">
                                        <button onClick={() => setCloneTab('templates')} className={`flex-1 py-2 text-sm font-bold rounded-md transition-colors ${cloneTab === 'templates' ? 'bg-neutral-700 text-white' : 'text-neutral-500'}`}>Templates</button>
                                        <button onClick={() => setCloneTab('personal')} className={`flex-1 py-2 text-sm font-bold rounded-md transition-colors ${cloneTab === 'personal' ? 'bg-neutral-700 text-white' : 'text-neutral-500'}`}>Meus Treinos</button>
                                    </div>

                                    <div className="flex-1 overflow-y-auto space-y-2 min-h-0">
                                        {cloneTab === 'templates' && (
                                            <>
                                                <p className="text-xs text-neutral-500 uppercase tracking-widest mb-2">Biblioteca Geral</p>
                                                {templates.map(t => (
                                                    <button key={t.id} onClick={() => handleClone(t)} className="w-full bg-neutral-800 p-3 rounded-xl border border-neutral-700 flex justify-between items-center hover:bg-neutral-700">
                                                        <span className="font-bold text-sm text-left">{t.title}</span>
                                                        <Copy size={16} className="text-yellow-500"/>
                                                    </button>
                                                ))}
                                                {templates.length === 0 && <p className="text-neutral-500 text-center py-4 text-sm">Nenhum template criado.</p>}
                                            </>
                                        )}

                                        {cloneTab === 'personal' && (
                                            <>
                                                <button onClick={handleCloneAllPersonal} className="w-full bg-yellow-500 p-3 rounded-xl font-bold text-black flex items-center justify-center gap-2 mb-4 shadow-lg hover:bg-yellow-400">
                                                    <Layers size={18} /> Clonar TODOS ({adminWorkouts.length})
                                                </button>
                                                
                                                <p className="text-xs text-neutral-500 uppercase tracking-widest mb-2">Selecionar Individual</p>
                                                {adminWorkouts.map(w => (
                                                    <button key={w.id} onClick={() => handleClone(w)} className="w-full bg-neutral-800 p-3 rounded-xl border border-neutral-700 flex justify-between items-center hover:bg-neutral-700">
                                                        <span className="font-bold text-sm text-left">{w.title}</span>
                                                        <Copy size={16} className="text-blue-400"/>
                                                    </button>
                                                ))}
                                                {adminWorkouts.length === 0 && <p className="text-neutral-500 text-center py-4 text-sm">Você não tem treinos pessoais.</p>}
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        
        const AdminWorkoutEditor = ({ initialData, onSave, onCancel }) => { 
            const [workout, setWorkout] = useState(initialData); 
            const updateExercise = (idx, field, val) => { 
                const newExs = [...workout.exercises]; 
                newExs[idx] = { ...newExs[idx], [field]: val }; 
                setWorkout({ ...workout, exercises: newExs }); 
            }; 
            const addExercise = () => { 
                setWorkout({ ...workout, exercises: [...workout.exercises, { name: '', sets: 4, reps: '10', cadence: '3010', restTime: 60, notes: '', coachNotes: '' }] }); 
            }; 
            
            return (
                <div className="bg-neutral-900 min-h-full">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onCancel} className="text-neutral-400">Cancelar</button>
                        <h3 className="font-bold text-white">{workout.id ? 'Editar' : 'Novo'} {workout.targetStudentId ? 'Treino' : 'Template'}</h3>
                        <button onClick={() => onSave(workout)} className="text-yellow-500 font-bold">Salvar</button>
                    </div>
                    <input value={workout.title} onChange={e => setWorkout({...workout, title: e.target.value})} className="w-full bg-neutral-800 text-xl font-bold p-4 rounded-xl mb-4 border border-neutral-700 outline-none" placeholder="Nome do Treino"/>
                    <div className="space-y-4">
                        {workout.exercises.map((ex, idx) => ( 
                            <div key={idx} className="bg-neutral-800 p-4 rounded-xl border border-neutral-700 relative group">
                                <button onClick={() => { const n = [...workout.exercises]; n.splice(idx, 1); setWorkout({...workout, exercises: n}); }} className="absolute top-2 right-2 text-red-500 p-2"><Trash2 size={16}/></button>
                                <div className="space-y-3 pr-8">
                                    <input value={ex.name} onChange={e => updateExercise(idx, 'name', e.target.value)} className="w-full bg-transparent font-bold text-white border-b border-neutral-600 pb-1" placeholder="Nome"/>
                                    <div className="grid grid-cols-4 gap-2 text-center">
                                        <div><label className="text-[10px] text-neutral-500">Sets</label><input type="number" value={ex.sets} onChange={e=>updateExercise(idx,'sets',e.target.value)} className="w-full bg-neutral-900 rounded p-1 text-center"/></div>

        const RestTimerOverlay = ({ duration, onFinish, isActive, onClose }) => { 
            const [timeLeft, setTimeLeft] = useState(duration); 
            const [endTime, setEndTime] = useState(null); 
            const [isFinished, setIsFinished] = useState(false); 
            
            useEffect(() => { 
                if (!isActive) { setEndTime(null); setIsFinished(false); return; } 
                const targetTime = Date.now() + (duration * 1000); 
                setEndTime(targetTime); 
                setIsFinished(false); 
                const interval = setInterval(() => { 
                    const now = Date.now(); 
                    const remaining = Math.ceil((targetTime - now) / 1000); 
                    if (remaining <= 0) { clearInterval(interval); setTimeLeft(0); setIsFinished(true); } 
                    else { setTimeLeft(remaining); } 
                }, 100); 
                return () => clearInterval(interval); 
            }, [isActive, duration]); 
            
            if (!isActive) return null; 
            
            if (isFinished) { 
                return (
                    <div className="fixed inset-0 z-[100] bg-green-500 flex flex-col items-center justify-center animate-pulse-fast cursor-pointer" onClick={onFinish}>

                        <p className="text-black font-bold mt-4 text-xl">TOQUE PARA VOLTAR</p>

                ); 
            } 
            
            return (
                <div className="fixed bottom-0 left-0 right-0 bg-neutral-900/95 backdrop-blur-xl border-t border-yellow-500/30 p-6 shadow-2xl z-50 animate-slide-up pb-safe">

                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => { if (endTime) setEndTime(prev => prev + 10000); }} className="h-12 w-16 bg-neutral-800 rounded-xl text-white font-bold border border-neutral-700 active:bg-neutral-700">+10s</button>
                            <button onClick={onClose} className="h-12 px-6 bg-yellow-500 text-black rounded-xl font-bold hover:bg-yellow-400 active:scale-95 transition-transform">BORA</button>
                        </div>
                    </div>
                </div>
            ); 
        };

        const WorkoutReport = ({ session, previousSession, onClose }) => { 
            const reportRef = useRef(); 
            const calculateTotalVolume = (logs) => { let volume = 0; Object.values(logs).forEach(log => { if (log.done && log.weight && log.reps) volume += (parseFloat(log.weight) * parseFloat(log.reps)); }); return volume; };

            const volumeDelta = prevVolume > 0 ? ((currentVolume - prevVolume) / prevVolume) * 100 : 0; 
            const durationInMinutes = session.totalTime / 60;

            const handleDownloadPDF = () => { 
                const element = reportRef.current; 
                const opt = { margin: 0, filename: `IronTracks_${session.workoutTitle.replace(/\s+/g, '_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }; 
                html2pdf().set(opt).from(element).save(); 
            }; 
            
            return (
                <div className="fixed inset-0 z-50 overflow-y-auto bg-neutral-900 text-black">
                    <div className="fixed top-4 right-4 flex gap-2 no-print z-50">

                            <div className="bg-black text-white p-4 rounded-lg"><p className="text-xs font-bold uppercase text-neutral-400 mb-1">Status</p><p className="text-xl font-bold uppercase italic">CONCLUÍDO</p></div>

                        <div className="space-y-8">
                            {session.exercises.map((ex, exIdx) => {

                                                {Array.from({ length: parseInt(ex.sets) }).map((_, sIdx) => {

        const HistoryList = ({ user, onViewReport, onBack }) => {

                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                        setHistory(data.slice(0, 50));

            const handleDeleteHistory = async (e, sessionId) => {

                catch (error) { alert("Erro ao excluir."); } 
            }; 
            
            return (
                <div className="min-h-screen bg-neutral-900 text-white p-4 pb-20">
                    <div className="flex items-center gap-3 mb-6 pt-safe"><button onClick={onBack} className="p-2 bg-neutral-800 rounded-lg hover:bg-neutral-700"><ArrowLeft/></button><h2 className="text-xl font-bold flex items-center gap-2"><History className="text-yellow-500"/> Histórico</h2></div>
                    {loading && <p className="text-center text-neutral-500 animate-pulse">Carregando legado...</p>}
                    {!loading && history.length === 0 && <div className="text-center py-10 opacity-50"><p>Nenhum treino finalizado ainda.</p></div>}

                                <button onClick={(e) => handleDeleteHistory(e, session.id)} className="mt-3 text-red-500 text-xs flex items-center gap-1 hover:text-red-400 p-2 -ml-2 rounded-lg hover:bg-red-500/10 transition-colors"><Trash2 size={14} /> Excluir Registro</button>

        const ExerciseEditor = ({ exercise, index, updateExercise, removeExercise }) => {

                    {expanded && (
                        <div className="space-y-3 mt-3 animate-fade-in">
                            <div><label className="text-xs text-neutral-500 uppercase font-bold">Nome</label><input type="text" value={exercise.name} onChange={(e) => updateExercise(index, 'name', e.target.value)} className="w-full bg-neutral-900 border border-neutral-700 text-white rounded-lg p-3 outline-none" placeholder="Ex: Supino Reto"/></div>
                            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs text-neutral-500 uppercase font-bold">Séries</label><input type="number" value={exercise.sets} onChange={(e) => updateExercise(index, 'sets', e.target.value)} className="w-full bg-neutral-900 border border-neutral-700 text-white rounded-lg p-2 text-center" placeholder="4"/></div><div><label className="text-xs text-neutral-500 uppercase font-bold">Reps</label><input type="text" value={exercise.reps} onChange={(e) => updateExercise(index, 'reps', e.target.value)} className="w-full bg-neutral-900 border border-neutral-700 text-white rounded-lg p-2 text-center" placeholder="8-12"/></div></div>

                            <div><label className="text-xs text-neutral-500 uppercase font-bold">Obs</label><textarea value={exercise.notes} onChange={(e) => updateExercise(index, 'notes', e.target.value)} className="w-full bg-neutral-900 border border-neutral-700 text-white rounded-lg p-2 h-20 text-sm"/></div>

                        </div>
                    )}
                </div>
            ); 
        };

        const ActiveWorkout = ({ workout, onFinish, onBack, user }) => { 
            const [activeExerciseIndex, setActiveExerciseIndex] = useState(0); 
            const [logs, setLogs] = useState({}); 
            const [restTimer, setRestTimer] = useState({ active: false, duration: 60 }); 
            const [startTime] = useState(Date.now()); 
            const [sessionDuration, setSessionDuration] = useState(0); 
            const [totalRestTime, setTotalRestTime] = useState(0); 
            
            useEffect(() => { const timer = setInterval(() => { setSessionDuration(Math.floor((Date.now() - startTime) / 1000)); }, 1000); return () => clearInterval(timer); }, [startTime]); 
            useEffect(() => { let interval; if (restTimer.active) { interval = setInterval(() => { setTotalRestTime(prev => prev + 1); }, 1000); } return () => clearInterval(interval); }, [restTimer.active]); 
            
            const toggleSet = (exIndex, setIndex, targetReps, defaultRest) => { const key = `${exIndex}-${setIndex}`; const currentLog = logs[key] || { weight: '', reps: targetReps, done: false }; const newDone = !currentLog.done; setLogs({ ...logs, [key]: { ...currentLog, done: newDone } }); if (newDone) setRestTimer({ active: true, duration: parseInt(defaultRest) || 60 }); }; 
            const updateLogValue = (exIndex, setIndex, field, value) => { const key = `${exIndex}-${setIndex}`; const currentLog = logs[key] || { weight: '', reps: '', done: false }; setLogs({ ...logs, [key]: { ...currentLog, [field]: value } }); }; 
            
            const handleFinish = async () => { 
                if (!confirm("Finalizar treino?")) return; 
                const finalDuration = Math.floor((Date.now() - startTime) / 1000); 
                const sessionData = { workoutId: workout.id, workoutTitle: workout.title, exercises: workout.exercises, logs: logs, totalTime: finalDuration, totalRestTime: totalRestTime, date: serverTimestamp(), userId: user.uid }; 
                try { 
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), sessionData); 
                    const historyRef = collection(db, 'artifacts', appId, 'users', user.uid, 'history'); 
                    const snapshot = await getDocs(historyRef); 
                    const allHistory = snapshot.docs.map(d => d.data()); 
                    const workoutHistory = allHistory.filter(h => h.workoutId === workout.id).sort((a, b) => { const timeA = a.date?.seconds || 0; const timeB = b.date?.seconds || 0; return timeB - timeA; }); 
                    const previousSession = workoutHistory.length > 1 ? workoutHistory[1] : null; 
                    onFinish(sessionData, previousSession); 
                } catch (e) { alert("Erro: " + e.message); onFinish(sessionData, null); } 
            }; 
            
            const currentExercise = workout.exercises[activeExerciseIndex]; 
            
            return (
                <div className="pb-24 bg-black min-h-[100dvh] text-white">
                    <div className="sticky top-0 bg-neutral-900/95 backdrop-blur-md border-b border-neutral-800 p-4 z-40 flex justify-between items-center pt-safe">
                        <div><h2 className="text-white font-bold truncate max-w-[200px]">{workout.title}</h2><div className="flex items-center gap-2 text-yellow-500 text-sm font-mono"><Activity size={14} />{formatDuration(sessionDuration)}</div></div>

                                {Array.from({ length: parseInt(currentExercise.sets) || 3 }).map((_, setIdx) => {

                </div>

        };

        // --- APP PRINCIPAL ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [view, setView] = useState('dashboard');
            const [workouts, setWorkouts] = useState([]);

            const [reportData, setReportData] = useState({ current: null, previous: null });
            const [notification, setNotification] = useState(null);

            // DETECTOR DE DEEP LINK
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const code = params.get('import');
                if (code) setImportCode(code);
            }, []);

            useEffect(() => { if (user && importCode && view === 'dashboard') setView('import'); }, [user, importCode, view]);

            useEffect(() => {
                localStorage.removeItem('auth_pending');
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoading(false);
                });
                return unsubscribe;
            }, []);

            // ... (Resto do código de efeitos e handlers) ...
            useEffect(() => { if (!user) return; const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), orderBy('createdAt', 'desc'), limit(1)); const unsub = onSnapshot(q, s => { if(!s.empty) { const m = s.docs[0].data(); if(m.createdAt?.toMillis() > Date.now()-10000 && m.uid !== user.uid) { setNotification({id: s.docs[0].id, ...m}); setTimeout(()=>setNotification(null), 4000); }}}); return () => unsub(); }, [user]);
            useEffect(() => { if(user) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { uid: user.uid, displayName: user.displayName || 'Anônimo', email: user.email, photoURL: user.photoURL, lastSeen: serverTimestamp() }, { merge: true }); }, [user]);
            useEffect(() => { if (!user) return;
                const q = query(collection(db, 'artifacts', appId, 'users', user.uid, 'workouts'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    data.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
                    setWorkouts(data);
                }, (error) => console.error("Erro ao buscar treinos:", error));
                return () => unsubscribe();
            }, [user]);

            const handleCreateWorkout = () => { setCurrentWorkout({ title: '', exercises: [] }); setView('edit'); };
            const handleSaveWorkout = async () => { if (!user || !currentWorkout.title) return; const wd = { ...currentWorkout, createdAt: serverTimestamp(), authorName: user.displayName, authorId: user.uid }; try { if (currentWorkout.id) await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'workouts', currentWorkout.id), wd); else await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'workouts'), wd); setView('dashboard'); } catch (e) { alert("Erro: " + e.message); } };
            const handleDeleteWorkout = async (id) => { if (!confirm("Apagar?")) return; await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'workouts', id)); };
            const handleShareWorkout = async (w) => { try { const sd = { ...w, originalAuthor: user.displayName, sharedAt: serverTimestamp() }; const r = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'shared_workouts'), sd); setShareCode(r.id); const url = `${window.location.origin}${window.location.pathname}?import=${r.id}`; const el = document.createElement('textarea'); el.value = `Treino do MK: ${url}`; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("Link do treino copiado!"); } catch (e) { alert("Erro."); } };
            const handleImportWorkout = async () => { if (!importCode) return; try { const d = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shared_workouts', importCode.trim())); if (d.exists()) { await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'workouts'), { title: d.data().title + " (Importado)", exercises: d.data().exercises, importedFrom: d.data().originalAuthor, createdAt: serverTimestamp() }); setView('dashboard'); setImportCode(''); alert("Sucesso!"); } else alert("Inválido."); } catch (e) { alert("Erro."); } };
            const copyToClipboard = (t) => { const url = `${window.location.origin}${window.location.pathname}?import=${t}`; const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("Link Copiado!"); };

            if (authLoading) return <LoadingScreen />;
            if (!user) return <LoginScreen />;

            return (
                <div className="min-h-[100dvh] bg-neutral-950 text-white font-sans selection:bg-yellow-500 selection:text-black">
                    <NotificationToast notification={notification} onClose={() => setNotification(null)} />
                    {view === 'admin' && <AdminPanel user={user} onClose={() => setView('dashboard')} />}
                    {view === 'chat' && <ChatScreen user={user} onClose={() => setView('dashboard')} />}
                    {view === 'history' && <HistoryList user={user} onViewReport={(s) => { setReportData({ current: s, previous: null }); setView('report'); }} onBack={() => setView('dashboard')} />}
                    {view === 'report' && reportData.current && <WorkoutReport session={reportData.current} previousSession={reportData.previous} onClose={() => setView('dashboard')} />}
                    {view === 'active' && currentWorkout && <ActiveWorkout workout={currentWorkout} user={user} onFinish={(c, p) => { setReportData({ current: c, previous: p }); setView('report'); }} onBack={() => setView('dashboard')} />}
                    {view === 'edit' && (
                        <div className="min-h-[100dvh] bg-neutral-900 text-white p-4 pb-20"><div className="flex justify-between items-center mb-6 pt-safe"><button onClick={() => setView('dashboard')} className="p-2 bg-neutral-800 rounded-lg"><RotateCcw size={20} /></button><h2 className="font-bold text-lg">{currentWorkout.id ? 'Editar' : 'Novo'}</h2><button onClick={handleSaveWorkout} className="p-2 bg-yellow-500 text-black rounded-lg"><Save size={20} /></button></div><div className="mb-6"><label className="text-xs text-neutral-500 uppercase font-bold">Nome</label><input type="text" value={currentWorkout.title} onChange={(e) => setCurrentWorkout({...currentWorkout, title: e.target.value})} className="w-full bg-neutral-800 border-b-2 border-neutral-700 p-3 text-xl font-bold focus:border-yellow-500 outline-none" placeholder="Ex: Treino A"/></div><div className="space-y-4">{currentWorkout.exercises.map((ex, idx) => ( <ExerciseEditor key={idx} index={idx} exercise={ex} updateExercise={(idx, field, val) => { const newExs = [...currentWorkout.exercises]; newExs[idx] = { ...newExs[idx], [field]: val }; setCurrentWorkout({ ...currentWorkout, exercises: newExs }); }} removeExercise={(idx) => { const newExs = currentWorkout.exercises.filter((_, i) => i !== idx); setCurrentWorkout({ ...currentWorkout, exercises: newExs }); }} /> ))}</div><button onClick={() => setCurrentWorkout({...currentWorkout, exercises: [...currentWorkout.exercises, { name: '', sets: 4, reps: '10', cadence: '3010', restTime: 60, notes: '' }]})} className="w-full mt-6 py-4 border-2 border-dashed border-neutral-700 rounded-xl text-neutral-400 font-bold hover:bg-neutral-800">+ Exercício</button></div>
                    )}
                    {view === 'dashboard' && (
                        <>
                            <div className="p-6 bg-gradient-to-b from-neutral-900 to-neutral-950 border-b border-neutral-800 sticky top-0 z-30 pt-safe">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-3 flex-1 min-w-0 overflow-hidden">
                                        {user.photoURL ? <img src={user.photoURL} className="w-10 h-10 rounded-full border-2 border-yellow-500 shrink-0" /> : <div className="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-black font-bold text-lg shrink-0">{user.displayName?.[0]}</div>}
                                        <div className="flex-1 min-w-0 overflow-hidden">
                                            <p className="text-[9px] text-yellow-500 uppercase font-bold tracking-widest mb-0.5">Bem-vindo</p>
                                            <h1 className="font-black text-lg sm:text-xl leading-none tracking-tight truncate w-full">{user.displayName || 'Atleta'}</h1>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 shrink-0 ml-2">
                                        {user.email === ADMIN_EMAIL && <button onClick={() => setView('admin')} className="bg-yellow-500 text-black p-2 rounded-full hover:bg-yellow-400 font-black border-2 border-white animate-pulse text-[10px] h-9 w-9 flex items-center justify-center">CMD</button>}
                                        <button onClick={() => setView('history')} className="bg-neutral-800 p-2 rounded-full text-neutral-400 hover:text-white h-9 w-9 flex items-center justify-center"><History size={16} /></button>
                                        <button onClick={() => setView('chat')} className="bg-neutral-800 p-2 rounded-full text-neutral-400 hover:text-white h-9 w-9 flex items-center justify-center"><MessageSquare size={16} /></button>
                                        <button onClick={() => signOut(auth)} className="text-neutral-600 hover:text-red-500 p-2 h-9 w-9 flex items-center justify-center"><LogOut size={16} /></button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setView('import')} className="bg-neutral-800/50 backdrop-blur-sm p-4 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold border border-neutral-800 hover:border-blue-500/50"><Download size={18} className="text-blue-500" /> Importar</button>
                                    <button onClick={handleCreateWorkout} className="bg-yellow-500 text-black p-4 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold hover:bg-yellow-400 shadow-lg"><Plus size={18} /> Novo Treino</button>
                                </div>
                            </div>
                            {view === 'import' && (
                                <div className="m-4 p-6 bg-neutral-900 rounded-3xl border border-blue-500/30"><h3 className="font-bold mb-2 flex items-center gap-2 text-blue-400 text-lg">Importar Treino</h3><div className="flex gap-2"><input value={importCode} onChange={(e) => setImportCode(e.target.value)} placeholder="Código ID..." className="flex-1 bg-black border border-neutral-700 rounded-xl px-4 text-white outline-none focus:border-blue-500 font-mono"/><button onClick={handleImportWorkout} className="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold shadow-lg">OK</button></div><button onClick={() => setView('dashboard')} className="mt-4 text-xs text-neutral-500 hover:text-white underline">Cancelar</button></div>
                            )}
                            {shareCode && (
                                <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-50 backdrop-blur-md"><div className="bg-neutral-900 p-8 rounded-3xl w-full max-w-sm border border-neutral-800 shadow-2xl relative"><h3 className="text-2xl font-black text-center mb-2 mt-4 text-white">Link Gerado!</h3><div className="bg-black p-6 rounded-2xl border border-neutral-800 mb-8 flex justify-between items-center group cursor-pointer" onClick={() => copyToClipboard(shareCode)}><span className="font-mono text-xl font-bold select-all text-green-500 break-all text-xs">{window.location.origin}?import={shareCode}</span><Copy size={20} className="text-neutral-600 group-hover:text-white shrink-0" /></div><button onClick={() => setShareCode(null)} className="w-full bg-white hover:bg-neutral-200 text-black font-bold py-4 rounded-xl">Fechar</button></div></div>
                            )}
                            <div className="p-4 space-y-4 pb-20">
                                <h2 className="text-neutral-500 text-[10px] font-bold uppercase tracking-widest mb-4 pl-2">Meus Treinos</h2>
                                {workouts.length === 0 && <div className="text-center py-20 opacity-30"><Dumbbell size={64} className="mb-4 text-neutral-500 mx-auto" /><p className="text-neutral-400 font-medium">Nenhum treino criado.</p></div>}
                                {workouts.map(workout => (
                                    <div key={workout.id} className="bg-neutral-900 border border-neutral-800 rounded-3xl p-5 shadow-lg hover:border-neutral-700 transition-all group relative overflow-hidden"><div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none group-hover:opacity-10 transition-opacity"><Dumbbell size={120} /></div><div className="relative z-10"><div className="flex justify-between items-start mb-6"><div><h3 className="text-2xl font-black text-white group-hover:text-yellow-500 transition-colors tracking-tight">{workout.title}</h3><div className="flex items-center gap-2 mt-2"><span className="bg-neutral-800 text-neutral-400 text-xs px-2 py-1 rounded-md font-bold">{workout.exercises.length} EXERCÍCIOS</span>{workout.importedFrom && <span className="text-blue-500 text-xs font-bold px-2 py-1 bg-blue-500/10 rounded-md border border-blue-500/20">COACH</span>}</div></div><div className="flex gap-1"><button onClick={() => handleShareWorkout(workout)} className="p-3 text-neutral-500 hover:text-white hover:bg-neutral-800 rounded-xl"><Share2 size={18} /></button><button onClick={() => { setCurrentWorkout(workout); setView('edit'); }} className="p-3 text-neutral-500 hover:text-white hover:bg-neutral-800 rounded-xl"><FileText size={18} /></button><button onClick={() => handleDeleteWorkout(workout.id)} className="p-3 text-neutral-500 hover:text-red-500 hover:bg-red-500/10 rounded-xl"><Trash2 size={18} /></button></div></div><button onClick={() => { setCurrentWorkout(workout); setView('active'); }} className="w-full bg-neutral-800 group-hover:bg-yellow-500 group-hover:text-black text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-lg"><Play size={20} className="fill-current" /> INICIAR TREINO</button></div></div>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
